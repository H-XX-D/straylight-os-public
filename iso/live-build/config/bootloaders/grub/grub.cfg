set default=0
set timeout=10

insmod efi_gop
insmod efi_uga
insmod all_video
insmod gfxterm
insmod png
insmod part_gpt
insmod part_msdos
insmod diskfilter
insmod regexp

set gfxmode=auto
terminal_output gfxterm

set theme=/boot/grub/themes/straylight/theme.txt

# ── StrayLight Disk Scanner ────────────────────────────────────────────────
# Probe all connected drives and record them so the installer can present
# a full list to the user.  Results are passed via the kernel command line
# using sl.disks=... so the installer process can read them without requiring
# a running DE or separate IPC mechanism.

set sl_disks=""
for disk in (hd0) (hd1) (hd2) (hd3) (hd4) (hd5) (hd6) (hd7); do
    if probe -d $disk --set=probe_label 2>/dev/null; then
        if [ -z "$sl_disks" ]; then
            set sl_disks="$disk"
        else
            set sl_disks="$sl_disks,$disk"
        fi
    fi
done

# ── Menu Entries ──────────────────────────────────────────────────────────

menuentry "Install StrayLight OS" --class straylight --id install {
    linux /live/vmlinuz boot=live components quiet splash \
        straylight.mode=install sl.disks=$sl_disks
    initrd /live/initrd.img
}

menuentry "StrayLight OS (Live Demo)" --class straylight --id live {
    linux /live/vmlinuz boot=live components quiet splash
    initrd /live/initrd.img
}

menuentry "StrayLight OS (Live - Safe Graphics)" --class straylight {
    linux /live/vmlinuz boot=live components quiet splash nomodeset
    initrd /live/initrd.img
}

menuentry "StrayLight OS (Live - Debug)" --class straylight {
    linux /live/vmlinuz boot=live components debug systemd.log_level=debug
    initrd /live/initrd.img
}

# ── Detect other bootable operating systems (os-prober equivalent) ─────────
# Scan all probed partitions for bootable kernels and add discovered entries.
for part in (hd0,gpt1) (hd0,gpt2) (hd0,gpt3) (hd0,msdos1) (hd0,msdos2) \
            (hd1,gpt1) (hd1,gpt2) (hd1,msdos1) (hd1,msdos2) \
            (hd2,gpt1) (hd2,gpt2); do
    if [ -f ($part)/boot/grub/grub.cfg ] || [ -f ($part)/EFI/Microsoft/Boot/bootmgfw.efi ]; then
        if probe --set=part_label $part 2>/dev/null; then
            menuentry "Boot: $part_label ($part)" --class other {
                configfile ($part)/boot/grub/grub.cfg
            }
        fi
    fi
done

menuentry "Memory Test (memtest86+)" --class memtest {
    linux16 /live/memtest
}
