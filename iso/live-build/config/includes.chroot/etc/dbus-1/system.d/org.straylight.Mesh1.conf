<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the Mesh1 bus name -->
  <policy user="root">
    <allow own="org.straylight.Mesh1"/>
    <allow send_destination="org.straylight.Mesh1"/>
    <allow send_interface="org.straylight.Mesh1.Pool"/>
    <allow send_interface="org.straylight.Mesh1.Monitor"/>
    <allow send_interface="org.straylight.Mesh1.Transfer"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>

  <!-- Members of straylight group can call Mesh1 methods -->
  <policy group="straylight">
    <allow send_destination="org.straylight.Mesh1"/>
    <allow send_interface="org.straylight.Mesh1.Pool"/>
    <allow send_interface="org.straylight.Mesh1.Monitor"/>
    <allow send_interface="org.straylight.Mesh1.Transfer"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>

  <!-- Default deny for everyone else -->
  <policy context="default">
    <deny send_destination="org.straylight.Mesh1"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>
</busconfig>
