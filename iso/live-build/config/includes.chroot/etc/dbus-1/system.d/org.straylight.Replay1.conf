<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the Replay1 bus name -->
  <policy user="root">
    <allow own="org.straylight.Replay1"/>
    <allow send_destination="org.straylight.Replay1"/>
    <allow send_interface="org.straylight.Replay1.Recorder"/>
    <allow send_interface="org.straylight.Replay1.Analyzer"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>

  <!-- Members of straylight group can call Replay1 methods and receive signals -->
  <policy group="straylight">
    <allow send_destination="org.straylight.Replay1"/>
    <allow send_interface="org.straylight.Replay1.Recorder"/>
    <allow send_interface="org.straylight.Replay1.Analyzer"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow receive_sender="org.straylight.Replay1"/>
  </policy>

  <!-- Default deny for everyone else -->
  <policy context="default">
    <deny send_destination="org.straylight.Replay1"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>
</busconfig>
