# Welcome module configuration
# Shows system requirements and checks

showSupportUrl: true
showKnownIssuesUrl: true
showReleaseNotesUrl: true

requirements:
    requiredStorage: 20.0
    requiredRam: 4.0
    internetCheckUrl: https://straylight.dev/ping
    check:
        - storage
        - ram
        - power
        - internet
        - root
        - screen
    required:
        - storage
        - ram
        - root

geoip:
    style: "none"

languages:
    - en_US.UTF-8
    - de_DE.UTF-8
    - fr_FR.UTF-8
    - ja_JP.UTF-8
    - zh_CN.UTF-8
    - ko_KR.UTF-8
    - pt_BR.UTF-8
    - es_ES.UTF-8
    - ru_RU.UTF-8
