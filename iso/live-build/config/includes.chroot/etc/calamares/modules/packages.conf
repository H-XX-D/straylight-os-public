# Packages module configuration
# Runs during exec phase to install/remove packages on the target

backend: apt

update_db: true
update_system: false

operations:
    - install:
        - straylight-os
        - linux-image-amd64
        - linux-headers-amd64
        - grub-efi-amd64
        - network-manager
        - pipewire
        - wireplumber
        - bluez
        - cups
        - avahi-daemon
        - bash-completion
        - sudo
        - locales
    - remove:
        - live-boot
        - live-config
        - live-config-systemd
        - user-setup
        - calamares
        - calamares-settings-debian
