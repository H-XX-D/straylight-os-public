# StrayLight post-install shellprocess.
# SPDX-License-Identifier: GPL-3.0-or-later

dontChroot: false
timeout: 600
verbose: true

script:
  - command: "-systemctl enable straylight-entropy.service straylight-bus.service straylight-registry.service straylight-scheduler.service straylight-core.service straylight-agent.service straylight-fuse.service gdm3.service straylight-firstboot.service"
    timeout: 120
  - command: "-for mod in vpu hypervisor scheduler xdp entropy enclave; do dkms autoinstall -m straylight-$${mod} || true; done"
    timeout: 240
  - |
      cat > /etc/sysctl.d/99-straylight.conf <<'SYSCTL'
      vm.swappiness=10
      vm.dirty_ratio=20
      vm.dirty_background_ratio=5
      net.core.rmem_max=16777216
      net.core.wmem_max=16777216
      net.core.rmem_default=1048576
      net.core.wmem_default=1048576
      kernel.sched_autogroup_enabled=0
      kernel.numa_balancing=1
      SYSCTL
  - "-groupadd -r straylight || true"
  - "-for user_dir in /home/*; do [ -d \"$${user_dir}\" ] || continue; user=$$(basename \"$${user_dir}\"); usermod -aG straylight \"$${user}\" || true; done"
  - "-mkdir -p /var/lib/straylight && rm -f /var/lib/straylight/state"
  - "-for conf in Core1 Bus1 Registry1 Scheduler1 Entropy1 Agent1; do if [ ! -f /etc/dbus-1/system.d/org.straylight.$${conf}.conf ]; then echo \"WARNING: Missing D-Bus config for org.straylight.$${conf}\"; fi; done"
