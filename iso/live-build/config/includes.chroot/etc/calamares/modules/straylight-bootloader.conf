# StrayLight EFI bootloader installation.
# SPDX-License-Identifier: GPL-3.0-or-later

dontChroot: true
timeout: 600
verbose: true

script:
  - |
      set -eu

      if [ ! -d "${ROOT}/etc" ]; then
          echo "Calamares target root is not mounted at ${ROOT}" >&2
          exit 1
      fi

      if [ ! -d "${ROOT}/boot/efi" ]; then
          echo "EFI mount point is missing at ${ROOT}/boot/efi" >&2
          exit 1
      fi

      if [ "`stat -c %d "${ROOT}/boot/efi"`" = "`stat -c %d "${ROOT}"`" ]; then
          echo "EFI system partition is not mounted at ${ROOT}/boot/efi" >&2
          exit 1
      fi

      cleanup_mounts() {
          umount -R "${ROOT}/run" || true
          umount -R "${ROOT}/sys" || true
          umount -R "${ROOT}/proc" || true
          umount -R "${ROOT}/dev" || true
      }
      trap cleanup_mounts EXIT

      mkdir -p "${ROOT}/dev" "${ROOT}/proc" "${ROOT}/sys" "${ROOT}/run"
      mountpoint -q "${ROOT}/dev" || mount --rbind /dev "${ROOT}/dev"
      mountpoint -q "${ROOT}/proc" || mount -t proc proc "${ROOT}/proc"
      mountpoint -q "${ROOT}/sys" || mount --rbind /sys "${ROOT}/sys"
      mountpoint -q "${ROOT}/run" || mount --bind /run "${ROOT}/run"

      mkdir -p "${ROOT}/boot/efi/EFI/BOOT" "${ROOT}/boot/grub"
      chroot "${ROOT}" /usr/local/sbin/straylight-grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=StrayLight_OS --force
      chroot "${ROOT}" /usr/sbin/grub-mkconfig -o /boot/grub/grub.cfg

      if [ ! -f "${ROOT}/boot/efi/EFI/StrayLight_OS/grubx64.efi" ]; then
          echo "StrayLight EFI loader was not created" >&2
          exit 1
      fi

      cp -f "${ROOT}/boot/efi/EFI/StrayLight_OS/grubx64.efi" "${ROOT}/boot/efi/EFI/BOOT/BOOTX64.EFI"
