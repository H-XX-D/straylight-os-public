# StrayLight Driver Installation Module
# Runs during the 'show' phase — presents driver choices based on hwscan results
# Reads from global storage key "straylight_hardware"

type: viewmodule
name: straylight-drivers
interface: qtplugin

# Driver mapping: hardware vendor -> packages to install
gpu_drivers:
    nvidia:
        packages:
            - nvidia-driver
            - nvidia-kernel-dkms
            - nvidia-cuda-toolkit
            - nvidia-smi
            - libnvidia-ml1
        blacklist:
            - nouveau
        kernel_params:
            - "nvidia-drm.modeset=1"
        post_install:
            - "update-initramfs -u"

    amd:
        packages:
            - firmware-amd-graphics
            - libdrm-amdgpu1
            - mesa-vulkan-drivers
            - radeontop
        kernel_params:
            - "amdgpu.ppfeaturemask=0xffffffff"

    intel:
        packages:
            - intel-media-va-driver
            - mesa-vulkan-drivers
            - intel-gpu-tools

# Network firmware mapping
network_firmware:
    intel_wifi:
        match_vendor: "8086"
        match_classes: ["0280"]
        packages:
            - firmware-iwlwifi

    realtek:
        match_vendor: "10ec"
        packages:
            - firmware-realtek

    broadcom:
        match_vendor: "14e4"
        packages:
            - firmware-brcm80211
            - broadcom-sta-dkms

    atheros:
        match_vendor: "168c"
        packages:
            - firmware-atheros

# SGX support
sgx_packages:
    - libsgx-enclave-common
    - libsgx-urts
    - sgx-aesm-service

# DKMS modules — always install
dkms_packages:
    - straylight-kernel

# Persistent memory
pmem_packages:
    - ndctl
    - daxctl
    - libpmem2-1

# Options
allow_skip: true
storage_key_in: "straylight_hardware"
storage_key_out: "straylight_drivers"
