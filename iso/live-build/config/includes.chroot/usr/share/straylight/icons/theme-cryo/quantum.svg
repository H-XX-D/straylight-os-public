<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <radialGradient id="atomGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Quantum orbits as ice crystals -->
  <g fill="none" stroke="url(#iceGrad)" stroke-width="1.5" opacity="0.8">
    <ellipse cx="32" cy="32" rx="24" ry="10" transform="rotate(0 32 32)"/>
    <ellipse cx="32" cy="32" rx="24" ry="10" transform="rotate(60 32 32)"/>
    <ellipse cx="32" cy="32" rx="24" ry="10" transform="rotate(120 32 32)"/>
  </g>
  <!-- Quantum particles (frozen) -->
  <g fill="#e0f7ff">
    <circle cx="32" cy="12" r="2.5"/>
    <circle cx="52" cy="42" r="2.5"/>
    <circle cx="12" cy="42" r="2.5"/>
  </g>
  <!-- Center nucleus (ice crystal) -->
  <g transform="translate(32,32)">
    <circle r="8" fill="url(#atomGrad)"/>
    <g stroke="#4fc3f7" stroke-width="1">
      <line x1="0" y1="-6" x2="0" y2="6"/>
      <line x1="-5" y1="-3" x2="5" y2="3"/>
      <line x1="-5" y1="3" x2="5" y2="-3"/>
    </g>
    <circle r="3" fill="#e0f7ff"/>
  </g>
  <!-- Frost sparkles -->
  <g fill="#4fc3f7" opacity="0.6">
    <circle cx="24" cy="24" r="1"/>
    <circle cx="40" cy="24" r="1"/>
    <circle cx="24" cy="40" r="1"/>
    <circle cx="40" cy="40" r="1"/>
  </g>
</svg>