<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <defs>
    <!-- Sunset gradient -->
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7931e"/>
      <stop offset="100%" style="stop-color:#ff00a0"/>
    </linearGradient>
    <!-- Cyan glow -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <!-- Chrome gradient -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00a0"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#ff00a0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Pink glow filter -->
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Cyan glow filter -->
    <filter id="cyanGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with grid -->
  <rect width="64" height="64" fill="#1a0b2e" rx="4"/>
  <rect width="64" height="64" fill="url(#grid)" rx="4"/>

  <!-- Persistent Memory Icon -->
  <rect x="24" y="8" width="16" height="8" rx="1" fill="url(#sunset)" filter="url(#pinkGlow)"/>
  <rect x="40" y="10" width="3" height="4" fill="#ff00a0"/>
  <rect x="14" y="22" width="36" height="32" rx="2" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#cyanGlowFilter)"/>
  <rect x="20" y="28" width="24" height="20" fill="none" stroke="#ff00a0" stroke-width="1"/>
  <line x1="20" y1="34" x2="44" y2="34" stroke="#00ffff" stroke-width="1"/>
  <line x1="20" y1="40" x2="44" y2="40" stroke="#00ffff" stroke-width="1"/>
  <line x1="14" y1="26" x2="10" y2="26" stroke="#f7931e" stroke-width="1"/>
  <line x1="14" y1="32" x2="10" y2="32" stroke="#f7931e" stroke-width="1"/>
  <line x1="14" y1="38" x2="10" y2="38" stroke="#f7931e" stroke-width="1"/>
  <line x1="14" y1="44" x2="10" y2="44" stroke="#f7931e" stroke-width="1"/>
  <line x1="50" y1="26" x2="54" y2="26" stroke="#f7931e" stroke-width="1"/>
  <line x1="50" y1="32" x2="54" y2="32" stroke="#f7931e" stroke-width="1"/>
  <line x1="50" y1="38" x2="54" y2="38" stroke="#f7931e" stroke-width="1"/>
  <line x1="50" y1="44" x2="54" y2="44" stroke="#f7931e" stroke-width="1"/>

</svg>