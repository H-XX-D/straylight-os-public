<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon frame -->
  <path d="M32 4 L56 16 L56 44 L32 56 L8 44 L8 16 Z" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>

  <!-- Clock face -->
  <circle cx="32" cy="28" r="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="32" cy="28" r="1.5" fill="currentColor"/>

  <!-- Clock ticks -->
  <line x1="32" y1="14" x2="32" y2="16" stroke="currentColor" stroke-width="1.5"/>
  <line x1="32" y1="40" x2="32" y2="42" stroke="currentColor" stroke-width="1.5"/>
  <line x1="18" y1="28" x2="20" y2="28" stroke="currentColor" stroke-width="1.5"/>
  <line x1="44" y1="28" x2="46" y2="28" stroke="currentColor" stroke-width="1.5"/>

  <!-- Clock hands -->
  <line x1="32" y1="28" x2="32" y2="18" stroke="currentColor" stroke-width="2"/>
  <line x1="32" y1="28" x2="40" y2="32" stroke="currentColor" stroke-width="1.5"/>

  <!-- Thread indicators -->
  <path d="M14 44 L18 44 L18 48 L14 48 Z" fill="currentColor" opacity="0.7"/>
  <path d="M22 48 L26 48 L26 52 L22 52 Z" fill="currentColor" opacity="0.8"/>
  <path d="M30 44 L34 44 L34 48 L30 48 Z" fill="currentColor" opacity="0.6"/>
  <path d="M38 48 L42 48 L42 52 L38 52 Z" fill="currentColor" opacity="0.9"/>
  <path d="M46 44 L50 44 L50 48 L46 48 Z" fill="currentColor" opacity="0.5"/>

  <!-- Priority arrows -->
  <line x1="16" y1="40" x2="12" y2="36" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="48" y1="40" x2="52" y2="36" stroke="currentColor" stroke-width="1" opacity="0.5"/>
</svg>