<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Magma gradient - flowing lava -->
    <linearGradient id="magmaGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Intense fire gradient -->
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Ember glow -->
    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb700;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:0" />
    </radialGradient>

    <!-- Heat haze -->
    <filter id="heatGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Intense fire blur -->
    <filter id="fireBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background - volcanic rock -->
  <circle cx="32" cy="32" r="30" fill="#1a0a05" stroke="#ff4500" stroke-width="2"/>


  <!-- JIT Compiler - Forge/Anvil with flames -->
  <path d="M20 46 L24 26 L40 26 L44 46 Z" fill="url(#fireGrad)" filter="url(#heatGlow)"/>
  <rect x="18" y="44" width="28" height="6" rx="1" fill="#ff4500"/>
  <!-- Sparks flying up -->
  <circle cx="28" cy="20" r="2" fill="#ffb700" filter="url(#fireBlur)"/>
  <circle cx="36" cy="16" r="1.5" fill="#ffb700" filter="url(#fireBlur)"/>
  <circle cx="32" cy="14" r="1" fill="#ffb700"/>
  <path d="M26 24 L24 18 M38 24 L40 16" stroke="#ff6600" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Code brackets as heat waves -->
  <path d="M12 28 L8 32 L12 36" stroke="#ffb700" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M52 28 L56 32 L52 36" stroke="#ffb700" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

</svg>