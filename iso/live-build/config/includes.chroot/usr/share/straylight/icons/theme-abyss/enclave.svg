<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="shellgrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001a2e"/>
      <stop offset="80%" stop-color="#00ccff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#39ff85" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <!-- Nautilus shell as secure enclave -->
  <ellipse cx="32" cy="34" rx="20" ry="18" fill="url(#shellgrad)" stroke="#00ccff" stroke-width="2"/>
  <!-- Spiral chambers - security layers -->
  <path d="M32 34 Q38 28 42 34 Q40 42 32 40 Q26 36 30 32 Q34 30 36 34"
        fill="none" stroke="#39ff85" stroke-width="1.5"/>
  <path d="M32 34 Q28 30 26 34 Q28 40 34 38"
        fill="none" stroke="#39ff85" stroke-width="1"/>
  <path d="M32 34 Q36 32 38 36"
        fill="none" stroke="#00ccff" stroke-width="1"/>
  <!-- Central protected core -->
  <circle cx="32" cy="34" r="4" fill="#39ff85" opacity="0.8"/>
  <circle cx="32" cy="34" r="2" fill="#001a2e"/>
  <!-- Chamber divisions -->
  <line x1="32" y1="16" x2="32" y2="52" stroke="#00ccff" stroke-width="1" opacity="0.3"/>
  <line x1="12" y1="34" x2="52" y2="34" stroke="#00ccff" stroke-width="1" opacity="0.3"/>
  <!-- Lock indicator -->
  <path d="M28 22 L28 18 Q32 14 36 18 L36 22" fill="none" stroke="#39ff85" stroke-width="1.5"/>
  <rect x="26" y="22" width="12" height="8" rx="1" fill="#39ff85" opacity="0.6"/>
  <!-- Bubbles -->
  <circle cx="16" cy="14" r="2" fill="#00ccff" opacity="0.5"/>
  <circle cx="50" cy="12" r="1.5" fill="#39ff85" opacity="0.4"/>
</svg>