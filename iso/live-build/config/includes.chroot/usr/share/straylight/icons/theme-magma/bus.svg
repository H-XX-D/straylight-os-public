<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Magma gradient - flowing lava -->
    <linearGradient id="magmaGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Intense fire gradient -->
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Ember glow -->
    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb700;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:0" />
    </radialGradient>

    <!-- Heat haze -->
    <filter id="heatGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Intense fire blur -->
    <filter id="fireBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background - volcanic rock -->
  <circle cx="32" cy="32" r="30" fill="#1a0a05" stroke="#ff4500" stroke-width="2"/>


  <!-- Communication Bus - Lava flow channels -->
  <rect x="8" y="26" width="48" height="12" rx="2" fill="none" stroke="url(#magmaGrad)" stroke-width="2.5" filter="url(#heatGlow)"/>
  <!-- Flowing data as magma streams -->
  <rect x="12" y="29" width="8" height="6" rx="1" fill="#ff4500"/>
  <rect x="24" y="29" width="8" height="6" rx="1" fill="#ff6600"/>
  <rect x="36" y="29" width="8" height="6" rx="1" fill="#ff4500"/>
  <rect x="48" y="29" width="4" height="6" rx="1" fill="#ffb700"/>
  <!-- Heat waves -->
  <path d="M10 22 Q32 18 54 22" stroke="#ff6600" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M10 42 Q32 46 54 42" stroke="#ff6600" stroke-width="1" fill="none" opacity="0.6"/>

</svg>