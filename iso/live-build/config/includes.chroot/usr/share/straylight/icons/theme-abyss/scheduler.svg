<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Kraken as scheduler -->
  <ellipse cx="32" cy="28" rx="10" ry="8" fill="#001a2e" stroke="#00ccff" stroke-width="1.5"/>
  <!-- Thread tentacles -->
  <path d="M26 34 Q20 42 18 50" fill="none" stroke="#39ff85" stroke-width="1.5" stroke-linecap="round">
    <animate attributeName="d" values="M26 34 Q20 42 18 50;M26 34 Q22 44 20 52;M26 34 Q20 42 18 50" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M30 36 Q28 46 28 54" fill="none" stroke="#00ccff" stroke-width="1.5" stroke-linecap="round">
    <animate attributeName="d" values="M30 36 Q28 46 28 54;M30 36 Q30 48 30 56;M30 36 Q28 46 28 54" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M34 36 Q36 46 36 54" fill="none" stroke="#00ccff" stroke-width="1.5" stroke-linecap="round">
    <animate attributeName="d" values="M34 36 Q36 46 36 54;M34 36 Q34 48 34 56;M34 36 Q36 46 36 54" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M38 34 Q44 42 46 50" fill="none" stroke="#39ff85" stroke-width="1.5" stroke-linecap="round">
    <animate attributeName="d" values="M38 34 Q44 42 46 50;M38 34 Q42 44 44 52;M38 34 Q44 42 46 50" dur="0.9s" repeatCount="indefinite"/>
  </path>
  <!-- Thread priority indicators -->
  <circle cx="18" cy="50" r="2.5" fill="#39ff85"/>
  <circle cx="28" cy="54" r="2" fill="#00ccff"/>
  <circle cx="36" cy="54" r="2" fill="#00ccff"/>
  <circle cx="46" cy="50" r="2.5" fill="#39ff85"/>
  <!-- Central eye/clock -->
  <circle cx="32" cy="28" r="4" fill="#39ff85"/>
  <circle cx="32" cy="28" r="2" fill="#001a2e"/>
  <line x1="32" y1="28" x2="32" y2="24" stroke="#001a2e" stroke-width="1"/>
  <!-- Time slices as bubbles -->
  <circle cx="14" cy="28" r="2" fill="#00ccff" opacity="0.6"/>
  <circle cx="50" cy="24" r="2" fill="#39ff85" opacity="0.6"/>
  <circle cx="52" cy="36" r="1.5" fill="#00ccff" opacity="0.5"/>
</svg>