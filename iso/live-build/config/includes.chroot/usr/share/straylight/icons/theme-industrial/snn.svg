<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- Neural network nodes as mechanical junctions -->
  <!-- Layer 1 -->
  <circle cx="12" cy="16" r="5" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <circle cx="12" cy="32" r="5" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <circle cx="12" cy="48" r="5" fill="none" stroke="url(#brass)" stroke-width="2"/>

  <!-- Layer 2 -->
  <circle cx="32" cy="24" r="5" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <circle cx="32" cy="40" r="5" fill="none" stroke="url(#brass)" stroke-width="2"/>

  <!-- Layer 3 -->
  <circle cx="52" cy="32" r="5" fill="none" stroke="url(#brass)" stroke-width="2"/>

  <!-- Connections as pipes/wires -->
  <g stroke="url(#steel)" stroke-width="2" fill="none">
    <!-- Layer 1 to Layer 2 -->
    <line x1="17" y1="16" x2="27" y2="24"/>
    <line x1="17" y1="32" x2="27" y2="24"/>
    <line x1="17" y1="32" x2="27" y2="40"/>
    <line x1="17" y1="48" x2="27" y2="40"/>

    <!-- Layer 2 to Layer 3 -->
    <line x1="37" y1="24" x2="47" y2="32"/>
    <line x1="37" y1="40" x2="47" y2="32"/>
  </g>

  <!-- Node centers (activated) -->
  <circle cx="12" cy="16" r="2.5" fill="url(#rust)"/>
  <circle cx="12" cy="32" r="2.5" fill="url(#rust)"/>
  <circle cx="12" cy="48" r="2.5" fill="url(#rust)"/>
  <circle cx="32" cy="24" r="2.5" fill="url(#rust)"/>
  <circle cx="32" cy="40" r="2.5" fill="url(#rust)"/>
  <circle cx="52" cy="32" r="2.5" fill="url(#rust)"/>

  <!-- Connection junctions (rivets) -->
  <circle cx="22" cy="20" r="1.5" fill="url(#brass)"/>
  <circle cx="22" cy="32" r="1.5" fill="url(#brass)"/>
  <circle cx="22" cy="44" r="1.5" fill="url(#brass)"/>
  <circle cx="42" cy="28" r="1.5" fill="url(#brass)"/>
  <circle cx="42" cy="36" r="1.5" fill="url(#brass)"/>

  <!-- Outer frame -->
  <rect x="4" y="6" width="56" height="52" rx="3" fill="none" stroke="url(#steel)" stroke-width="1.5"/>
</svg>