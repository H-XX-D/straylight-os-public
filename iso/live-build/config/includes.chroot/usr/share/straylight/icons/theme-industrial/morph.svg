<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- Morphing gear shape -->
  <path d="M32 6 L36 10 L40 8 L42 12 L48 12 L48 18 L52 20 L50 26 L54 30 L50 34 L52 40 L48 42 L48 48 L42 48 L40 52 L36 50 L32 54 L28 50 L24 52 L22 48 L16 48 L16 42 L12 40 L14 34 L10 30 L14 26 L12 20 L16 18 L16 12 L22 12 L24 8 L28 10 Z"
        fill="none" stroke="url(#steel)" stroke-width="2" stroke-linejoin="round"/>

  <!-- Inner morphing ring -->
  <ellipse cx="32" cy="30" rx="14" ry="10" fill="none" stroke="url(#brass)" stroke-width="2"/>

  <!-- Transforming elements -->
  <path d="M24 24 Q32 18 40 24" fill="none" stroke="url(#rust)" stroke-width="2"/>
  <path d="M24 36 Q32 42 40 36" fill="none" stroke="url(#rust)" stroke-width="2"/>

  <!-- Central transforming core -->
  <circle cx="32" cy="30" r="6" fill="url(#rust)"/>
  <circle cx="32" cy="30" r="3" fill="url(#brass)"/>

  <!-- Morph arrows -->
  <g stroke="url(#brass)" stroke-width="2" fill="none">
    <path d="M20 14 L18 12 L20 10"/>
    <path d="M44 14 L46 12 L44 10"/>
    <path d="M20 46 L18 48 L20 50"/>
    <path d="M44 46 L46 48 L44 50"/>
  </g>

  <!-- Corner rivets -->
  <circle cx="8" cy="8" r="2" fill="url(#brass)"/>
  <circle cx="56" cy="8" r="2" fill="url(#brass)"/>
  <circle cx="8" cy="56" r="2" fill="url(#brass)"/>
  <circle cx="56" cy="56" r="2" fill="url(#brass)"/>
</svg>