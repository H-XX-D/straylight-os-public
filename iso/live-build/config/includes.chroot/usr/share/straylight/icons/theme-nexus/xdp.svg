<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Fast path orbit -->
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="url(#cyanGrad)" stroke-width="0.8" opacity="0.5" transform="rotate(-10 32 32)"/>
  <!-- Network packet -->
  <rect x="8" y="24" width="20" height="16" rx="2" fill="none" stroke="url(#silverGrad)" stroke-width="1.5"/>
  <rect x="10" y="26" width="16" height="3" rx="1" fill="url(#purpleGrad)" opacity="0.6"/>
  <rect x="10" y="31" width="12" height="2" rx="0.5" fill="url(#cyanGrad)" opacity="0.5"/>
  <rect x="10" y="35" width="8" height="2" rx="0.5" fill="url(#cyanGrad)" opacity="0.5"/>
  <!-- Fast path arrow -->
  <path d="M32 32 L52 32" fill="none" stroke="url(#cyanGrad)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="48,28 56,32 48,36" fill="url(#cyanGrad)"/>
  <!-- X symbol for express -->
  <line x1="42" y1="18" x2="50" y2="26" stroke="url(#purpleGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="18" x2="42" y2="26" stroke="url(#purpleGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Kernel bypass indicator -->
  <path d="M30 42 Q40 46 52 42" fill="none" stroke="url(#purpleGrad)" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="34" y="50" font-family="monospace" font-size="5" fill="url(#silverGrad)" font-weight="bold">XDP</text>
  <!-- Stars -->
  <circle cx="8" cy="10" r="0.6" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="56" cy="14" r="0.5" fill="#5eead4" opacity="0.6"/>
  <circle cx="54" cy="54" r="0.7" fill="#a78bfa" opacity="0.5"/>
</svg>