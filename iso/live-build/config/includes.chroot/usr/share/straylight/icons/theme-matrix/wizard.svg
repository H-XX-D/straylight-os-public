<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Wizard hat -->
  <path d="M20 48l12-36 12 36H20z"/>
  <!-- Hat brim -->
  <ellipse cx="32" cy="48" rx="16" ry="4"/>
  <!-- Binary stars -->
  <text x="8" y="16" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">1</text>
  <text x="52" y="16" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">0</text>
  <text x="8" y="56" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">0</text>
  <text x="52" y="56" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">1</text>
  <!-- Magic wand cursor -->
  <line x1="44" y1="20" x2="56" y2="8" stroke-width="2"/>
  <polygon points="58,6 56,10 52,8" fill="#00ff41" stroke="none"/>
  <!-- Sparkle/magic effect -->
  <path d="M44 12l2-2 2 2-2 2z" fill="#00ff41" stroke="none"/>
  <path d="M48 16l1-1 1 1-1 1z" fill="#00ff41" stroke="none"/>
  <!-- Terminal prompt -->
  <rect x="22" y="52" width="20" height="8" rx="1" fill="#00ff41" stroke="none" opacity="0.3"/>
  <text x="24" y="58" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">&gt;_</text>
  <!-- Circuit decorations on hat -->
  <line x1="28" y1="28" x2="32" y2="28"/>
  <line x1="28" y1="28" x2="28" y2="32"/>
  <circle cx="28" cy="28" r="1.5" fill="#00ff41" stroke="none"/>
  <line x1="36" y1="36" x2="32" y2="36"/>
  <line x1="36" y1="36" x2="36" y2="40"/>
  <circle cx="36" cy="36" r="1.5" fill="#00ff41" stroke="none"/>
</svg>