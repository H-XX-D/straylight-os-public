<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="wandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
  </defs>
  <!-- Ice crystal star background -->
  <polygon points="32,6 38,22 56,22 42,32 48,50 32,40 16,50 22,32 8,22 26,22"
           fill="none" stroke="url(#iceGrad)" stroke-width="1.5" opacity="0.4"/>
  <!-- Wizard hat as ice cone -->
  <path d="M20 48 L32 12 L44 48 Z" fill="none" stroke="url(#iceGrad)" stroke-width="2" stroke-linejoin="round"/>
  <ellipse cx="32" cy="48" rx="16" ry="4" fill="none" stroke="url(#iceGrad)" stroke-width="1.5"/>
  <!-- Hat band -->
  <path d="M24 40 L40 40" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- Snowflake on hat -->
  <g transform="translate(32,28)" stroke="#e0f7ff" stroke-width="1.5">
    <line x1="0" y1="-4" x2="0" y2="4"/>
    <line x1="-3.5" y1="-2" x2="3.5" y2="2"/>
    <line x1="-3.5" y1="2" x2="3.5" y2="-2"/>
  </g>
  <!-- Magic sparkles -->
  <g fill="#e0f7ff">
    <circle cx="14" cy="18" r="2"/>
    <circle cx="50" cy="16" r="1.5"/>
    <circle cx="52" cy="36" r="1"/>
    <circle cx="12" cy="38" r="1.5"/>
  </g>
  <!-- Wand tip -->
  <circle cx="32" cy="12" r="3" fill="url(#wandGrad)"/>
</svg>