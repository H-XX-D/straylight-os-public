<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Neural network base -->
  <rect x="4" y="4" width="56" height="56" rx="2" fill="#252525" stroke="#3d3d3d" stroke-width="2"/>
  <!-- Neurons -->
  <g fill="#ff6b35">
    <!-- Input layer -->
    <circle cx="14" cy="16" r="4" opacity="0.9"/>
    <circle cx="14" cy="32" r="4" opacity="0.9"/>
    <circle cx="14" cy="48" r="4" opacity="0.9"/>
    <!-- Hidden layer -->
    <circle cx="32" cy="20" r="4" opacity="0.8"/>
    <circle cx="32" cy="36" r="4" opacity="0.8"/>
    <circle cx="32" cy="52" r="3" opacity="0.6"/>
    <!-- Output layer -->
    <circle cx="50" cy="24" r="4" opacity="0.9"/>
    <circle cx="50" cy="44" r="4" opacity="0.9"/>
  </g>
  <!-- Synapses (some broken) -->
  <g stroke="#8b4513" stroke-width="1.5" opacity="0.7" fill="none">
    <!-- Input to hidden -->
    <line x1="18" y1="16" x2="28" y2="20"/>
    <line x1="18" y1="32" x2="28" y2="20"/>
    <line x1="18" y1="32" x2="28" y2="36"/>
    <line x1="18" y1="48" x2="28" y2="36"/>
    <line x1="18" y1="48" x2="28" y2="52" opacity="0.4"/>
    <!-- Hidden to output -->
    <line x1="36" y1="20" x2="46" y2="24"/>
    <line x1="36" y1="36" x2="46" y2="24"/>
    <line x1="36" y1="36" x2="46" y2="44"/>
    <line x1="36" y1="52" x2="46" y2="44" opacity="0.4"/>
  </g>
  <!-- Broken connection -->
  <path d="M18 16 L24 22" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="24" cy="22" r="1" fill="#252525"/>
  <!-- Spikes/pulses -->
  <path d="M26 18 L28 16 L30 18" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.8"/>
  <path d="M42 30 L44 28 L46 30" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.8"/>
  <!-- Rust -->
  <circle cx="52" cy="10" r="2" fill="#a0522d" opacity="0.5"/>
</svg>