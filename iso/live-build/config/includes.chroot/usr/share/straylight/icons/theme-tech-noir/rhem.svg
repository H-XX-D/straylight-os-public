<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Industrial panel base -->
  <rect x="6" y="6" width="52" height="52" rx="2" fill="#2a2a2a" stroke="#3d3d3d" stroke-width="2"/>
  <!-- Power gauge -->
  <path d="M16 48 A16 16 0 0 1 48 48" fill="none" stroke="#4a4a4a" stroke-width="4" stroke-linecap="round"/>
  <!-- Power level (fluctuating) -->
  <path d="M16 48 A16 16 0 0 1 28 34" fill="none" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <!-- Needle -->
  <line x1="32" y1="48" x2="24" y2="36" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="48" r="3" fill="#1a1a1a" stroke="#ff6b35" stroke-width="1"/>
  <!-- Energy cells (one damaged) -->
  <rect x="10" y="14" width="10" height="16" rx="1" fill="#1a1a1a" stroke="#8b4513" stroke-width="1"/>
  <rect x="12" y="24" width="6" height="4" fill="#ff6b35" opacity="0.8"/>
  <rect x="24" y="14" width="10" height="16" rx="1" fill="#1a1a1a" stroke="#ff6b35" stroke-width="1"/>
  <rect x="26" y="20" width="6" height="8" fill="#ff6b35" opacity="0.9"/>
  <!-- Damaged cell -->
  <rect x="38" y="14" width="10" height="16" rx="1" fill="#1a1a1a" stroke="#8b4513" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="40" y="26" width="6" height="2" fill="#8b4513" opacity="0.5"/>
  <path d="M44 14 L48 18" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Warning stripe -->
  <rect x="6" y="54" width="52" height="4" fill="#ff6b35" opacity="0.6"/>
  <!-- Rust -->
  <circle cx="52" y="10" r="2" fill="#a0522d" opacity="0.5"/>
</svg>