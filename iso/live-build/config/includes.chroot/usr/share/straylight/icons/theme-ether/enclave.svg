<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="encShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    <radialGradient id="encCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Ethereal shield outline -->
  <path d="M32 6 Q48 12 52 20 Q54 32 48 44 Q42 54 32 58 Q22 54 16 44 Q10 32 12 20 Q16 12 32 6"
        fill="none" stroke="url(#encShield)" stroke-width="2" opacity="0.9"/>
  <!-- Inner shield glow -->
  <path d="M32 10 Q44 15 47 22 Q49 32 44 42 Q40 50 32 53 Q24 50 20 42 Q15 32 17 22 Q20 15 32 10"
        fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
  </path>
  <!-- Sacred core -->
  <circle cx="32" cy="32" r="10" fill="url(#encCore)" opacity="0.7">
    <animate attributeName="r" values="10;12;10" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Divine lock/seal -->
  <rect x="28" y="28" width="8" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="32" cy="24" r="3" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.9"/>
  <line x1="32" y1="21" x2="32" y2="24" stroke="#d4af37" stroke-width="2"/>
  <!-- Spiritual protection rays -->
  <line x1="32" y1="2" x2="32" y2="6" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="58" x2="32" y2="62" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="32" x2="12" y2="32" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="52" y1="32" x2="56" y2="32" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <!-- Mystical corners -->
  <circle cx="12" cy="20" r="1.5" fill="#d4af37" opacity="0.7"/>
  <circle cx="52" cy="20" r="1.5" fill="#d4af37" opacity="0.7"/>
  <circle cx="16" cy="44" r="1.5" fill="#d4af37" opacity="0.7"/>
  <circle cx="48" cy="44" r="1.5" fill="#d4af37" opacity="0.7"/>
  <!-- Floating key -->
  <path d="M32 32 L32 38 M30 36 L34 36" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
</svg>