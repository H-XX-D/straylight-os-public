<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Stacked ice boxes (model layers) -->
  <g fill="url(#boxGrad)" stroke="url(#iceGrad)" stroke-width="1.5">
    <polygon points="32,4 56,16 56,28 32,40 8,28 8,16"/>
    <polygon points="32,16 56,28 56,40 32,52 8,40 8,28" opacity="0.7"/>
    <polygon points="32,28 56,40 56,52 32,64 8,52 8,40" opacity="0.5"/>
  </g>
  <!-- Snowflake markers on layers -->
  <g transform="translate(32,20)" stroke="#e0f7ff" stroke-width="1">
    <line x1="0" y1="-3" x2="0" y2="3"/>
    <line x1="-2.5" y1="-1.5" x2="2.5" y2="1.5"/>
    <line x1="-2.5" y1="1.5" x2="2.5" y2="-1.5"/>
  </g>
  <g transform="translate(32,32)" stroke="#e0f7ff" stroke-width="1" opacity="0.8">
    <line x1="0" y1="-3" x2="0" y2="3"/>
    <line x1="-2.5" y1="-1.5" x2="2.5" y2="1.5"/>
    <line x1="-2.5" y1="1.5" x2="2.5" y2="-1.5"/>
  </g>
  <g transform="translate(32,44)" stroke="#e0f7ff" stroke-width="1" opacity="0.6">
    <line x1="0" y1="-3" x2="0" y2="3"/>
    <line x1="-2.5" y1="-1.5" x2="2.5" y2="1.5"/>
    <line x1="-2.5" y1="1.5" x2="2.5" y2="-1.5"/>
  </g>
  <!-- Frost sparkle -->
  <circle cx="50" cy="10" r="2" fill="#4fc3f7" opacity="0.7"/>
</svg>