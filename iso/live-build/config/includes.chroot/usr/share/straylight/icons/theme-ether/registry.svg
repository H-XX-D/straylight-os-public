<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="regStack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c0c0c0" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- Ethereal scroll/registry -->
  <path d="M20 12 Q16 12 16 16 L16 52 Q16 56 20 56 L44 56 Q48 56 48 52 L48 16 Q48 12 44 12 Z"
        fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <!-- Divine scroll ends -->
  <path d="M16 16 Q16 20 20 20 L44 20 Q48 20 48 16" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.7"/>
  <path d="M16 52 Q16 48 20 48 L44 48 Q48 48 48 52" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.7"/>
  <!-- Model entries -->
  <rect x="22" y="24" width="20" height="4" rx="1" fill="#ffffff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="22" y="30" width="16" height="4" rx="1" fill="#d4af37" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="22" y="36" width="18" height="4" rx="1" fill="#ffffff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="22" y="42" width="14" height="4" rx="1" fill="#c0c0c0" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Spiritual seal -->
  <circle cx="32" cy="16" r="4" fill="#d4af37" opacity="0.8">
    <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="30" y="18" fill="#ffffff" font-family="serif" font-size="5" opacity="0.9">R</text>
  <!-- Mystical ribbons -->
  <path d="M16 28 Q12 32 16 36" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <path d="M48 28 Q52 32 48 36" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <!-- Sacred stars -->
  <text x="10" y="20" fill="#d4af37" font-family="serif" font-size="4" opacity="0.6">✦</text>
  <text x="52" y="20" fill="#d4af37" font-family="serif" font-size="4" opacity="0.6">✦</text>
  <text x="10" y="52" fill="#d4af37" font-family="serif" font-size="4" opacity="0.6">✦</text>
  <text x="52" y="52" fill="#d4af37" font-family="serif" font-size="4" opacity="0.6">✦</text>
  <!-- Registry index glow -->
  <line x1="20" y1="16" x2="44" y2="16" stroke="#d4af37" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2">
    <animate attributeName="stroke-dashoffset" values="0;4" dur="1s" repeatCount="indefinite"/>
  </line>
</svg>