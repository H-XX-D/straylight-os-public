<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="photoBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="photoGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Ethereal light beams -->
  <line x1="4" y1="20" x2="60" y2="20" stroke="url(#photoBeam)" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="4" y1="32" x2="60" y2="32" stroke="url(#photoBeam)" stroke-width="3" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="4" y1="44" x2="60" y2="44" stroke="url(#photoBeam)" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <!-- Divine prism/crystal -->
  <path d="M28 16 L36 16 L40 32 L32 48 L24 32 Z" fill="none" stroke="url(#photoGold)" stroke-width="1.5" opacity="0.9"/>
  <path d="M28 16 L32 32 L36 16" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <path d="M24 32 L32 32 L40 32" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <path d="M32 32 L32 48" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.7"/>
  <!-- Photons/particles -->
  <circle cx="10" cy="20" r="1.5" fill="#ffffff">
    <animate attributeName="cx" values="10;54;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="10" cy="32" r="2" fill="#d4af37">
    <animate attributeName="cx" values="10;54;10" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="10" cy="44" r="1.5" fill="#ffffff">
    <animate attributeName="cx" values="10;54;10" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Spiritual glow -->
  <ellipse cx="32" cy="32" rx="12" ry="20" fill="url(#photoBeam)" opacity="0.2">
    <animate attributeName="rx" values="12;14;12" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Optical fiber endpoints -->
  <circle cx="8" cy="20" r="3" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <circle cx="8" cy="32" r="3" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <circle cx="8" cy="44" r="3" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <circle cx="56" cy="20" r="3" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <circle cx="56" cy="32" r="3" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <circle cx="56" cy="44" r="3" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
</svg>