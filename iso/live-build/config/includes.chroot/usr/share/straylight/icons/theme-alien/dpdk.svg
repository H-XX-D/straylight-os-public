<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bypassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff85"/>
      <stop offset="100%" stop-color="#00cc44"/>
    </linearGradient>
  </defs>
  <!-- Bypass tunnel - organic tube -->
  <path d="M12 20c10-5 30-5 40 0v24c-10 5-30 5-40 0z" fill="none" stroke="#39ff85" stroke-width="4" filter="url(#glow)"/>
  <!-- Inner slime flow -->
  <path d="M16 24c8-3 24-3 32 0v16c-8 3-24 3-32 0z" fill="#39ff85" opacity="0.4"/>
  <!-- Fast packet blobs -->
  <ellipse cx="20" cy="32" rx="5" ry="3" fill="#7fffab" filter="url(#glow)"/>
  <ellipse cx="36" cy="32" rx="5" ry="3" fill="#7fffab" filter="url(#glow)"/>
  <!-- Speed tentacles -->
  <path d="M8 32c-3 0-5-2-5-4" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M8 32c-3 0-5 2-5 4" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M56 32c3 0 5-2 5-4" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M56 32c3 0 5 2 5 4" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Bypass arrows -->
  <path d="M24 32l6-3v6z" fill="#bfffdb"/>
  <path d="M40 32l6-3v6z" fill="#bfffdb"/>
</svg>