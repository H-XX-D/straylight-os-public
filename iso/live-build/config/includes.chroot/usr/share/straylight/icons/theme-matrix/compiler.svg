<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Terminal window -->
  <rect x="8" y="8" width="48" height="48" rx="2"/>
  <line x1="8" y1="16" x2="56" y2="16"/>
  <!-- Window controls -->
  <circle cx="12" cy="12" r="1.5" fill="#00ff41" stroke="none"/>
  <circle cx="16" cy="12" r="1.5" fill="#00ff41" stroke="none"/>
  <circle cx="20" cy="12" r="1.5" fill="#00ff41" stroke="none"/>
  <!-- Code lines transforming -->
  <g opacity="0.6">
    <line x1="12" y1="24" x2="28" y2="24"/>
    <line x1="12" y1="28" x2="24" y2="28"/>
    <line x1="12" y1="32" x2="30" y2="32"/>
  </g>
  <!-- Arrow -->
  <polyline points="34,28 38,24 34,20"/>
  <line x1="38" y1="24" x2="30" y2="24"/>
  <!-- Output/binary -->
  <text x="42" y="26" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">010</text>
  <text x="42" y="32" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">110</text>
  <text x="42" y="38" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">001</text>
  <!-- Circuit decoration -->
  <path d="M12 48l4-4 4 4 4-4 4 4" fill="none"/>
  <circle cx="16" cy="44" r="1" fill="#00ff41" stroke="none"/>
  <circle cx="24" cy="44" r="1" fill="#00ff41" stroke="none"/>
  <circle cx="32" cy="44" r="1" fill="#00ff41" stroke="none"/>
</svg>