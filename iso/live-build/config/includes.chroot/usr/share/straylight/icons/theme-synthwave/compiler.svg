<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <defs>
    <!-- Sunset gradient -->
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7931e"/>
      <stop offset="100%" style="stop-color:#ff00a0"/>
    </linearGradient>
    <!-- Cyan glow -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <!-- Chrome gradient -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00a0"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#ff00a0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Pink glow filter -->
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Cyan glow filter -->
    <filter id="cyanGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with grid -->
  <rect width="64" height="64" fill="#1a0b2e" rx="4"/>
  <rect width="64" height="64" fill="url(#grid)" rx="4"/>

  <!-- JIT Compiler Icon -->
  <rect x="10" y="14" width="18" height="22" rx="2" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#cyanGlowFilter)"/>
  <line x1="14" y1="20" x2="24" y2="20" stroke="#00ffff" stroke-width="1"/>
  <line x1="14" y1="26" x2="22" y2="26" stroke="#00ffff" stroke-width="1"/>
  <line x1="14" y1="32" x2="20" y2="32" stroke="#00ffff" stroke-width="1"/>
  <path d="M 32 25 L 44 25" stroke="url(#chrome)" stroke-width="2" filter="url(#pinkGlow)"/>
  <path d="M 40 21 L 44 25 L 40 29" fill="none" stroke="url(#chrome)" stroke-width="2"/>
  <circle cx="52" cy="36" r="8" fill="none" stroke="#ff00a0" stroke-width="2" filter="url(#pinkGlow)"/>
  <path d="M 52 28 L 52 26 M 52 44 L 52 46 M 44 36 L 42 36 M 60 36 L 62 36" stroke="#ff00a0" stroke-width="2"/>
  <path d="M 46 30 L 44 28 M 58 42 L 60 44 M 46 42 L 44 44 M 58 30 L 60 28" stroke="#ff00a0" stroke-width="2"/>
  <circle cx="52" cy="36" r="3" fill="#f7931e"/>

</svg>