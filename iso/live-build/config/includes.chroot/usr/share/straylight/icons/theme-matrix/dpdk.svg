<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Network bypass symbol -->
  <rect x="12" y="20" width="40" height="24" rx="2"/>
  <!-- Bypass arrow going around -->
  <path d="M16 32c-6 0-6-10 0-10h32c6 0 6 10 0 10" fill="none"/>
  <polyline points="44,26 52,32 44,38"/>
  <!-- Lightning bolt for speed -->
  <path d="M28 20l-4 12h8l-4 12" fill="none" stroke-width="2"/>
  <!-- Binary stream -->
  <g opacity="0.5">
    <text x="16" y="48" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">1101</text>
    <text x="40" y="16" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">0110</text>
  </g>
  <!-- Data packets -->
  <rect x="20" y="28" width="6" height="8" fill="#00ff41" stroke="none" opacity="0.7"/>
  <rect x="30" y="28" width="6" height="8" fill="#00ff41" stroke="none" opacity="0.5"/>
  <!-- Circuit nodes -->
  <circle cx="8" cy="32" r="2" fill="#00ff41" stroke="none"/>
  <circle cx="56" cy="32" r="2" fill="#00ff41" stroke="none"/>
  <line x1="8" y1="32" x2="12" y2="32"/>
  <line x1="52" y1="32" x2="56" y2="32"/>
</svg>