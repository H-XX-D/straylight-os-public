<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
    <radialGradient id="steam" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#8a8a8a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4a4a4a;stop-opacity:0.2"/>
    </radialGradient>
  </defs>

  <!-- Main generator housing -->
  <rect x="10" y="36" width="44" height="22" rx="3" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Turbine/rotor inside -->
  <circle cx="32" cy="47" r="8" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <g stroke="url(#rust)" stroke-width="2">
    <line x1="32" y1="39" x2="32" y2="55"/>
    <line x1="24" y1="47" x2="40" y2="47"/>
    <line x1="26.3" y1="41.3" x2="37.7" y2="52.7"/>
    <line x1="37.7" y1="41.3" x2="26.3" y2="52.7"/>
  </g>

  <!-- Steam/random particles rising -->
  <circle cx="20" cy="30" r="4" fill="url(#steam)"/>
  <circle cx="32" cy="24" r="5" fill="url(#steam)"/>
  <circle cx="44" cy="28" r="4" fill="url(#steam)"/>
  <circle cx="26" cy="18" r="3" fill="url(#steam)"/>
  <circle cx="38" cy="14" r="3" fill="url(#steam)"/>

  <!-- Random bits/entropy visual -->
  <g fill="url(#brass)">
    <rect x="16" y="42" width="3" height="3" rx="0.5"/>
    <rect x="45" y="40" width="3" height="3" rx="0.5"/>
    <rect x="14" y="50" width="3" height="3" rx="0.5"/>
    <rect x="47" y="52" width="3" height="3" rx="0.5"/>
  </g>

  <!-- Exhaust pipes -->
  <line x1="22" y1="36" x2="22" y2="30" stroke="url(#steel)" stroke-width="3"/>
  <line x1="32" y1="36" x2="32" y2="24" stroke="url(#steel)" stroke-width="3"/>
  <line x1="42" y1="36" x2="42" y2="28" stroke="url(#steel)" stroke-width="3"/>

  <!-- Base rivets -->
  <circle cx="16" cy="54" r="1.5" fill="url(#brass)"/>
  <circle cx="48" cy="54" r="1.5" fill="url(#brass)"/>
</svg>