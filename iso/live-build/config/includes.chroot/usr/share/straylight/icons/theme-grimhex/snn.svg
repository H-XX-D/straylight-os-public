<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon frame -->
  <path d="M32 4 L56 16 L56 44 L32 56 L8 44 L8 16 Z" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>

  <!-- Neural network nodes -->
  <!-- Input layer -->
  <circle cx="16" cy="18" r="3" fill="currentColor" opacity="0.5"/>
  <circle cx="16" cy="28" r="3" fill="currentColor" opacity="0.5"/>
  <circle cx="16" cy="38" r="3" fill="currentColor" opacity="0.5"/>

  <!-- Hidden layer -->
  <circle cx="32" cy="22" r="3" fill="currentColor" opacity="0.7"/>
  <circle cx="32" cy="34" r="3" fill="currentColor" opacity="0.7"/>

  <!-- Output layer -->
  <circle cx="48" cy="28" r="3" fill="currentColor" opacity="0.9"/>

  <!-- Spiking connections -->
  <line x1="19" y1="18" x2="29" y2="22" stroke="currentColor" stroke-width="1"/>
  <line x1="19" y1="28" x2="29" y2="22" stroke="currentColor" stroke-width="1"/>
  <line x1="19" y1="28" x2="29" y2="34" stroke="currentColor" stroke-width="1"/>
  <line x1="19" y1="38" x2="29" y2="34" stroke="currentColor" stroke-width="1"/>

  <line x1="35" y1="22" x2="45" y2="28" stroke="currentColor" stroke-width="1.5"/>
  <line x1="35" y1="34" x2="45" y2="28" stroke="currentColor" stroke-width="1.5"/>

  <!-- Spike pulses -->
  <circle cx="24" cy="20" r="1.5" fill="currentColor"/>
  <circle cx="24" cy="31" r="1.5" fill="currentColor" opacity="0.7"/>
  <circle cx="40" cy="26" r="1.5" fill="currentColor" opacity="0.9"/>

  <!-- Waveform -->
  <path d="M10 48 L12 44 L14 50 L16 44 L18 48" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/>
  <path d="M46 48 L48 42 L50 50 L52 44 L54 48" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/>
</svg>