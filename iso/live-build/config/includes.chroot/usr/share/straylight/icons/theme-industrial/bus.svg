<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b87333"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- Main bus frame -->
  <rect x="4" y="14" width="56" height="36" rx="3" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Data lines -->
  <g stroke-linecap="round">
    <line x1="10" y1="22" x2="54" y2="22" stroke="url(#copper)" stroke-width="3"/>
    <line x1="10" y1="29" x2="54" y2="29" stroke="url(#brass)" stroke-width="3"/>
    <line x1="10" y1="36" x2="54" y2="36" stroke="url(#rust)" stroke-width="3"/>
    <line x1="10" y1="43" x2="54" y2="43" stroke="url(#steel)" stroke-width="3"/>
  </g>

  <!-- Connection ports -->
  <rect x="8" y="19" width="6" height="8" rx="1" fill="url(#brass)"/>
  <rect x="8" y="33" width="6" height="8" rx="1" fill="url(#brass)"/>
  <rect x="50" y="19" width="6" height="8" rx="1" fill="url(#brass)"/>
  <rect x="50" y="33" width="6" height="8" rx="1" fill="url(#brass)"/>

  <!-- Indicator lights -->
  <circle cx="16" cy="18" r="2" fill="#8b4513"/>
  <circle cx="22" cy="18" r="2" fill="#daa520"/>
  <circle cx="28" cy="18" r="2" fill="#8b4513"/>

  <!-- Rivets -->
  <circle cx="8" cy="14" r="1.5" fill="url(#brass)"/>
  <circle cx="56" cy="14" r="1.5" fill="url(#brass)"/>
  <circle cx="8" cy="50" r="1.5" fill="url(#brass)"/>
  <circle cx="56" cy="50" r="1.5" fill="url(#brass)"/>
</svg>