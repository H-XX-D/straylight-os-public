<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon frame -->
  <path d="M32 4 L56 16 L56 44 L32 56 L8 44 L8 16 Z" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>

  <!-- Qubit core -->
  <circle cx="32" cy="28" r="5" fill="currentColor" opacity="0.2"/>
  <circle cx="32" cy="28" r="3" fill="currentColor"/>

  <!-- Quantum orbits -->
  <ellipse cx="32" cy="28" rx="14" ry="6" fill="none" stroke="currentColor" stroke-width="1" transform="rotate(0 32 28)"/>
  <ellipse cx="32" cy="28" rx="14" ry="6" fill="none" stroke="currentColor" stroke-width="1" transform="rotate(60 32 28)"/>
  <ellipse cx="32" cy="28" rx="14" ry="6" fill="none" stroke="currentColor" stroke-width="1" transform="rotate(120 32 28)"/>

  <!-- Qubit states -->
  <circle cx="46" cy="28" r="2" fill="currentColor" opacity="0.9"/>
  <circle cx="25" cy="40" r="2" fill="currentColor" opacity="0.7"/>
  <circle cx="25" cy="16" r="2" fill="currentColor" opacity="0.8"/>

  <!-- Superposition indicators -->
  <line x1="32" y1="8" x2="32" y2="12" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="32" y1="44" x2="32" y2="48" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="10" y1="28" x2="14" y2="28" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="50" y1="28" x2="54" y2="28" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>

  <!-- Phase dots -->
  <circle cx="32" cy="8" r="1" fill="currentColor" opacity="0.4"/>
  <circle cx="32" cy="48" r="1" fill="currentColor" opacity="0.4"/>
</svg>