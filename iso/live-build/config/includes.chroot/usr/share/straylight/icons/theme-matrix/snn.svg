<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Neural network layers -->
  <!-- Input layer -->
  <circle cx="12" cy="16" r="3" fill="#00ff41" stroke="none"/>
  <circle cx="12" cy="32" r="3" fill="#00ff41" stroke="none"/>
  <circle cx="12" cy="48" r="3" fill="#00ff41" stroke="none"/>
  <!-- Hidden layer 1 -->
  <circle cx="28" cy="12" r="3" fill="#00ff41" stroke="none"/>
  <circle cx="28" cy="24" r="3" fill="#00ff41" stroke="none"/>
  <circle cx="28" cy="36" r="3" fill="#00ff41" stroke="none"/>
  <circle cx="28" cy="48" r="3" fill="#00ff41" stroke="none"/>
  <!-- Hidden layer 2 -->
  <circle cx="44" cy="20" r="3" fill="#00ff41" stroke="none"/>
  <circle cx="44" cy="36" r="3" fill="#00ff41" stroke="none"/>
  <circle cx="44" cy="48" r="3" fill="#00ff41" stroke="none"/>
  <!-- Output layer -->
  <circle cx="56" cy="28" r="3" fill="#00ff41" stroke="none"/>
  <circle cx="56" cy="44" r="3" fill="#00ff41" stroke="none"/>
  <!-- Connections -->
  <line x1="15" y1="16" x2="25" y2="12"/>
  <line x1="15" y1="16" x2="25" y2="24"/>
  <line x1="15" y1="32" x2="25" y2="24"/>
  <line x1="15" y1="32" x2="25" y2="36"/>
  <line x1="15" y1="48" x2="25" y2="36"/>
  <line x1="15" y1="48" x2="25" y2="48"/>
  <line x1="31" y1="12" x2="41" y2="20"/>
  <line x1="31" y1="24" x2="41" y2="20"/>
  <line x1="31" y1="24" x2="41" y2="36"/>
  <line x1="31" y1="36" x2="41" y2="36"/>
  <line x1="31" y1="36" x2="41" y2="48"/>
  <line x1="31" y1="48" x2="41" y2="48"/>
  <line x1="47" y1="20" x2="53" y2="28"/>
  <line x1="47" y1="36" x2="53" y2="28"/>
  <line x1="47" y1="36" x2="53" y2="44"/>
  <line x1="47" y1="48" x2="53" y2="44"/>
  <!-- Pulse indicators -->
  <circle cx="20" cy="20" r="1" fill="#00ff41" stroke="none" opacity="0.5"/>
  <circle cx="36" cy="30" r="1" fill="#00ff41" stroke="none" opacity="0.5"/>
  <circle cx="50" cy="36" r="1" fill="#00ff41" stroke="none" opacity="0.5"/>
  <!-- Binary input -->
  <text x="6" y="10" font-family="monospace" font-size="3" fill="#00ff41" stroke="none">101</text>
</svg>