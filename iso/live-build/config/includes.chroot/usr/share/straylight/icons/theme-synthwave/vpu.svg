<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <defs>
    <!-- Sunset gradient -->
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7931e"/>
      <stop offset="100%" style="stop-color:#ff00a0"/>
    </linearGradient>
    <!-- Cyan glow -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <!-- Chrome gradient -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00a0"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#ff00a0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Pink glow filter -->
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Cyan glow filter -->
    <filter id="cyanGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with grid -->
  <rect width="64" height="64" fill="#1a0b2e" rx="4"/>
  <rect width="64" height="64" fill="url(#grid)" rx="4"/>

  <!-- Virtual GPU Icon -->
  <rect x="16" y="12" width="32" height="40" rx="3" fill="none" stroke="url(#chrome)" stroke-width="2" filter="url(#pinkGlow)"/>
  <rect x="22" y="18" width="8" height="8" rx="1" fill="#00ffff" filter="url(#cyanGlowFilter)" opacity="0.8"/>
  <rect x="34" y="18" width="8" height="8" rx="1" fill="#00ffff" filter="url(#cyanGlowFilter)" opacity="0.8"/>
  <rect x="22" y="30" width="8" height="8" rx="1" fill="#00ffff" filter="url(#cyanGlowFilter)" opacity="0.8"/>
  <rect x="34" y="30" width="8" height="8" rx="1" fill="#00ffff" filter="url(#cyanGlowFilter)" opacity="0.8"/>
  <text x="26" y="48" font-family="monospace" font-size="8" fill="#f7931e" font-weight="bold">V</text>
  <line x1="10" y1="20" x2="14" y2="20" stroke="#ff00a0" stroke-width="1"/>
  <line x1="10" y1="32" x2="14" y2="32" stroke="#ff00a0" stroke-width="1"/>
  <line x1="10" y1="44" x2="14" y2="44" stroke="#ff00a0" stroke-width="1"/>
  <line x1="50" y1="20" x2="54" y2="20" stroke="#ff00a0" stroke-width="1"/>
  <line x1="50" y1="32" x2="54" y2="32" stroke="#ff00a0" stroke-width="1"/>
  <line x1="50" y1="44" x2="54" y2="44" stroke="#ff00a0" stroke-width="1"/>

</svg>