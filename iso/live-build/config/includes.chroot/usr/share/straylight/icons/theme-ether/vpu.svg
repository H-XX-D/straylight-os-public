<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vpuChip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    <linearGradient id="vpuGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8941f"/>
    </linearGradient>
  </defs>
  <!-- Ethereal GPU chip -->
  <rect x="14" y="14" width="36" height="36" rx="3" fill="none" stroke="url(#vpuChip)" stroke-width="1.5" opacity="0.8"/>
  <!-- Divine rendering cores -->
  <rect x="20" y="20" width="8" height="8" fill="#ffffff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="32" y="20" width="8" height="8" fill="#d4af37" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="20" y="32" width="8" height="8" fill="#d4af37" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="32" y="32" width="8" height="8" fill="#ffffff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.4s" repeatCount="indefinite"/>
  </rect>
  <!-- Virtual overlay -->
  <path d="M14 14 L20 20 M50 14 L44 20 M14 50 L20 44 M50 50 L44 44" stroke="#d4af37" stroke-width="0.5" opacity="0.5"/>
  <!-- Spiritual video output -->
  <rect x="28" y="8" width="8" height="6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="11" x2="34" y2="11" stroke="#d4af37" stroke-width="1" opacity="0.9">
    <animate attributeName="x2" values="34;30;34" dur="1s" repeatCount="indefinite"/>
  </line>
  <!-- Divine rays/beams -->
  <line x1="8" y1="20" x2="14" y2="22" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <line x1="8" y1="32" x2="14" y2="32" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <line x1="8" y1="44" x2="14" y2="42" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <line x1="56" y1="20" x2="50" y2="22" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <line x1="56" y1="32" x2="50" y2="32" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <line x1="56" y1="44" x2="50" y2="42" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <!-- Mystical center glow -->
  <circle cx="28" cy="28" r="2" fill="#d4af37" opacity="0.8">
    <animate attributeName="r" values="2;3;2" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="36" r="2" fill="#ffffff" opacity="0.8">
    <animate attributeName="r" values="2;3;2" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Sacred V indicator -->
  <text x="28" y="56" fill="#d4af37" font-family="serif" font-size="6" opacity="0.7">V</text>
</svg>