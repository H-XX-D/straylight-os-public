<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#e0f7ff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Optical fiber / ice crystal -->
  <path d="M8 32 Q20 20 32 32 Q44 44 56 32" fill="none" stroke="url(#iceGrad)" stroke-width="3"/>
  <!-- Light beams -->
  <path d="M8 28 Q20 16 32 28 Q44 40 56 28" fill="none" stroke="url(#beamGrad)" stroke-width="1" opacity="0.6"/>
  <path d="M8 36 Q20 24 32 36 Q44 48 56 36" fill="none" stroke="url(#beamGrad)" stroke-width="1" opacity="0.6"/>
  <!-- Crystal nodes -->
  <g fill="#e0f7ff">
    <polygon points="8,32 6,30 6,34"/>
    <polygon points="56,32 58,30 58,34"/>
  </g>
  <!-- Snowflake prisms -->
  <g transform="translate(32,32)" stroke="#4fc3f7" stroke-width="1">
    <line x1="-6" y1="-6" x2="6" y2="6"/>
    <line x1="6" y1="-6" x2="-6" y2="6"/>
    <circle r="4" fill="none" stroke="#e0f7ff" stroke-width="1.5"/>
  </g>
  <!-- Light rays -->
  <line x1="32" y1="8" x2="32" y2="16" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="10" x2="28" y2="16" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="10" x2="36" y2="16" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
</svg>