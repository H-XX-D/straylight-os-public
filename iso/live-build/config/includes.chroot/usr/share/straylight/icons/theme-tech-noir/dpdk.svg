  <rect x="4" y="4" width="56" height="56" rx="2" fill="#252525" stroke="#3d3d3d" stroke-width="2"/>
  <!-- Bypass tunnel -->
  <path d="M8 32 L56 32" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round"/>
  <path d="M8 32 L56 32" stroke="#4a4a4a" stroke-width="8" stroke-linecap="round"/>
