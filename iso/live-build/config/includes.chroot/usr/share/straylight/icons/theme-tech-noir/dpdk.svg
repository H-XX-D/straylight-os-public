  <circle cx="12" cy="50" r="3" fill="#8b4513" opacity="0.5"/>
  <circle cx="52" cy="14" r="2" fill="#a0522d" opacity="0.4"/>
  <!-- Cracks -->
  <path d="M4 48 L8 52" stroke="#0d0d0d" stroke-width="1"/>
