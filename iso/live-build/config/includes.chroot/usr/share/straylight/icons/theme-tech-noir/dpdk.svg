  <!-- Lightning bolts (speed) -->
  <path d="M18 24 L22 32 L18 32 L24 40" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linejoin="round"/>
  <path d="M40 24 L44 32 L40 32 L46 40" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linejoin="round"/>
  <!-- Kernel boundary (broken) -->
