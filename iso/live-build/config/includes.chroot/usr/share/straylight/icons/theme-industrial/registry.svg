<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- Filing cabinet body -->
  <rect x="12" y="8" width="40" height="48" rx="2" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Drawer 1 -->
  <rect x="16" y="12" width="32" height="12" rx="1" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <rect x="30" y="16" width="4" height="4" rx="1" fill="url(#rust)"/>
  <line x1="20" y1="18" x2="26" y2="18" stroke="url(#steel)" stroke-width="1.5"/>

  <!-- Drawer 2 -->
  <rect x="16" y="26" width="32" height="12" rx="1" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <rect x="30" y="30" width="4" height="4" rx="1" fill="url(#rust)"/>
  <line x1="20" y1="32" x2="26" y2="32" stroke="url(#steel)" stroke-width="1.5"/>

  <!-- Drawer 3 -->
  <rect x="16" y="40" width="32" height="12" rx="1" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <rect x="30" y="44" width="4" height="4" rx="1" fill="url(#rust)"/>
  <line x1="20" y1="46" x2="26" y2="46" stroke="url(#steel)" stroke-width="1.5"/>

  <!-- Label holders -->
  <rect x="38" y="14" width="8" height="3" rx="0.5" fill="url(#rust)"/>
  <rect x="38" y="28" width="8" height="3" rx="0.5" fill="url(#rust)"/>
  <rect x="38" y="42" width="8" height="3" rx="0.5" fill="url(#rust)"/>

  <!-- Cabinet feet -->
  <rect x="14" y="56" width="4" height="4" rx="1" fill="url(#brass)"/>
  <rect x="46" y="56" width="4" height="4" rx="1" fill="url(#brass)"/>

  <!-- Top label plate -->
  <rect x="20" y="4" width="24" height="4" rx="1" fill="url(#brass)"/>
</svg>