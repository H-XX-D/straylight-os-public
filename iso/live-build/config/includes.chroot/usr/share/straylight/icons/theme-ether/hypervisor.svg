<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hypLayer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c0c0c0" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Ethereal layers - bottom -->
  <rect x="12" y="42" width="40" height="10" rx="2" fill="url(#hypLayer)" stroke="#ffffff" stroke-width="0.5" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-1; 0,0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Middle layer -->
  <rect x="14" y="32" width="36" height="10" rx="2" fill="url(#hypLayer)" stroke="#c0c0c0" stroke-width="0.5" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-1; 0,0" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Top layer -->
  <rect x="16" y="22" width="32" height="10" rx="2" fill="url(#hypLayer)" stroke="#d4af37" stroke-width="0.5" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-1; 0,0" dur="2s" repeatCount="indefinite"/>
  </rect>
  <!-- Divine guest VMs -->
  <circle cx="22" cy="27" r="3" fill="#ffffff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="27" r="3" fill="#d4af37" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="27" r="3" fill="#ffffff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Spiritual connections between layers -->
  <line x1="22" y1="30" x2="20" y2="38" stroke="#ffffff" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2">
    <animate attributeName="stroke-dashoffset" values="0;4" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="32" y1="30" x2="32" y2="38" stroke="#d4af37" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2">
    <animate attributeName="stroke-dashoffset" values="0;4" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <line x1="42" y1="30" x2="44" y2="38" stroke="#ffffff" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2">
    <animate attributeName="stroke-dashoffset" values="0;4" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <!-- Hypervisor crown -->
  <path d="M24 18 L32 10 L40 18" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.9"/>
  <circle cx="32" cy="14" r="2" fill="#ffffff" opacity="0.9">
    <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Mystical base glow -->
  <ellipse cx="32" cy="54" rx="20" ry="4" fill="#d4af37" opacity="0.2">
    <animate attributeName="rx" values="20;22;20" dur="3s" repeatCount="indefinite"/>
  </ellipse>
</svg>