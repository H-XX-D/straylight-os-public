<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- Base platform -->
  <rect x="4" y="48" width="56" height="10" rx="2" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Main control column -->
  <rect x="26" y="16" width="12" height="36" rx="1" fill="none" stroke="url(#brass)" stroke-width="2"/>

  <!-- Horizontal separator layers -->
  <line x1="8" y1="36" x2="56" y2="36" stroke="url(#steel)" stroke-width="2"/>
  <line x1="8" y1="24" x2="56" y2="24" stroke="url(#steel)" stroke-width="2"/>

  <!-- VM containers (left side) -->
  <rect x="8" y="28" width="14" height="12" rx="1" fill="none" stroke="url(#rust)" stroke-width="2"/>
  <rect x="8" y="40" width="14" height="12" rx="1" fill="none" stroke="url(#rust)" stroke-width="2"/>

  <!-- VM containers (right side) -->
  <rect x="42" y="28" width="14" height="12" rx="1" fill="none" stroke="url(#rust)" stroke-width="2"/>
  <rect x="42" y="40" width="14" height="12" rx="1" fill="none" stroke="url(#rust)" stroke-width="2"/>

  <!-- Central control gear -->
  <circle cx="32" cy="12" r="8" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <g stroke="url(#brass)" stroke-width="2">
    <line x1="32" y1="2" x2="32" y2="5"/>
    <line x1="32" y1="19" x2="32" y2="22"/>
    <line x1="22" y1="12" x2="25" y2="12"/>
    <line x1="39" y1="12" x2="42" y2="12"/>
    <line x1="25" y1="5" x2="27" y2="7"/>
    <line x1="37" y1="17" x2="39" y2="19"/>
    <line x1="39" y1="5" x2="37" y2="7"/>
    <line x1="25" y1="19" x2="27" y2="17"/>
  </g>

  <!-- Center hub -->
  <circle cx="32" cy="12" r="3" fill="url(#rust)"/>

  <!-- Connection indicators -->
  <line x1="15" y1="34" x2="15" y2="38" stroke="url(#brass)" stroke-width="2"/>
  <line x1="49" y1="34" x2="49" y2="38" stroke="url(#brass)" stroke-width="2"/>

  <!-- Base rivets -->
  <circle cx="10" cy="53" r="1.5" fill="url(#brass)"/>
  <circle cx="54" cy="53" r="1.5" fill="url(#brass)"/>
</svg>