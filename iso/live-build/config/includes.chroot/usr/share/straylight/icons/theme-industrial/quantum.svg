<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
    <radialGradient id="atom" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </radialGradient>
  </defs>

  <!-- Outer cooling chamber -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Vacuum chamber rings -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#brass)" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="url(#brass)" stroke-width="1"/>

  <!-- Electron orbits (industrial stylized) -->
  <ellipse cx="32" cy="32" rx="20" ry="8" fill="none" stroke="url(#rust)" stroke-width="1.5" transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="20" ry="8" fill="none" stroke="url(#rust)" stroke-width="1.5" transform="rotate(-60 32 32)"/>
  <ellipse cx="32" cy="32" rx="20" ry="8" fill="none" stroke="url(#rust)" stroke-width="1.5"/>

  <!-- Nucleus/qubit core -->
  <circle cx="32" cy="32" r="6" fill="url(#atom)"/>
  <circle cx="32" cy="32" r="3" fill="#daa520"/>

  <!-- Electrons/particles on orbits -->
  <circle cx="42" cy="24" r="2.5" fill="url(#brass)"/>
  <circle cx="22" cy="40" r="2.5" fill="url(#brass)"/>
  <circle cx="48" cy="38" r="2.5" fill="url(#brass)"/>

  <!-- Cooling pipes -->
  <g stroke="url(#steel)" stroke-width="2" fill="none">
    <path d="M8 32 L4 28"/>
    <path d="M8 32 L4 36"/>
    <path d="M56 32 L60 28"/>
    <path d="M56 32 L60 36"/>
  </g>

  <!-- Chamber bolts -->
  <circle cx="32" cy="6" r="1.5" fill="url(#brass)"/>
  <circle cx="32" cy="58" r="1.5" fill="url(#brass)"/>
  <circle cx="6" cy="32" r="1.5" fill="url(#brass)"/>
  <circle cx="58" cy="32" r="1.5" fill="url(#brass)"/>
</svg>