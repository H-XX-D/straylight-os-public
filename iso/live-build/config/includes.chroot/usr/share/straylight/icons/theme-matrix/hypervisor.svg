<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Layered VMs stack -->
  <!-- Bottom VM -->
  <rect x="12" y="44" width="40" height="10" rx="1"/>
  <!-- Middle VM -->
  <rect x="12" y="32" width="40" height="10" rx="1"/>
  <!-- Top VM -->
  <rect x="12" y="20" width="40" height="10" rx="1"/>
  <!-- Hypervisor layer -->
  <rect x="8" y="8" width="48" height="10" rx="1" fill="#00ff41" fill-opacity="0.15"/>
  <!-- Connections between layers -->
  <line x1="20" y1="18" x2="20" y2="20"/>
  <line x1="32" y1="18" x2="32" y2="20"/>
  <line x1="44" y1="18" x2="44" y2="20"/>
  <line x1="20" y1="30" x2="20" y2="32"/>
  <line x1="32" y1="30" x2="32" y2="32"/>
  <line x1="44" y1="30" x2="44" y2="32"/>
  <line x1="20" y1="42" x2="20" y2="44"/>
  <line x1="32" y1="42" x2="32" y2="44"/>
  <line x1="44" y1="42" x2="44" y2="44"/>
  <!-- VM indicators -->
  <text x="16" y="27" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">VM3</text>
  <text x="16" y="39" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">VM2</text>
  <text x="16" y="51" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">VM1</text>
  <!-- Hypervisor label -->
  <text x="14" y="15" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">HV</text>
  <!-- Binary accent -->
  <text x="44" y="27" font-family="monospace" font-size="3" fill="#00ff41" stroke="none" opacity="0.5">01</text>
  <text x="44" y="39" font-family="monospace" font-size="3" fill="#00ff41" stroke="none" opacity="0.5">10</text>
  <text x="44" y="51" font-family="monospace" font-size="3" fill="#00ff41" stroke="none" opacity="0.5">11</text>
</svg>