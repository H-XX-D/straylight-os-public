<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep sea vent as energy source -->
  <ellipse cx="32" cy="52" rx="16" ry="6" fill="#001a2e" stroke="#39ff85" stroke-width="2"/>
  <!-- Energy plumes -->
  <path d="M24 48 Q22 36 26 28 Q24 20 28 14" fill="none" stroke="#00ccff" stroke-width="2" opacity="0.8">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M32 48 Q32 34 32 24 Q32 16 32 10" fill="none" stroke="#39ff85" stroke-width="2.5" opacity="0.8">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M40 48 Q42 36 38 28 Q40 20 36 14" fill="none" stroke="#00ccff" stroke-width="2" opacity="0.8">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <!-- Energy particles rising -->
  <circle cx="28" cy="24" r="2" fill="#39ff85" opacity="0.6">
    <animate attributeName="cy" values="24;10;24" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="30" r="2.5" fill="#00ccff" opacity="0.7">
    <animate attributeName="cy" values="30;14;30" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="26" r="2" fill="#39ff85" opacity="0.6">
    <animate attributeName="cy" values="26;12;26" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Power indicator -->
  <circle cx="32" cy="52" r="4" fill="#39ff85">
    <animate attributeName="r" values="3;4.5;3" dur="1s" repeatCount="indefinite"/>
  </circle>
  <!-- Bubbles -->
  <circle cx="14" cy="42" r="2" fill="#00ccff" opacity="0.4"/>
  <circle cx="50" cy="38" r="2" fill="#39ff85" opacity="0.4"/>
</svg>