<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Optical fiber/waveguide -->
  <path d="M8 32c0-16 12-20 24-20s24 4 24 20-12 20-24 20S8 48 8 32z"/>
  <!-- Light beam -->
  <path d="M16 32c0-12 8-14 16-14s16 2 16 14-8 14-16 14-16-2-16-14z"
        fill="#00ff41" fill-opacity="0.15"/>
  <!-- Photons/light particles -->
  <line x1="24" y1="24" x2="28" y2="28" stroke-width="2"/>
  <line x1="40" y1="24" x2="36" y2="28" stroke-width="2"/>
  <line x1="24" y1="40" x2="28" y2="36" stroke-width="2"/>
  <line x1="40" y1="40" x2="36" y2="36" stroke-width="2"/>
  <!-- Light rays emanating -->
  <line x1="32" y1="8" x2="32" y2="12"/>
  <line x1="32" y1="52" x2="32" y2="56"/>
  <line x1="8" y1="32" x2="12" y2="32"/>
  <line x1="52" y1="32" x2="56" y2="32"/>
  <line x1="14" y1="14" x2="17" y2="17"/>
  <line x1="50" y1="14" x2="47" y2="17"/>
  <line x1="14" y1="50" x2="17" y2="47"/>
  <line x1="50" y1="50" x2="47" y2="47"/>
  <!-- Binary data representation -->
  <g opacity="0.5">
    <text x="28" y="6" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">1</text>
    <text x="28" y="62" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">0</text>
    <text x="4" y="35" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">1</text>
    <text x="56" y="35" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">0</text>
  </g>
  <!-- Photon dots -->
  <circle cx="32" cy="32" r="3" fill="#00ff41" stroke="none"/>
</svg>