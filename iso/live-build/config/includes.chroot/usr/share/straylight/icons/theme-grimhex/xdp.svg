<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon frame -->
  <path d="M32 4 L56 16 L56 44 L32 56 L8 44 L8 16 Z" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>

  <!-- Network packet -->
  <rect x="20" y="18" width="24" height="20" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>

  <!-- Packet header -->
  <rect x="20" y="18" width="24" height="6" fill="currentColor" opacity="0.3"/>
  <line x1="20" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="1"/>

  <!-- XDP processing points -->
  <circle cx="26" cy="21" r="1.5" fill="currentColor" opacity="0.8"/>
  <circle cx="32" cy="21" r="1.5" fill="currentColor" opacity="0.6"/>
  <circle cx="38" cy="21" r="1.5" fill="currentColor" opacity="0.8"/>

  <!-- Fast path arrow -->
  <path d="M12 38 L52 38" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="3 1"/>
  <polygon points="52,38 48,35 48,41" fill="currentColor"/>

  <!-- Kernel bypass indicator -->
  <path d="M14 30 L18 34 M50 30 L46 34" stroke="currentColor" stroke-width="1.5"/>
  <line x1="16" y1="28" x2="16" y2="32" stroke="currentColor" stroke-width="2"/>
  <line x1="48" y1="28" x2="48" y2="32" stroke="currentColor" stroke-width="2"/>

  <!-- X badge -->
  <path d="M28 44 L36 52 M36 44 L28 52" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <!-- Speed lines -->
  <line x1="12" y1="42" x2="18" y2="42" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="46" y1="42" x2="52" y2="42" stroke="currentColor" stroke-width="1" opacity="0.5"/>
</svg>