  <path d="M38 28 Q44 16 44 8" fill="none" stroke="#00ccff" stroke-width="2" stroke-linecap="round"/>
  <path d="M40 30 Q48 20 50 12" fill="none" stroke="#39ff85" stroke-width="2" stroke-linecap="round"/>
  <path d="M24 34 Q16 44 14 52" fill="none" stroke="#00ccff" stroke-width="2" stroke-linecap="round"/>
  <path d="M26 36 Q20 48 20 56" fill="none" stroke="#39ff85" stroke-width="2" stroke-linecap="round"/>
  <path d="M38 36 Q44 48 44 56" fill="none" stroke="#39ff85" stroke-width="2" stroke-linecap="round"/>
  <path d="M40 34 Q48 44 50 52" fill="none" stroke="#00ccff" stroke-width="2" stroke-linecap="round"/>
