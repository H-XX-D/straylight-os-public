<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wizard hat -->
  <path d="M20 48 L32 8 L44 48 Z" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#glow-pink)"/>
  <ellipse cx="32" cy="48" rx="16" ry="4" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glow-cyan)"/>

  <!-- Hat band -->
  <path d="M24 40 L40 40" stroke="#ffff00" stroke-width="3" filter="url(#glow-pink)"/>

  <!-- Magic stars/sparkles -->
  <path d="M16 16 L18 20 L22 20 L19 23 L20 27 L16 25 L12 27 L13 23 L10 20 L14 20 Z" fill="#ffff00" filter="url(#glow-pink)"/>
  <path d="M48 24 L49.5 27 L52.5 27 L50 29 L51 32 L48 30.5 L45 32 L46 29 L43.5 27 L46.5 27 Z" fill="#00ffff" filter="url(#glow-cyan)"/>
  <path d="M52 12 L53 14 L55 14 L53.5 15.5 L54 17.5 L52 16.5 L50 17.5 L50.5 15.5 L49 14 L51 14 Z" fill="#ff00ff" filter="url(#glow-pink)"/>

  <!-- Wand -->
  <path d="M44 44 L58 30" stroke="#ffff00" stroke-width="2" filter="url(#glow-cyan)"/>
  <circle cx="58" cy="30" r="3" fill="#ff00ff" filter="url(#glow-pink)"/>

  <!-- Setup steps -->
  <rect x="8" y="52" width="4" height="4" fill="#00ffff" filter="url(#glow-cyan)"/>
  <rect x="16" y="52" width="4" height="4" fill="#00ffff" filter="url(#glow-cyan)"/>
  <rect x="24" y="52" width="4" height="4" fill="#ffff00" filter="url(#glow-pink)"/>
  <rect x="32" y="52" width="4" height="4" fill="#00ffff" filter="url(#glow-cyan)"/>
</svg>
