<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.25"/>
    </linearGradient>
  </defs>
  <!-- AR Network Frame -->
  <rect x="4" y="4" width="56" height="56" rx="4" fill="none" stroke="#00d4ff" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.3"/>
  <!-- Neural Network Nodes -->
  <!-- Input Layer -->
  <circle cx="14" cy="16" r="4" fill="url(#g16)" stroke="#ff00ff" stroke-width="1.2" opacity="0.8"/>
  <circle cx="14" cy="32" r="4" fill="url(#g16)" stroke="#ff00ff" stroke-width="1.2" opacity="0.8"/>
  <circle cx="14" cy="48" r="4" fill="url(#g16)" stroke="#ff00ff" stroke-width="1.2" opacity="0.8"/>
  <!-- Hidden Layer -->
  <circle cx="32" cy="20" r="4" fill="url(#g16)" stroke="#00d4ff" stroke-width="1.2" opacity="0.8"/>
  <circle cx="32" cy="36" r="4" fill="url(#g16)" stroke="#00d4ff" stroke-width="1.2" opacity="0.8"/>
  <!-- Output Layer -->
  <circle cx="50" cy="24" r="4" fill="url(#g16)" stroke="#ff00ff" stroke-width="1.2" opacity="0.8"/>
  <circle cx="50" cy="40" r="4" fill="url(#g16)" stroke="#ff00ff" stroke-width="1.2" opacity="0.8"/>
  <!-- Spiking Connections -->
  <line x1="18" y1="16" x2="28" y2="20" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <line x1="18" y1="32" x2="28" y2="20" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
  <line x1="18" y1="32" x2="28" y2="36" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <line x1="18" y1="48" x2="28" y2="36" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
  <line x1="36" y1="20" x2="46" y2="24" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <line x1="36" y1="36" x2="46" y2="24" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
  <line x1="36" y1="20" x2="46" y2="40" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
  <line x1="36" y1="36" x2="46" y2="40" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <!-- Spike Indicators -->
  <circle cx="22" cy="18" r="1.5" fill="#00d4ff" opacity="0.9"/>
  <circle cx="22" cy="30" r="1.5" fill="#ff00ff" opacity="0.9"/>
  <circle cx="40" cy="26" r="1.5" fill="#ff00ff" opacity="0.9"/>
  <circle cx="40" cy="34" r="1.5" fill="#00d4ff" opacity="0.9"/>
</svg>