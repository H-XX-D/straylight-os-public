<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- GPU chip outline -->
  <rect x="12" y="12" width="40" height="40" rx="2"/>
  <!-- Chip pins -->
  <line x1="12" y1="20" x2="8" y2="20"/>
  <line x1="12" y1="28" x2="8" y2="28"/>
  <line x1="12" y1="36" x2="8" y2="36"/>
  <line x1="12" y1="44" x2="8" y2="44"/>
  <line x1="52" y1="20" x2="56" y2="20"/>
  <line x1="52" y1="28" x2="56" y2="28"/>
  <line x1="52" y1="36" x2="56" y2="36"/>
  <line x1="52" y1="44" x2="56" y2="44"/>
  <line x1="20" y1="12" x2="20" y2="8"/>
  <line x1="28" y1="12" x2="28" y2="8"/>
  <line x1="36" y1="12" x2="36" y2="8"/>
  <line x1="44" y1="12" x2="44" y2="8"/>
  <line x1="20" y1="52" x2="20" y2="56"/>
  <line x1="28" y1="52" x2="28" y2="56"/>
  <line x1="36" y1="52" x2="36" y2="56"/>
  <line x1="44" y1="52" x2="44" y2="56"/>
  <!-- Processing cores grid -->
  <rect x="16" y="16" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.6"/>
  <rect x="28" y="16" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.4"/>
  <rect x="40" y="16" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.5"/>
  <rect x="16" y="28" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.4"/>
  <rect x="28" y="28" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.8"/>
  <rect x="40" y="28" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.4"/>
  <rect x="16" y="40" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.5"/>
  <rect x="28" y="40" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.4"/>
  <rect x="40" y="40" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.6"/>
  <!-- V label -->
  <text x="26" y="8" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">VPU</text>
  <!-- Video frame symbol -->
  <rect x="24" y="22" width="16" height="12" fill="none" stroke-width="1"/>
  <line x1="24" y1="25" x2="40" y2="25" stroke-width="0.5"/>
  <line x1="24" y1="31" x2="40" y2="31" stroke-width="0.5"/>
  <line x1="28" y1="22" x2="28" y2="34" stroke-width="0.5"/>
  <line x1="32" y1="22" x2="32" y2="34" stroke-width="0.5"/>
  <line x1="36" y1="22" x2="36" y2="34" stroke-width="0.5"/>
</svg>