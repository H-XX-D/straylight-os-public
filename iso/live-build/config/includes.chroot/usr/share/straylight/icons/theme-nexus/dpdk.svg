<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Orbital bypass path -->
  <ellipse cx="32" cy="32" rx="28" ry="12" fill="none" stroke="url(#purpleGrad)" stroke-width="0.5" opacity="0.4" transform="rotate(-10 32 32)"/>
  <!-- Network card -->
  <rect x="8" y="20" width="48" height="24" rx="3" fill="none" stroke="url(#silverGrad)" stroke-width="1.5"/>
  <!-- Bypass arrow (going around) -->
  <path d="M52 26 Q58 26 58 32 Q58 38 52 38" fill="none" stroke="url(#cyanGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="50,34 56,38 50,42" fill="url(#cyanGrad)"/>
  <!-- Direct path (crossed out) -->
  <line x1="12" y1="28" x2="44" y2="28" stroke="url(#purpleGrad)" stroke-width="2" stroke-dasharray="4,2" opacity="0.5"/>
  <line x1="12" y1="36" x2="44" y2="36" stroke="url(#purpleGrad)" stroke-width="2" stroke-dasharray="4,2" opacity="0.5"/>
  <!-- Speed lines -->
  <line x1="6" y1="14" x2="14" y2="14" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.8"/>
  <line x1="4" y1="18" x2="12" y2="18" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="50" x2="58" y2="50" stroke="url(#purpleGrad)" stroke-width="1" opacity="0.7"/>
  <line x1="48" y1="54" x2="56" y2="54" stroke="url(#purpleGrad)" stroke-width="1" opacity="0.5"/>
  <!-- Stars -->
  <circle cx="6" cy="8" r="0.6" fill="#e2e8f0" opacity="0.8"/>
  <circle cx="60" cy="10" r="0.5" fill="#5eead4" opacity="0.6"/>
  <circle cx="58" cy="58" r="0.7" fill="#a78bfa" opacity="0.5"/>
</svg>