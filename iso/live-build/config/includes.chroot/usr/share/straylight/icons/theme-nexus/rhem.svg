<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <linearGradient id="energyGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  <!-- Energy orbit -->
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="url(#cyanGrad)" stroke-width="0.5" opacity="0.5" transform="rotate(-10 32 32)"/>
  <!-- Battery/energy cell -->
  <rect x="18" y="16" width="28" height="36" rx="4" fill="none" stroke="url(#silverGrad)" stroke-width="1.5"/>
  <!-- Battery cap -->
  <rect x="24" y="12" width="16" height="4" rx="1" fill="url(#silverGrad)"/>
  <!-- Energy level -->
  <rect x="22" y="40" width="20" height="8" rx="2" fill="url(#cyanGrad)" opacity="0.8"/>
  <rect x="22" y="30" width="20" height="8" rx="2" fill="url(#purpleGrad)" opacity="0.7"/>
  <rect x="22" y="20" width="20" height="8" rx="2" fill="url(#silverGrad)" opacity="0.5"/>
  <!-- Lightning bolt -->
  <path d="M30 24 L26 34 L30 34 L28 46 L38 32 L32 32 L36 24 Z" fill="url(#energyGrad)" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- Power indicator rings -->
  <circle cx="32" cy="52" r="2" fill="none" stroke="url(#cyanGrad)" stroke-width="1"/>
  <circle cx="32" cy="52" r="4" fill="none" stroke="url(#cyanGrad)" stroke-width="0.5" opacity="0.5"/>
  <!-- Stars -->
  <circle cx="8" cy="10" r="0.6" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="56" cy="14" r="0.5" fill="#5eead4" opacity="0.6"/>
  <circle cx="54" cy="54" r="0.7" fill="#a78bfa" opacity="0.5"/>
  <circle cx="10" cy="56" r="0.5" fill="#e2e8f0" opacity="0.6"/>
</svg>