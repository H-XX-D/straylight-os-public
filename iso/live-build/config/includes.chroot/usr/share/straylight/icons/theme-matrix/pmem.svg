<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Persistent memory chip -->
  <rect x="12" y="12" width="40" height="40" rx="2"/>
  <!-- Memory cells grid -->
  <line x1="12" y1="22" x2="52" y2="22"/>
  <line x1="12" y1="32" x2="52" y2="32"/>
  <line x1="12" y1="42" x2="52" y2="42"/>
  <line x1="22" y1="12" x2="22" y2="52"/>
  <line x1="32" y1="12" x2="32" y2="52"/>
  <line x1="42" y1="12" x2="42" y2="52"/>
  <!-- Memory cells with data -->
  <rect x="14" y="14" width="6" height="6" fill="#00ff41" stroke="none" opacity="0.8"/>
  <rect x="24" y="14" width="6" height="6" fill="#00ff41" stroke="none" opacity="0.5"/>
  <rect x="34" y="24" width="6" height="6" fill="#00ff41" stroke="none" opacity="0.8"/>
  <rect x="44" y="24" width="6" height="6" fill="#00ff41" stroke="none" opacity="0.5"/>
  <rect x="14" y="34" width="6" height="6" fill="#00ff41" stroke="none" opacity="0.5"/>
  <rect x="44" y="34" width="6" height="6" fill="#00ff41" stroke="none" opacity="0.8"/>
  <rect x="24" y="44" width="6" height="6" fill="#00ff41" stroke="none" opacity="0.8"/>
  <rect x="34" y="44" width="6" height="6" fill="#00ff41" stroke="none" opacity="0.5"/>
  <!-- Infinity symbol for persistence -->
  <path d="M26 56c-4 0-6-2-6-4s2-4 6-4c4 0 6 4 10 4s6-2 6-4-2-4-6-4" fill="none" stroke-width="1.5"/>
  <!-- Binary label -->
  <text x="14" y="10" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">PMEM</text>
</svg>