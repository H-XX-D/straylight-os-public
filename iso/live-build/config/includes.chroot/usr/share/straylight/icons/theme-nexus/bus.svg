<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Orbit path -->
  <ellipse cx="32" cy="32" rx="26" ry="8" fill="none" stroke="url(#purpleGrad)" stroke-width="0.5" opacity="0.5" transform="rotate(-15 32 32)"/>
  <!-- Main data bus -->
  <rect x="6" y="26" width="52" height="12" rx="3" fill="none" stroke="url(#silverGrad)" stroke-width="1.5"/>
  <!-- Data lanes -->
  <line x1="10" y1="30" x2="54" y2="30" stroke="url(#purpleGrad)" stroke-width="1.5"/>
  <line x1="10" y1="34" x2="54" y2="34" stroke="url(#cyanGrad)" stroke-width="1.5"/>
  <!-- Connection nodes -->
  <circle cx="12" cy="30" r="2" fill="#8b5cf6"/>
  <circle cx="12" cy="34" r="2" fill="#00d4aa"/>
  <circle cx="24" cy="30" r="2" fill="#a78bfa"/>
  <circle cx="24" cy="34" r="2" fill="#5eead4"/>
  <circle cx="36" cy="30" r="2" fill="#8b5cf6"/>
  <circle cx="36" cy="34" r="2" fill="#00d4aa"/>
  <circle cx="48" cy="30" r="2" fill="#a78bfa"/>
  <circle cx="48" cy="34" r="2" fill="#5eead4"/>
  <!-- Stars -->
  <circle cx="6" cy="10" r="0.6" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="58" cy="14" r="0.5" fill="#5eead4" opacity="0.6"/>
  <circle cx="60" cy="50" r="0.7" fill="#a78bfa" opacity="0.5"/>
  <!-- Signal indicators -->
  <circle cx="8" cy="18" r="1.5" fill="none" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="56" cy="46" r="1.5" fill="none" stroke="url(#purpleGrad)" stroke-width="1" opacity="0.8">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>