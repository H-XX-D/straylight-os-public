<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Manta ray shaped bypass -->
  <path d="M32 14 Q48 20 54 32 Q48 38 40 36 L40 44 Q32 48 24 44 L24 36 Q16 38 10 32 Q16 20 32 14"
        fill="#001a2e" stroke="#00ccff" stroke-width="1.5"/>
  <!-- Bypass flow lines -->
  <path d="M14 32 L24 32" stroke="#39ff85" stroke-width="2"/>
  <path d="M40 32 L50 32" stroke="#39ff85" stroke-width="2"/>
  <path d="M28 32 L36 32" stroke="#00ccff" stroke-width="3"/>
  <!-- High-speed data packets as bioluminescent spots -->
  <circle cx="18" cy="32" r="2" fill="#39ff85">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="32" r="2" fill="#00ccff">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="0.5s" begin="0.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="32" r="2" fill="#39ff85">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="0.5s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="32" r="2" fill="#00ccff">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="0.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="46" cy="32" r="2" fill="#39ff85">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="0.5s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <!-- Tail fin -->
  <path d="M30 46 L32 54 L34 46" fill="#00ccff" opacity="0.6"/>
  <!-- Bubbles -->
  <circle cx="8" cy="20" r="2" fill="#39ff85" opacity="0.5"/>
  <circle cx="56" cy="48" r="2" fill="#00ccff" opacity="0.4"/>
</svg>