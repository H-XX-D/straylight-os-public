<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Wizard hat as cuttlefish mantle -->
  <path d="M20 48 L32 12 L44 48 Z" fill="#001a2e" stroke="#00ccff" stroke-width="2"/>
  <!-- Brim -->
  <ellipse cx="32" cy="48" rx="16" ry="4" fill="#001a2e" stroke="#39ff85" stroke-width="1.5"/>
  <!-- Magic sparkles as bioluminescence -->
  <path d="M32 20 L34 26 L40 26 L35 30 L37 36 L32 32 L27 36 L29 30 L24 26 L30 26 Z" fill="#39ff85" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite"/>
  </path>
  <!-- Setup wand/staff -->
  <line x1="48" y1="16" x2="52" y2="8" stroke="#39ff85" stroke-width="2" stroke-linecap="round"/>
  <circle cx="52" cy="8" r="3" fill="#00ccff">
    <animate attributeName="r" values="2;4;2" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Config stars -->
  <path d="M14 20 L15 23 L18 23 L16 25 L17 28 L14 26 L11 28 L12 25 L10 23 L13 23 Z" fill="#00ccff" opacity="0.7"/>
  <path d="M50 40 L51 42 L53 42 L51.5 44 L52 46 L50 45 L48 46 L48.5 44 L47 42 L49 42 Z" fill="#39ff85" opacity="0.7"/>
  <!-- Staff base -->
  <line x1="48" y1="16" x2="44" y2="48" stroke="#39ff85" stroke-width="2" opacity="0.5"/>
  <!-- Bubbles -->
  <circle cx="12" cy="40" r="2" fill="#00ccff" opacity="0.4"/>
  <circle cx="54" cy="52" r="2" fill="#39ff85" opacity="0.4"/>
</svg>