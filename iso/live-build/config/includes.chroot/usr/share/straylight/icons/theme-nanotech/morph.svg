<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#7a7a7a"/>
    </linearGradient>
  </defs>
  <!-- Morphing hexagon - left state -->
  <path d="M16 16 L26 21 L26 31 L16 36 L6 31 L6 21 Z" fill="#a0a0a0" opacity="0.6"/>
  <!-- Morphing hexagon - right state -->
  <path d="M48 20 L58 25 L58 35 L48 40 L38 35 L38 25 Z" fill="#c0c0c0" opacity="0.6"/>
