  <path d="M48 52 L52 54 L52 58 L48 60 L44 58 L44 54 Z" fill="#7a7a7a"/>
  <path d="M56 48 L60 50 L60 54 L56 56 L52 54 L52 50 Z" fill="#c0c0c0"/>
  <!-- Connection threads -->
  <line x1="8" y1="48" x2="16" y2="52" stroke="#7a7a7a" stroke-width="0.5"/>
  <line x1="16" y1="52" x2="24" y2="48" stroke="#7a7a7a" stroke-width="0.5"/>
  <line x1="40" y1="48" x2="48" y2="52" stroke="#7a7a7a" stroke-width="0.5"/>
  <line x1="48" y1="52" x2="56" y2="48" stroke="#7a7a7a" stroke-width="0.5"/>
</svg>