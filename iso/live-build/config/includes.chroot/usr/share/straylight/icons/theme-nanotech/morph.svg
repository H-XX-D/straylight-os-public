  <circle cx="30" cy="24" r="1.5" fill="#c0c0c0">
    <animate attributeName="cx" values="30;34;30" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="34" cy="36" r="1.5" fill="#7a7a7a">
    <animate attributeName="cx" values="34;30;34" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Hexagonal grid fragments -->
  <path d="M8 48 L12 50 L12 54 L8 56 L4 54 L4 50 Z" fill="#a0a0a0"/>
  <path d="M16 52 L20 54 L20 58 L16 60 L12 58 L12 54 Z" fill="#c0c0c0"/>
