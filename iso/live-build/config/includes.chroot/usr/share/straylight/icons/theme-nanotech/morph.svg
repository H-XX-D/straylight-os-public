  <path d="M28 24 L34 24 L32 22 M34 24 L32 26" fill="none" stroke="#7a7a7a" stroke-width="1.5"/>
  <path d="M36 32 L30 32 L32 30 M30 32 L32 34" fill="none" stroke="#7a7a7a" stroke-width="1.5"/>
  <!-- Central morphing blob -->
  <path d="M28 28 Q32 22 36 28 Q40 32 36 36 Q32 42 28 36 Q24 32 28 28" fill="url(#silver)"/>
