<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="neuronglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39ff85"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Neural network as bioluminescent colony -->
  <!-- Layer 1 neurons -->
  <circle cx="16" cy="20" r="3" fill="url(#neuronglow)"/>
  <circle cx="16" cy="32" r="3" fill="url(#neuronglow)"/>
  <circle cx="16" cy="44" r="3" fill="url(#neuronglow)"/>
  <!-- Layer 2 neurons -->
  <circle cx="32" cy="16" r="3" fill="url(#neuronglow)"/>
  <circle cx="32" cy="28" r="4" fill="#39ff85"/>
  <circle cx="32" cy="40" r="3" fill="url(#neuronglow)"/>
  <circle cx="32" cy="52" r="3" fill="url(#neuronglow)"/>
  <!-- Layer 3 neurons -->
  <circle cx="48" cy="24" r="3" fill="url(#neuronglow)"/>
  <circle cx="48" cy="40" r="3" fill="url(#neuronglow)"/>
  <!-- Synaptic connections -->
  <line x1="19" y1="20" x2="29" y2="16" stroke="#00ccff" stroke-width="1" opacity="0.6"/>
  <line x1="19" y1="20" x2="29" y2="28" stroke="#00ccff" stroke-width="1" opacity="0.6"/>
  <line x1="19" y1="32" x2="29" y2="28" stroke="#39ff85" stroke-width="1.5" opacity="0.8"/>
  <line x1="19" y1="32" x2="29" y2="40" stroke="#39ff85" stroke-width="1.5" opacity="0.8"/>
  <line x1="19" y1="44" x2="29" y2="40" stroke="#00ccff" stroke-width="1" opacity="0.6"/>
  <line x1="19" y1="44" x2="29" y2="52" stroke="#00ccff" stroke-width="1" opacity="0.6"/>
  <!-- Output connections -->
  <line x1="35" y1="16" x2="45" y2="24" stroke="#39ff85" stroke-width="1" opacity="0.7"/>
  <line x1="36" y1="28" x2="45" y2="24" stroke="#00ccff" stroke-width="1.5" opacity="0.8"/>
  <line x1="36" y1="28" x2="45" y2="40" stroke="#00ccff" stroke-width="1.5" opacity="0.8"/>
  <line x1="35" y1="40" x2="45" y2="40" stroke="#39ff85" stroke-width="1" opacity="0.7"/>
  <line x1="35" y1="52" x2="45" y2="40" stroke="#39ff85" stroke-width="1" opacity="0.7"/>
  <!-- Spike pulses -->
  <circle cx="24" cy="26" r="1" fill="#39ff85">
    <animate attributeName="cx" values="19;29;19" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="32" r="1" fill="#00ccff">
    <animate attributeName="cx" values="36;45;36" dur="0.6s" repeatCount="indefinite"/>
  </circle>
</svg>