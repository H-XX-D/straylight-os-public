    <line x1="22" y1="18" x2="30" y2="18"/>
  </g>
  <!-- Crystal snowflake top -->
  <g transform="translate(32,32)" stroke="#e0f7ff" stroke-width="1" opacity="0.6">
    <line x1="0" y1="-8" x2="0" y2="8"/>
    <line x1="-7" y1="-4" x2="7" y2="4"/>
    <line x1="-7" y1="4" x2="7" y2="-4"/>
  </g>
  <!-- Frost particles -->
