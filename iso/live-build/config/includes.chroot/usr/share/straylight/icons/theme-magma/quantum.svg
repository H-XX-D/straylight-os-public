<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Magma gradient - flowing lava -->
    <linearGradient id="magmaGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Intense fire gradient -->
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Ember glow -->
    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb700;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:0" />
    </radialGradient>

    <!-- Heat haze -->
    <filter id="heatGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Intense fire blur -->
    <filter id="fireBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background - volcanic rock -->
  <circle cx="32" cy="32" r="30" fill="#1a0a05" stroke="#ff4500" stroke-width="2"/>


  <!-- Quantum Computing - Quantum fire states -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="url(#magmaGrad)" stroke-width="2" filter="url(#heatGlow)"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="#ff6600" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="4" fill="#ffb700" filter="url(#fireBlur)"/>
  <!-- Quantum states as flame orbits -->
  <ellipse cx="32" cy="32" rx="16" ry="6" fill="none" stroke="#ff4500" stroke-width="1" transform="rotate(45 32 32)"/>
  <ellipse cx="32" cy="32" rx="16" ry="6" fill="none" stroke="#ff6600" stroke-width="1" transform="rotate(-45 32 32)"/>
  <!-- Qubit flames -->
  <circle cx="22" cy="22" r="2" fill="#ffb700"/>
  <circle cx="42" cy="42" r="2" fill="#ffb700"/>
  <circle cx="42" cy="22" r="1.5" fill="#ff6600"/>
  <circle cx="22" cy="42" r="1.5" fill="#ff6600"/>

</svg>