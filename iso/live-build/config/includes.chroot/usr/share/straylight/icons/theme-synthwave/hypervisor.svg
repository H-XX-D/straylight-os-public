<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <defs>
    <!-- Sunset gradient -->
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7931e"/>
      <stop offset="100%" style="stop-color:#ff00a0"/>
    </linearGradient>
    <!-- Cyan glow -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <!-- Chrome gradient -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00a0"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#ff00a0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Pink glow filter -->
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Cyan glow filter -->
    <filter id="cyanGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with grid -->
  <rect width="64" height="64" fill="#1a0b2e" rx="4"/>
  <rect width="64" height="64" fill="url(#grid)" rx="4"/>

  <!-- Hypervisor Icon -->
  <rect x="8" y="44" width="20" height="12" rx="1" fill="none" stroke="#00ffff" stroke-width="1.5" filter="url(#cyanGlowFilter)"/>
  <text x="12" y="52" font-family="monospace" font-size="5" fill="#00ffff">VM2</text>
  <rect x="16" y="32" width="20" height="12" rx="1" fill="none" stroke="#f7931e" stroke-width="1.5"/>
  <text x="20" y="40" font-family="monospace" font-size="5" fill="#f7931e">VM1</text>
  <rect x="24" y="20" width="20" height="12" rx="1" fill="none" stroke="#ff00a0" stroke-width="1.5" filter="url(#pinkGlow)"/>
  <text x="26" y="28" font-family="monospace" font-size="5" fill="#ff00a0">HYP</text>
  <rect x="36" y="8" width="20" height="12" rx="1" fill="none" stroke="url(#chrome)" stroke-width="2" filter="url(#pinkGlow)"/>
  <line x1="40" y1="14" x2="52" y2="14" stroke="#00ffff" stroke-width="1"/>
  <line x1="34" y1="26" x2="36" y2="20" stroke="#ff00a0" stroke-width="1" stroke-dasharray="2 1"/>

</svg>