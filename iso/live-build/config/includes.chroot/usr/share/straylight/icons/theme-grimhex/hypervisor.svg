  <rect x="34" y="26" width="4" height="2" fill="currentColor" opacity="0.7"/>
  <rect x="26" y="36" width="4" height="2" fill="currentColor" opacity="0.7"/>
  <rect x="34" y="36" width="4" height="2" fill="currentColor" opacity="0.7"/>
