# StrayLight EFI bootloader installation.
# SPDX-License-Identifier: GPL-3.0-or-later

dontChroot: true
timeout: 600
verbose: true

script:
  - |
      set -eu

      root="${ROOT}"
      efi="$${root}/boot/efi"

      if [ ! -d "$${root}/etc" ]; then
          echo "Calamares target root is not mounted at $${root}" >&2
          exit 1
      fi

      if [ ! -d "$${efi}" ]; then
          echo "EFI mount point is missing at $${efi}" >&2
          exit 1
      fi

      if [ "$$(stat -c %d "$${efi}")" = "$$(stat -c %d "$${root}")" ]; then
          echo "EFI system partition is not mounted at $${efi}" >&2
          exit 1
      fi

      mounted=""
      mount_one() {
          src="$${1}"
          dst="$${root}$${1}"
          mode="$${2}"

          mkdir -p "$${dst}"
          if mountpoint -q "$${dst}"; then
              return 0
          fi

          case "$${mode}" in
              rbind) mount --rbind "$${src}" "$${dst}" ;;
              proc) mount -t proc proc "$${dst}" ;;
              *) mount --bind "$${src}" "$${dst}" ;;
          esac

          mounted="$${dst} $${mounted}"
      }

      cleanup_mounts() {
          for dst in $${mounted}; do
              umount -R "$${dst}" || true
          done
      }
      trap cleanup_mounts EXIT

      mount_one /dev rbind
      mount_one /proc proc
      mount_one /sys rbind
      mount_one /run bind

      mkdir -p "$${efi}/EFI/BOOT" "$${root}/boot/grub"
      chroot "$${root}" /usr/local/sbin/straylight-grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=StrayLight_OS --force
      chroot "$${root}" /usr/sbin/grub-mkconfig -o /boot/grub/grub.cfg

      if [ ! -f "$${efi}/EFI/StrayLight_OS/grubx64.efi" ]; then
          echo "StrayLight EFI loader was not created" >&2
          exit 1
      fi

      cp -f "$${efi}/EFI/StrayLight_OS/grubx64.efi" "$${efi}/EFI/BOOT/BOOTX64.EFI"
