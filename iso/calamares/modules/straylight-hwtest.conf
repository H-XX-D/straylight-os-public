# StrayLight hardware validation shellprocess.
# SPDX-License-Identifier: GPL-3.0-or-later

dontChroot: false
timeout: 180
verbose: true

script:
  - "-if [ -x /usr/lib/straylight/hwtest/gpu-render-test ]; then /usr/lib/straylight/hwtest/gpu-render-test; else echo 'StrayLight GPU render test not present; skipping.'; fi"
  - "-if [ -x /usr/lib/straylight/hwtest/nic-link-test ]; then /usr/lib/straylight/hwtest/nic-link-test; else echo 'StrayLight NIC link test not present; skipping.'; fi"
  - "-if [ -x /usr/lib/straylight/hwtest/entropy-test ]; then /usr/lib/straylight/hwtest/entropy-test; else echo 'StrayLight entropy test not present; skipping.'; fi"
  - "-if [ -x /usr/lib/straylight/hwtest/disk-smart-test ]; then /usr/lib/straylight/hwtest/disk-smart-test; else echo 'StrayLight disk SMART test not present; skipping.'; fi"
  - command: "-if [ -x /usr/lib/straylight/hwtest/dkms-build-test ]; then /usr/lib/straylight/hwtest/dkms-build-test; else echo 'StrayLight DKMS build test not present; skipping.'; fi"
    timeout: 180
