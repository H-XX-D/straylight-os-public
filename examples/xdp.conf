# Example StrayLight XDP configuration.
# This is a safe stats/pass-through starter. Do not enable filter or redirect
# programs without explicit packet policy.

[xdp]
active_program = stats
mode = skb
attach = generic

[interfaces]
switch_facing = <switch-facing-interface>

[programs]
stats = /usr/lib/straylight/bpf/xdp_stats.bpf.o
filter = /usr/lib/straylight/bpf/xdp_filter.bpf.o
redirect = /usr/lib/straylight/bpf/xdp_redirect.bpf.o

[policy]
filter_enabled = false
redirect_enabled = false
require_explicit_packet_policy = true
metadata_only_routing = true

[service]
template = straylight-xdp@<iface>.service
manual_attach_example = straylight-xdp attach --iface <switch-facing-interface> --program stats --skb
manual_stats_example = straylight-xdp stats --iface <switch-facing-interface> --skb
