name: public-release-checks

on:
  push:
  pull_request:

jobs:
  release-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run public release audit
        run: scripts/straylight_release_audit.sh .
      - name: Check Markdown links
        run: python3 scripts/check_markdown_links.py .
      - name: Check shell syntax
        run: scripts/check_shell_syntax.sh .
