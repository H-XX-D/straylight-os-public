{
    "tick_interval_seconds": 60,
    "ipc": {
        "socket_path": "/run/straylight/health.sock",
        "max_clients": 4
    },
    "thresholds": {
        "CPU Temperature": { "warn_below": 70, "critical_below": 30 },
        "Memory": { "warn_below": 60, "critical_below": 20 },
        "Disk Space": { "warn_below": 50, "critical_below": 20 },
        "Disk SMART": { "warn_below": 90, "critical_below": 50 },
        "Network": { "warn_below": 70, "critical_below": 30 }
    }
}
