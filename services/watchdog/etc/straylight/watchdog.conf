{
    "tick_interval_seconds": 10,
    "ipc": {
        "socket_path": "/run/straylight/watchdog.sock"
    },
    "watch_directory": "/etc/straylight/watchdog.d",
    "services": [
        {
            "name": "straylight-health",
            "unit": "straylight-health.service",
            "check_type": "socket",
            "check_target": "/run/straylight/health.sock",
            "max_retries": 3,
            "backoff_seconds": 5,
            "check_interval_seconds": 30
        },
        {
            "name": "straylight-notify",
            "unit": "user:straylight-notify.service",
            "check_type": "proc",
            "max_retries": 3,
            "backoff_seconds": 5,
            "check_interval_seconds": 30
        }
    ]
}
