{
    "tick_interval_seconds": 300,
    "ipc": {
        "socket_path": "/run/straylight/backup.sock"
    },
    "backup_directory": "/var/lib/straylight/backups",
    "schedules": [
        {
            "name": "system-daily",
            "enabled": false,
            "source": "/etc/straylight",
            "schedule": "daily",
            "encrypt": false,
            "remote_targets": [],
            "retention": {
                "daily": 7,
                "weekly": 4,
                "monthly": 12
            }
        },
        {
            "name": "home-weekly",
            "enabled": false,
            "source": "/home",
            "schedule": "weekly",
            "encrypt": true,
            "gpg_recipient": "ops@example.com",
            "remote_targets": [],
            "retention": {
                "daily": 3,
                "weekly": 4,
                "monthly": 6
            }
        }
    ],
    "remotes": []
}
