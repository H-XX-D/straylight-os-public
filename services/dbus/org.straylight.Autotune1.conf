<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the Autotune1 bus name -->
  <policy user="root">
    <allow own="org.straylight.Autotune1"/>
    <allow send_destination="org.straylight.Autotune1"/>
    <allow send_interface="org.straylight.Autotune1.Tuner"/>
    <allow send_interface="org.straylight.Autotune1.Profile"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>

  <!-- Members of straylight group can call Autotune1 methods -->
  <policy group="straylight">
    <allow send_destination="org.straylight.Autotune1"/>
    <allow send_interface="org.straylight.Autotune1.Tuner"/>
    <allow send_interface="org.straylight.Autotune1.Profile"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>

  <!-- Default deny for everyone else -->
  <policy context="default">
    <deny send_destination="org.straylight.Autotune1"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>
</busconfig>
