<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow straylight-health to own the Health1 bus name -->
  <policy user="root">
    <allow own="org.straylight.Health1"/>
    <allow send_destination="org.straylight.Health1"/>
  </policy>

  <!-- Allow all users to call Health1 methods (read-only) -->
  <policy context="default">
    <allow send_destination="org.straylight.Health1"/>
    <allow send_interface="org.straylight.Health1"/>
    <allow receive_sender="org.straylight.Health1"/>
  </policy>
</busconfig>
