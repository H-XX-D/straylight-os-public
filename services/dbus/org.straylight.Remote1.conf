<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the Remote1 bus name -->
  <policy user="root">
    <allow own="org.straylight.Remote1"/>
    <allow send_destination="org.straylight.Remote1"/>
    <allow send_interface="org.straylight.Remote1.Agent"/>
    <allow send_interface="org.straylight.Remote1.Session"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>

  <!-- Members of straylight group can query Remote1 status -->
  <policy group="straylight">
    <allow send_destination="org.straylight.Remote1"/>
    <allow send_interface="org.straylight.Remote1.Agent"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>

  <!-- Default deny for everyone else -->
  <policy context="default">
    <deny send_destination="org.straylight.Remote1"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>
</busconfig>
