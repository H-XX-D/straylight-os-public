{
    "daemon": {
        "tick_interval_ms": 100
    },
    "streams": [
        {
            "name": "system-metrics",
            "buffer": 5000
        },
        {
            "name": "sensor-data",
            "buffer": 1000
        },
        {
            "name": "log-events",
            "buffer": 2000
        }
    ],
    "ipc": {
        "socket_path": "/run/straylight/flux.sock",
        "max_clients": 16
    }
}
