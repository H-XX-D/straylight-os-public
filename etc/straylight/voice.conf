# StrayLight Voice Assistant Configuration
# /etc/straylight/voice.conf

[general]
wake_word = hey straylight
language = en
push_to_talk = false

[stt]
model = /usr/share/straylight/models/whisper-base.gguf
language = auto

[tts]
model = /usr/share/straylight/models/piper-en.onnx
voice = default
speed = 1.0
pitch = 1.0

[llm]
model = /usr/share/straylight/models/qwen-0.5b-q4.gguf
system_prompt = You are Straylight Voice, an AI assistant built into StrayLight OS. You can control the system using tools. Be concise and helpful.
temperature = 0.7
max_tokens = 512
context_window = 10

[audio]
device = default
sample_rate = 16000
vad_threshold = 0.3
silence_timeout_ms = 1500
max_recording_s = 30

[safety]
require_confirmation = shutdown,reboot,format,delete,encrypt
blocked_commands = rm -rf /,dd if=/dev/zero
