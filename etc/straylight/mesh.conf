{
    "refresh_interval_seconds": 5,
    "discover_interval_seconds": 60,
    "stale_timeout_seconds": 30,
    "temperature_threshold_celsius": 90.0,
    "utilization_threshold_percent": 95.0,
    "default_placement_policy": "least_loaded",
    "max_remote_transfer_concurrent": 4,
    "tls": {
        "cert": "/etc/straylight/pki/node.crt",
        "key": "/etc/straylight/pki/node.key",
        "ca": "/etc/straylight/pki/cluster-ca.crt"
    },
    "dbus": {
        "bus_name": "org.straylight.Mesh1",
        "object_path": "/org/straylight/Mesh1"
    }
}
