# StrayLight NUMA policy.
#
# Install-time hardware detection may regenerate this file.  The Z6 live
# profile below is sanitized and topology-based: no hostnames, addresses, MACs,
# serials, or user paths.

STRAYLIGHT_NUMA_DEFAULT_PROFILE=balanced

# Local accelerator socket: RTX/VPU slabs, NVMe, current FPGA gate, and heavy
# build/ML experiments are closest to NUMA node 0 on the live Z6 topology.
STRAYLIGHT_NUMA_PROFILE_VPU_CPUS=0-19,40-59
STRAYLIGHT_NUMA_PROFILE_VPU_MEMS=0
STRAYLIGHT_NUMA_PROFILE_VPU_POLICY=preferred

# Garden work defaults to the same accelerator-local node.  Users can override
# STRAYLIGHT_GARDEN_NUMA_PROFILE before entering a garden.
STRAYLIGHT_NUMA_PROFILE_GARDEN_CPUS=0-19,40-59
STRAYLIGHT_NUMA_PROFILE_GARDEN_MEMS=0
STRAYLIGHT_NUMA_PROFILE_GARDEN_POLICY=preferred

# Control-plane services get a smaller node0 subset so they stay near VPU/fabric
# metadata without competing with full accelerator jobs.
STRAYLIGHT_NUMA_PROFILE_CONTROL_CPUS=0-7,40-47
STRAYLIGHT_NUMA_PROFILE_CONTROL_MEMS=0
STRAYLIGHT_NUMA_PROFILE_CONTROL_POLICY=preferred

# Background work is placed on node1 to leave node0 cleaner for VPU/fabric jobs.
STRAYLIGHT_NUMA_PROFILE_BACKGROUND_CPUS=20-39,60-79
STRAYLIGHT_NUMA_PROFILE_BACKGROUND_MEMS=1
STRAYLIGHT_NUMA_PROFILE_BACKGROUND_POLICY=preferred

# Balanced spans both sockets and is the fallback for latency-facing services.
STRAYLIGHT_NUMA_PROFILE_BALANCED_CPUS=0-79
STRAYLIGHT_NUMA_PROFILE_BALANCED_MEMS=0-1
STRAYLIGHT_NUMA_PROFILE_BALANCED_POLICY=interleave
