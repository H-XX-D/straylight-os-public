{
    "buffer": {
        "size_mb": 256,
        "path": "/var/lib/straylight/replay/buffer.dat"
    },
    "sources": {
        "kmsg": true,
        "proc_events": true,
        "network_poll": true,
        "network_poll_interval_seconds": 2,
        "gpu_poll": true,
        "gpu_poll_interval_ms": 500,
        "dbus_services": true,
        "dbus_poll_interval_seconds": 5
    },
    "ipc": {
        "socket_path": "/run/straylight/replay.sock",
        "max_clients": 4
    },
    "retention": {
        "max_event_name_length": 256,
        "max_event_detail_length": 4096
    }
}
