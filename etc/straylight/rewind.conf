# StrayLight Rewind — Checkpoint/Restore Daemon Configuration
#
# Process checkpointing settings for straylight-rewind.

# Automatic checkpoint interval in seconds (default: 30)
checkpoint_interval_s = 30

# Maximum number of checkpoints to retain per tracked process (default: 20)
max_checkpoints_per_process = 20

# Maximum total storage budget in MB across all processes (default: 2048)
max_storage_mb = 2048

# Compression algorithm: zstd or none (default: zstd)
compression = zstd

# Enable delta checkpoints — only store changed pages (default: true)
delta_checkpoints = true

# Automatically track all running StrayLight services on startup (default: true)
auto_track_services = true
