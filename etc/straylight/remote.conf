{
    "listen": {
        "address": "0.0.0.0",
        "port": 7700
    },
    "tls": {
        "cert": "/etc/straylight/remote/server.crt",
        "key": "/etc/straylight/remote/server.key",
        "authorized_keys": "/etc/straylight/remote/authorized_keys"
    },
    "limits": {
        "max_connections": 8,
        "idle_timeout_seconds": 600,
        "max_upload_size_mb": 1024,
        "max_exec_timeout_seconds": 3600
    },
    "features": {
        "exec": true,
        "file_transfer": true,
        "service_management": true,
        "package_management": false,
        "alice_integration": true
    }
}
