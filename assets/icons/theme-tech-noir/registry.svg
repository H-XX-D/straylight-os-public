<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Concrete vault base -->
  <rect x="8" y="12" width="48" height="44" rx="2" fill="#2a2a2a" stroke="#3d3d3d" stroke-width="2"/>
  <!-- Vault door -->
  <circle cx="32" cy="34" r="16" fill="#1a1a1a" stroke="#4a4a4a" stroke-width="2"/>
  <!-- Wheel lock -->
  <circle cx="32" cy="34" r="10" fill="none" stroke="#ff6b35" stroke-width="2"/>
  <path d="M32 28 L32 34 L36 38" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <!-- Spokes (some broken) -->
  <line x1="32" y1="18" x2="32" y2="24" stroke="#8b4513" stroke-width="2" opacity="0.8"/>
  <line x1="32" y1="44" x2="32" y2="50" stroke="#8b4513" stroke-width="2" opacity="0.8"/>
  <line x1="16" y1="34" x2="22" y2="34" stroke="#8b4513" stroke-width="2" opacity="0.8"/>
  <line x1="42" y1="34" x2="46" y2="34" stroke="#8b4513" stroke-width="1.5" opacity="0.5"/>
  <!-- Broken spoke piece -->
  <path d="M48 32 L50 34" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Model indicators -->
  <rect x="12" y="16" width="6" height="4" fill="#ff6b35" opacity="0.7"/>
  <rect x="20" y="16" width="6" height="4" fill="#ff6b35" opacity="0.5"/>
  <rect x="28" y="16" width="6" height="4" fill="#a0522d" opacity="0.6"/>
  <!-- Hinges -->
  <rect x="6" y="24" width="4" height="6" fill="#4a4a4a"/>
  <rect x="6" y="38" width="4" height="6" fill="#4a4a4a"/>
  <!-- Rust spots -->
  <circle cx="12" cy="52" r="2.5" fill="#a0522d" opacity="0.6"/>
  <circle cx="52" cy="16" r="2" fill="#8b4513" opacity="0.5"/>
</svg>