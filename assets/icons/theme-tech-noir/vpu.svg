<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- GPU base with industrial look -->
  <rect x="8" y="12" width="48" height="40" rx="2" fill="#2a2a2a" stroke="#3d3d3d" stroke-width="2"/>
  <!-- Heat sink fins -->
  <line x1="14" y1="16" x2="14" y2="48" stroke="#4a4a4a" stroke-width="2"/>
  <line x1="20" y1="16" x2="20" y2="48" stroke="#4a4a4a" stroke-width="2"/>
  <line x1="26" y1="16" x2="26" y2="48" stroke="#4a4a4a" stroke-width="2"/>
  <line x1="32" y1="16" x2="32" y2="48" stroke="#4a4a4a" stroke-width="2"/>
  <line x1="38" y1="16" x2="38" y2="48" stroke="#4a4a4a" stroke-width="2"/>
  <line x1="44" y1="16" x2="44" y2="48" stroke="#4a4a4a" stroke-width="2"/>
  <!-- GPU chip core -->
  <rect x="22" y="26" width="20" height="16" rx="1" fill="#1a1a1a" stroke="#ff6b35" stroke-width="2"/>
  <!-- Video/display symbol -->
  <path d="M28 32 L36 32 M32 28 L32 40" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <!-- VRAM chips -->
  <rect x="12" y="20" width="6" height="6" fill="#1a1a1a" stroke="#8b4513" stroke-width="1"/>
  <rect x="46" y="20" width="6" height="6" fill="#1a1a1a" stroke="#8b4513" stroke-width="1"/>
  <rect x="12" y="38" width="6" height="6" fill="#1a1a1a" stroke="#8b4513" stroke-width="1"/>
  <!-- One VRAM missing/damaged -->
  <rect x="46" y="38" width="6" height="4" fill="#1a1a1a" stroke="#8b4513" stroke-width="1" opacity="0.4"/>
  <path d="M48 38 L52 42" stroke="#1a1a1a" stroke-width="1"/>
  <!-- PCIe connector -->
  <rect x="16" y="52" width="32" height="4" fill="#8b4513"/>
  <!-- Power connector -->
  <rect x="54" y="28" width="4" height="8" fill="#ff6b35" opacity="0.7"/>
  <!-- Rust spots -->
  <circle cx="10" cy="50" r="2.5" fill="#a0522d" opacity="0.5"/>
  <circle cx="54" cy="14" r="2" fill="#8b4513" opacity="0.4"/>
</svg>