<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="nodeGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
  </defs>
  <!-- Neural connections as ice paths -->
  <g stroke="url(#iceGrad)" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M16 16 Q32 24 48 16"/>
    <path d="M16 16 Q24 32 16 48"/>
    <path d="M48 16 Q40 32 48 48"/>
    <path d="M16 48 Q32 40 48 48"/>
    <path d="M32 24 L32 40"/>
    <path d="M24 32 L40 32"/>
  </g>
  <!-- Neurons as snowflakes -->
  <g fill="url(#nodeGrad)">
    <circle cx="16" cy="16" r="4"/>
    <circle cx="48" cy="16" r="4"/>
    <circle cx="16" cy="48" r="4"/>
    <circle cx="48" cy="48" r="4"/>
    <circle cx="32" cy="32" r="6"/>
  </g>
  <!-- Crystal details on neurons -->
  <g stroke="#e0f7ff" stroke-width="1">
    <g transform="translate(16,16)">
      <line x1="0" y1="-2" x2="0" y2="2"/>
      <line x1="-1.7" y1="-1" x2="1.7" y2="1"/>
      <line x1="-1.7" y1="1" x2="1.7" y2="-1"/>
    </g>
    <g transform="translate(48,16)">
      <line x1="0" y1="-2" x2="0" y2="2"/>
      <line x1="-1.7" y1="-1" x2="1.7" y2="1"/>
      <line x1="-1.7" y1="1" x2="1.7" y2="-1"/>
    </g>
    <g transform="translate(16,48)">
      <line x1="0" y1="-2" x2="0" y2="2"/>
      <line x1="-1.7" y1="-1" x2="1.7" y2="1"/>
      <line x1="-1.7" y1="1" x2="1.7" y2="-1"/>
    </g>
    <g transform="translate(48,48)">
      <line x1="0" y1="-2" x2="0" y2="2"/>
      <line x1="-1.7" y1="-1" x2="1.7" y2="1"/>
      <line x1="-1.7" y1="1" x2="1.7" y2="-1"/>
    </g>
    <g transform="translate(32,32)">
      <line x1="0" y1="-3" x2="0" y2="3"/>
      <line x1="-2.6" y1="-1.5" x2="2.6" y2="1.5"/>
      <line x1="-2.6" y1="1.5" x2="2.6" y2="-1.5"/>
    </g>
  </g>
</svg>