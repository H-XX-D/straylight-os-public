<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Stacked ice layers (VMs) -->
  <g fill="none" stroke="url(#iceGrad)" stroke-width="1.5">
    <!-- Top layer -->
    <polygon points="32,8 56,20 56,32 32,44 8,32 8,20" fill="url(#layerGrad)" opacity="0.8"/>
    <!-- Middle layer -->
    <polygon points="32,18 56,30 56,42 32,54 8,42 8,30" fill="url(#layerGrad)" opacity="0.5"/>
  </g>
  <!-- Ice crystal divider -->
  <line x1="8" y1="32" x2="32" y2="44" stroke="#4fc3f7" stroke-width="1" opacity="0.6"/>
  <line x1="56" y1="32" x2="32" y2="44" stroke="#4fc3f7" stroke-width="1" opacity="0.6"/>
  <!-- Snowflake core -->
  <g transform="translate(32,26)" stroke="#e0f7ff" stroke-width="1.5">
    <line x1="0" y1="-6" x2="0" y2="6"/>
    <line x1="-5" y1="-3" x2="5" y2="3"/>
    <line x1="-5" y1="3" x2="5" y2="-3"/>
  </g>
  <!-- Frost particles -->
  <circle cx="20" cy="28" r="1.5" fill="#4fc3f7" opacity="0.7"/>
  <circle cx="44" cy="28" r="1.5" fill="#4fc3f7" opacity="0.7"/>
</svg>