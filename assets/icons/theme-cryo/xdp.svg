<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="fastGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="50%" style="stop-color:#81d4fa"/>
      <stop offset="100%" style="stop-color:#e0f7ff"/>
    </linearGradient>
  </defs>
  <!-- Network packet as ice crystal -->
  <polygon points="8,20 32,8 56,20 56,44 32,56 8,44"
           fill="none" stroke="url(#iceGrad)" stroke-width="2"/>
  <!-- Fast path arrow (bypass) -->
  <path d="M16 32 L32 24 L32 28 L48 28 L48 20 L60 32 L48 44 L48 36 L32 36 L32 40 Z"
        fill="url(#fastGrad)" opacity="0.3"/>
  <path d="M20 32 L32 26 L32 29 L46 29 L46 24 L54 32 L46 40 L46 35 L32 35 L32 38 Z"
        fill="none" stroke="url(#iceGrad)" stroke-width="1.5"/>
  <!-- Snowflake packet core -->
  <g transform="translate(32,32)">
    <circle r="6" fill="#e0f7ff" opacity="0.5"/>
    <g stroke="#4fc3f7" stroke-width="1.5">
      <line x1="0" y1="-4" x2="0" y2="4"/>
      <line x1="-3.5" y1="-2" x2="3.5" y2="2"/>
      <line x1="-3.5" y1="2" x2="3.5" y2="-2"/>
    </g>
  </g>
  <!-- Speed lines (frost trails) -->
  <line x1="4" y1="26" x2="14" y2="26" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <line x1="4" y1="32" x2="12" y2="32" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <line x1="4" y1="38" x2="14" y2="38" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
</svg>