<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Ice crystal GPU outline -->
  <polygon points="32,4 56,16 56,48 32,60 8,48 8,16" fill="url(#gpuGrad)" stroke="url(#iceGrad)" stroke-width="2"/>
  <!-- Inner processing units as frost crystals -->
  <g fill="none" stroke="#4fc3f7" stroke-width="1.5">
    <rect x="20" y="22" width="8" height="8" rx="1"/>
    <rect x="36" y="22" width="8" height="8" rx="1"/>
    <rect x="20" y="34" width="8" height="8" rx="1"/>
    <rect x="36" y="34" width="8" height="8" rx="1"/>
  </g>
  <!-- Central snowflake core -->
  <g transform="translate(32,32)">
    <circle r="5" fill="#e0f7ff" opacity="0.6"/>
    <g stroke="#4fc3f7" stroke-width="1">
      <line x1="0" y1="-3" x2="0" y2="3"/>
      <line x1="-2.6" y1="-1.5" x2="2.6" y2="1.5"/>
      <line x1="-2.6" y1="1.5" x2="2.6" y2="-1.5"/>
    </g>
  </g>
  <!-- Ice crystal edge accents -->
  <g stroke="#e0f7ff" stroke-width="1" opacity="0.5">
    <line x1="32" y1="8" x2="32" y2="12"/>
    <line x1="30" y1="10" x2="34" y2="10"/>
  </g>
</svg>