<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="clockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Ice clock face -->
  <circle cx="32" cy="32" r="26" fill="url(#clockGrad)" stroke="url(#iceGrad)" stroke-width="2"/>
  <!-- Clock marks as ice crystals -->
  <g stroke="#4fc3f7" stroke-width="1.5">
    <line x1="32" y1="10" x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="54"/>
    <line x1="10" y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="54" y2="32"/>
  </g>
  <!-- Snowflake center -->
  <circle cx="32" cy="32" r="4" fill="#e0f7ff"/>
  <g transform="translate(32,32)" stroke="#4fc3f7" stroke-width="1">
    <line x1="0" y1="-3" x2="0" y2="3"/>
    <line x1="-2.5" y1="-1.5" x2="2.5" y2="1.5"/>
    <line x1="-2.5" y1="1.5" x2="2.5" y2="-1.5"/>
  </g>
  <!-- Clock hands (frozen time pointers) -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="url(#iceGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="44" y2="38" stroke="url(#iceGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Thread indicators -->
  <circle cx="22" cy="24" r="2" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="42" cy="26" r="2" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="24" cy="42" r="2" fill="#4fc3f7" opacity="0.6"/>
</svg>