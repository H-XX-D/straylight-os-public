<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Network packet -->
  <rect x="8" y="20" width="28" height="24" rx="2" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#glow-pink)"/>

  <!-- Packet header -->
  <rect x="12" y="24" width="20" height="6" fill="#00ffff" filter="url(#glow-cyan)" opacity="0.8"/>
  <rect x="12" y="32" width="20" height="8" fill="#ffff00" filter="url(#glow-pink)" opacity="0.6"/>

  <!-- XDP fast path arrow -->
  <path d="M40 32 H56" stroke="#ffff00" stroke-width="4" filter="url(#glow-pink)"/>
  <polygon points="52,28 60,32 52,36" fill="#ffff00" filter="url(#glow-pink)"/>

  <!-- Bypass kernel indication -->
  <path d="M36 16 V48" stroke="#00ffff" stroke-width="1" stroke-dasharray="4 2" opacity="0.5"/>
  <text x="38" y="14" fill="#ff00ff" font-family="monospace" font-size="5" filter="url(#glow-pink)">XDP</text>

  <!-- Speed indicators -->
  <path d="M44 20 L48 16" stroke="#00ffff" stroke-width="2" filter="url(#glow-cyan)"/>
  <path d="M48 22 L52 18" stroke="#00ffff" stroke-width="2" filter="url(#glow-cyan)"/>
  <path d="M44 44 L48 48" stroke="#00ffff" stroke-width="2" filter="url(#glow-cyan)"/>
  <path d="M48 42 L52 46" stroke="#00ffff" stroke-width="2" filter="url(#glow-cyan)"/>

  <!-- Ethernet frame decoration -->
  <path d="M8 20 L12 16 H32 L36 20" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.7"/>
</svg>
