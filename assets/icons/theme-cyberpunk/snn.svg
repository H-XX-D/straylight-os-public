<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Neural network nodes -->
  <circle cx="16" cy="16" r="4" fill="#ff00ff" filter="url(#glow-pink)"/>
  <circle cx="16" cy="32" r="4" fill="#ff00ff" filter="url(#glow-pink)"/>
  <circle cx="16" cy="48" r="4" fill="#ff00ff" filter="url(#glow-pink)"/>

  <circle cx="32" cy="24" r="4" fill="#00ffff" filter="url(#glow-cyan)"/>
  <circle cx="32" cy="40" r="4" fill="#00ffff" filter="url(#glow-cyan)"/>

  <circle cx="48" cy="32" r="4" fill="#ffff00" filter="url(#glow-pink)"/>

  <!-- Synaptic connections -->
  <path d="M20 16 L28 22" stroke="#00ffff" stroke-width="1.5" filter="url(#glow-cyan)"/>
  <path d="M20 32 L28 26" stroke="#00ffff" stroke-width="1.5" filter="url(#glow-cyan)"/>
  <path d="M20 32 L28 38" stroke="#00ffff" stroke-width="1.5" filter="url(#glow-cyan)"/>
  <path d="M20 48 L28 42" stroke="#00ffff" stroke-width="1.5" filter="url(#glow-cyan)"/>

  <path d="M36 24 L44 30" stroke="#ffff00" stroke-width="1.5" filter="url(#glow-pink)"/>
  <path d="M36 40 L44 34" stroke="#ffff00" stroke-width="1.5" filter="url(#glow-pink)"/>

  <!-- Spike pulses -->
  <circle cx="24" cy="20" r="1.5" fill="#ffff00" filter="url(#glow-pink)"/>
  <circle cx="24" cy="36" r="1.5" fill="#ffff00" filter="url(#glow-pink)"/>
  <circle cx="40" cy="32" r="1.5" fill="#ff00ff" filter="url(#glow-cyan)"/>

  <!-- Waveform -->
  <path d="M4 32 Q8 24 12 32 Q16 40 20 32" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
  <path d="M44 32 Q48 24 52 32 Q56 40 60 32" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.6"/>
</svg>
