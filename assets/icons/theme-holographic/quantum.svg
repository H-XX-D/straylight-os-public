<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="f11">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- AR Orbit Rings -->
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.3" transform="rotate(0 32 32)"/>
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="#ff00ff" stroke-width="0.6" opacity="0.3" transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.3" transform="rotate(120 32 32)"/>
  <!-- Glass Nucleus -->
  <circle cx="32" cy="32" r="10" fill="url(#g11)" stroke="#ff00ff" stroke-width="1.5" filter="url(#f11)"/>
  <!-- Qubits -->
  <circle cx="32" cy="14" r="3" fill="#00d4ff" opacity="0.9"/>
  <circle cx="48" cy="24" r="3" fill="#ff00ff" opacity="0.9"/>
  <circle cx="48" cy="40" r="3" fill="#00d4ff" opacity="0.9"/>
  <circle cx="32" cy="50" r="3" fill="#ff00ff" opacity="0.9"/>
  <circle cx="16" cy="40" r="3" fill="#00d4ff" opacity="0.9"/>
  <circle cx="16" cy="24" r="3" fill="#ff00ff" opacity="0.9"/>
  <!-- Quantum Connections -->
  <line x1="32" y1="14" x2="48" y2="24" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="48" y1="24" x2="48" y2="40" stroke="#ff00ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="48" y1="40" x2="32" y2="50" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="32" y1="50" x2="16" y2="40" stroke="#ff00ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="40" x2="16" y2="24" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="24" x2="32" y2="14" stroke="#ff00ff" stroke-width="0.8" opacity="0.5"/>
  <!-- Center Qubit -->
  <circle cx="32" cy="32" r="4" fill="#ff00ff" opacity="0.6"/>
