  <!-- AR Frame -->
  <path d="M8 16 L8 8 L16 8" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M56 16 L56 8 L48 8" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6"/>
