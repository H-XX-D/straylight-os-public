  <path d="M56 48 L56 56 L48 56" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Glass Body -->
  <circle cx="32" cy="32" r="20" fill="url(#g1)" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <!-- AI Core -->
  <circle cx="32" cy="32" r="8" fill="#ff00ff" opacity="0.4" filter="url(#f1)"/>
  <circle cx="32" cy="32" r="4" fill="#00d4ff" opacity="0.8"/>
  <!-- Processing Rings -->
  <ellipse cx="32" cy="32" rx="14" ry="6" fill="none" stroke="#ff00ff" stroke-width="0.8" opacity="0.5"/>
