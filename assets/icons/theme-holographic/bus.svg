<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- AR Grid Lines -->
  <line x1="4" y1="20" x2="60" y2="20" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="4" y1="44" x2="60" y2="44" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <!-- Main Bus Line -->
  <rect x="8" y="26" width="48" height="12" rx="2" fill="url(#g2)" stroke="#00d4ff" stroke-width="1.2"/>
  <!-- Data Nodes -->
  <rect x="12" y="28" width="8" height="8" rx="1" fill="#ff00ff" opacity="0.5"/>
  <rect x="24" y="28" width="8" height="8" rx="1" fill="#00d4ff" opacity="0.5"/>
  <rect x="36" y="28" width="8" height="8" rx="1" fill="#ff00ff" opacity="0.5"/>
  <rect x="48" y="28" width="4" height="8" rx="1" fill="#00d4ff" opacity="0.5"/>
  <!-- Connection Lines -->
  <line x1="16" y1="20" x2="16" y2="26" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="20" x2="28" y2="26" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <line x1="40" y1="20" x2="40" y2="26" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="38" x2="16" y2="44" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="38" x2="28" y2="44" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <line x1="40" y1="38" x2="40" y2="44" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
  <!-- AR Markers -->
  <circle cx="16" cy="16" r="2" fill="#00d4ff" opacity="0.8"/>
  <circle cx="48" cy="48" r="2" fill="#ff00ff" opacity="0.8"/>
