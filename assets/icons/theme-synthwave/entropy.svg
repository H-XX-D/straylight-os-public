<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <defs>
    <!-- Sunset gradient -->
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7931e"/>
      <stop offset="100%" style="stop-color:#ff00a0"/>
    </linearGradient>
    <!-- Cyan glow -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <!-- Chrome gradient -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00a0"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#ff00a0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Pink glow filter -->
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Cyan glow filter -->
    <filter id="cyanGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with grid -->
  <rect width="64" height="64" fill="#1a0b2e" rx="4"/>
  <rect width="64" height="64" fill="url(#grid)" rx="4"/>

  <!-- Hardware Entropy Icon -->
  <circle cx="32" cy="32" r="8" fill="url(#sunset)" filter="url(#pinkGlow)"/>
  <circle cx="32" cy="14" r="3" fill="#00ffff" filter="url(#cyanGlowFilter)"/>
  <circle cx="32" cy="50" r="3" fill="#00ffff" filter="url(#cyanGlowFilter)"/>
  <circle cx="14" cy="32" r="3" fill="#00ffff" filter="url(#cyanGlowFilter)"/>
  <circle cx="50" cy="32" r="3" fill="#00ffff" filter="url(#cyanGlowFilter)"/>
  <path d="M 32 24 Q 24 24 24 16" fill="none" stroke="#ff00a0" stroke-width="1" stroke-dasharray="2 1"/>
  <path d="M 32 40 Q 40 40 40 48" fill="none" stroke="#ff00a0" stroke-width="1" stroke-dasharray="2 1"/>
  <path d="M 24 32 Q 24 40 16 40" fill="none" stroke="#f7931e" stroke-width="1" stroke-dasharray="2 1"/>
  <path d="M 40 32 Q 40 24 48 24" fill="none" stroke="#f7931e" stroke-width="1" stroke-dasharray="2 1"/>

</svg>