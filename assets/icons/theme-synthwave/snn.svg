<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <defs>
    <!-- Sunset gradient -->
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7931e"/>
      <stop offset="100%" style="stop-color:#ff00a0"/>
    </linearGradient>
    <!-- Cyan glow -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <!-- Chrome gradient -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00a0"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#ff00a0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Pink glow filter -->
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Cyan glow filter -->
    <filter id="cyanGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with grid -->
  <rect width="64" height="64" fill="#1a0b2e" rx="4"/>
  <rect width="64" height="64" fill="url(#grid)" rx="4"/>

  <!-- Neural Network Icon -->
  <circle cx="12" cy="16" r="3" fill="#00ffff" filter="url(#cyanGlowFilter)"/>
  <circle cx="12" cy="32" r="3" fill="#00ffff" filter="url(#cyanGlowFilter)"/>
  <circle cx="12" cy="48" r="3" fill="#00ffff" filter="url(#cyanGlowFilter)"/>
  <circle cx="32" cy="20" r="4" fill="#f7931e"/>
  <circle cx="32" cy="32" r="4" fill="#f7931e"/>
  <circle cx="32" cy="44" r="4" fill="#f7931e"/>
  <circle cx="52" cy="24" r="3" fill="#ff00a0" filter="url(#pinkGlow)"/>
  <circle cx="52" cy="40" r="3" fill="#ff00a0" filter="url(#pinkGlow)"/>
  <line x1="15" y1="16" x2="28" y2="20" stroke="url(#chrome)" stroke-width="1" opacity="0.7"/>
  <line x1="15" y1="16" x2="28" y2="32" stroke="url(#chrome)" stroke-width="1" opacity="0.7"/>
  <line x1="15" y1="32" x2="28" y2="20" stroke="url(#chrome)" stroke-width="1" opacity="0.7"/>
  <line x1="15" y1="32" x2="28" y2="32" stroke="url(#chrome)" stroke-width="1" opacity="0.7"/>
  <line x1="15" y1="32" x2="28" y2="44" stroke="url(#chrome)" stroke-width="1" opacity="0.7"/>
  <line x1="15" y1="48" x2="28" y2="32" stroke="url(#chrome)" stroke-width="1" opacity="0.7"/>
  <line x1="15" y1="48" x2="28" y2="44" stroke="url(#chrome)" stroke-width="1" opacity="0.7"/>
  <line x1="36" y1="20" x2="49" y2="24" stroke="#ff00a0" stroke-width="1" opacity="0.7"/>
  <line x1="36" y1="20" x2="49" y2="40" stroke="#ff00a0" stroke-width="1" opacity="0.7"/>
  <line x1="36" y1="32" x2="49" y2="24" stroke="#ff00a0" stroke-width="1" opacity="0.7"/>
  <line x1="36" y1="32" x2="49" y2="40" stroke="#ff00a0" stroke-width="1" opacity="0.7"/>
  <line x1="36" y1="44" x2="49" y2="24" stroke="#ff00a0" stroke-width="1" opacity="0.7"/>
  <line x1="36" y1="44" x2="49" y2="40" stroke="#ff00a0" stroke-width="1" opacity="0.7"/>

</svg>