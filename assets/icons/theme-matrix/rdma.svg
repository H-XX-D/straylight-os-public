<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Server A -->
  <rect x="8" y="16" width="16" height="20" rx="1"/>
  <line x1="8" y1="22" x2="24" y2="22"/>
  <line x1="12" y1="26" x2="20" y2="26"/>
  <line x1="12" y1="30" x2="20" y2="30"/>
  <!-- Server B -->
  <rect x="40" y="16" width="16" height="20" rx="1"/>
  <line x1="40" y1="22" x2="56" y2="22"/>
  <line x1="44" y1="26" x2="52" y2="26"/>
  <line x1="44" y1="30" x2="52" y2="30"/>
  <!-- Direct memory connection bypassing CPU -->
  <path d="M24 28h16" stroke-width="2"/>
  <polygon points="38,26 42,28 38,30" fill="#00ff41" stroke="none"/>
  <!-- Memory blocks -->
  <rect x="12" y="44" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.6"/>
  <rect x="44" y="44" width="8" height="8" fill="#00ff41" stroke="none" opacity="0.6"/>
  <!-- Memory connection -->
  <line x1="16" y1="44" x2="16" y2="36"/>
  <line x1="48" y1="44" x2="48" y2="36"/>
  <line x1="16" y1="40" x2="48" y2="40" stroke-dasharray="2 1"/>
  <!-- Binary data flow -->
  <text x="28" y="26" font-family="monospace" font-size="3" fill="#00ff41" stroke="none">DMA</text>
  <text x="26" y="38" font-family="monospace" font-size="3" fill="#00ff41" stroke="none" opacity="0.5">010</text>
  <!-- Bypass indicator -->
  <path d="M32 8v8" stroke-dasharray="2 1"/>
  <circle cx="32" cy="8" r="1.5" fill="#00ff41" stroke="none"/>
</svg>