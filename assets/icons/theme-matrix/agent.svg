<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Binary rain background -->
  <g opacity="0.3">
    <text x="4" y="12" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">1</text>
    <text x="4" y="18" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">0</text>
    <text x="4" y="24" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">1</text>
    <text x="56" y="16" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">0</text>
    <text x="56" y="22" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">1</text>
  </g>
  <!-- Head/circuit -->
  <circle cx="32" cy="22" r="10"/>
  <line x1="32" y1="32" x2="32" y2="42"/>
  <!-- Shoulders -->
  <path d="M18 52c0-8 6-14 14-14s14 6 14 14"/>
  <!-- Circuit connections -->
  <circle cx="20" cy="20" r="2" fill="#00ff41" stroke="none"/>
  <circle cx="44" cy="20" r="2" fill="#00ff41" stroke="none"/>
  <line x1="20" y1="20" x2="22" y2="22"/>
  <line x1="44" y1="20" x2="42" y2="22"/>
  <!-- Data streams -->
  <line x1="12" y1="8" x2="12" y2="16"/>
  <line x1="52" y1="8" x2="52" y2="16"/>
  <circle cx="12" cy="16" r="1.5" fill="#00ff41" stroke="none"/>
  <circle cx="52" cy="16" r="1.5" fill="#00ff41" stroke="none"/>
  <!-- Terminal prompt -->
  <rect x="26" y="56" width="12" height="4" rx="1" fill="#00ff41" stroke="none" opacity="0.5"/>
  <text x="28" y="59" font-family="monospace" font-size="3" fill="#000" stroke="none">AI</text>
</svg>