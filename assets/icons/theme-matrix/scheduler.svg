<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Clock face -->
  <circle cx="32" cy="32" r="22"/>
  <circle cx="32" cy="32" r="2" fill="#00ff41" stroke="none"/>
  <!-- Clock hands -->
  <line x1="32" y1="32" x2="32" y2="18" stroke-width="2"/>
  <line x1="32" y1="32" x2="42" y2="38" stroke-width="1.5"/>
  <!-- Thread indicators around clock -->
  <circle cx="32" cy="10" r="3" fill="#00ff41" stroke="none" opacity="0.8"/>
  <circle cx="48" cy="18" r="2.5" fill="#00ff41" stroke="none" opacity="0.6"/>
  <circle cx="54" cy="32" r="2" fill="#00ff41" stroke="none" opacity="0.4"/>
  <circle cx="48" cy="46" r="2" fill="#00ff41" stroke="none" opacity="0.4"/>
  <circle cx="32" cy="54" r="2.5" fill="#00ff41" stroke="none" opacity="0.6"/>
  <circle cx="16" cy="46" r="2" fill="#00ff41" stroke="none" opacity="0.4"/>
  <circle cx="10" cy="32" r="2" fill="#00ff41" stroke="none" opacity="0.4"/>
  <circle cx="16" cy="18" r="2.5" fill="#00ff41" stroke="none" opacity="0.6"/>
  <!-- Priority queue bars -->
  <rect x="12" y="56" width="6" height="4" rx="1" fill="#00ff41" stroke="none"/>
  <rect x="20" y="56" width="6" height="4" rx="1" fill="#00ff41" stroke="none" opacity="0.7"/>
  <rect x="28" y="56" width="6" height="4" rx="1" fill="#00ff41" stroke="none" opacity="0.5"/>
  <rect x="36" y="56" width="6" height="4" rx="1" fill="#00ff41" stroke="none" opacity="0.3"/>
  <rect x="44" y="56" width="6" height="4" rx="1" fill="#00ff41" stroke="none" opacity="0.2"/>
  <!-- Binary time -->
  <text x="28" y="6" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">T1</text>
  <text x="48" y="14" font-family="monospace" font-size="4" fill="#00ff41" stroke="none">T2</text>
</svg>