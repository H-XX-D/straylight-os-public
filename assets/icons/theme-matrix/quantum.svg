<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ff41" stroke-width="1.5">
  <!-- Qubit orbital paths -->
  <ellipse cx="32" cy="32" rx="20" ry="8"/>
  <ellipse cx="32" cy="32" rx="20" ry="8" transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="20" ry="8" transform="rotate(120 32 32)"/>
  <!-- Qubit nodes -->
  <circle cx="32" cy="24" r="3" fill="#00ff41" stroke="none"/>
  <circle cx="24" cy="40" r="3" fill="#00ff41" stroke="none"/>
  <circle cx="40" cy="40" r="3" fill="#00ff41" stroke="none"/>
  <!-- Central qubit -->
  <circle cx="32" cy="32" r="5" fill="#00ff41" fill-opacity="0.3"/>
  <circle cx="32" cy="32" r="2" fill="#00ff41" stroke="none"/>
  <!-- Superposition waves -->
  <path d="M8 32c2-4 4-4 6 0s4 4 6 0 4-4 6 0" fill="none" opacity="0.6"/>
  <path d="M38 32c2-4 4-4 6 0s4 4 6 0 4-4 6 0" fill="none" opacity="0.6"/>
  <!-- Quantum state notation -->
  <text x="12" y="14" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">|0⟩</text>
  <text x="44" y="14" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">|1⟩</text>
  <text x="28" y="60" font-family="monospace" font-size="5" fill="#00ff41" stroke="none">|ψ⟩</text>
  <!-- Entanglement lines -->
  <line x1="30" y1="27" x2="26" y2="37" stroke-dasharray="2 1"/>
  <line x1="34" y1="27" x2="38" y2="37" stroke-dasharray="2 1"/>
  <line x1="27" y1="37" x2="37" y2="37" stroke-dasharray="2 1"/>
</svg>