<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="wizGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bfffdb"/>
      <stop offset="100%" stop-color="#39ff85"/>
    </radialGradient>
  </defs>
  <!-- Wizard hat/blob -->
  <path d="M20 48c0-8 6-30 12-38 6 8 12 30 12 38-4 4-20 4-24 0z" fill="url(#wizGrad)" filter="url(#glow)"/>
  <!-- Hat band -->
  <ellipse cx="32" cy="44" rx="14" ry="4" fill="#39ff85" opacity="0.8"/>
  <!-- Magic eye -->
  <ellipse cx="32" cy="28" rx="5" ry="4" fill="#0a1f0a"/>
  <circle cx="32" cy="28" r="2" fill="#39ff85"/>
  <!-- Sparkle tentacles -->
  <path d="M16 40c-4-2-8-2-10 0" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M48 40c4-2 8-2 10 0" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Magic sparks -->
  <circle cx="14" cy="34" r="2" fill="#7fffab" filter="url(#glow)"/>
  <circle cx="50" cy="34" r="2" fill="#7fffab" filter="url(#glow)"/>
  <circle cx="10" cy="44" r="1.5" fill="#bfffdb" filter="url(#glow)"/>
  <circle cx="54" cy="44" r="1.5" fill="#bfffdb" filter="url(#glow)"/>
  <!-- Wand/slime staff -->
  <path d="M44 16c2-4 4-6 6-8" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="52" cy="6" r="3" fill="#7fffab" filter="url(#glow)"/>
  <!-- Setup steps indicators -->
  <circle cx="28" cy="52" r="1.5" fill="#0a1f0a"/>
  <circle cx="32" cy="54" r="1.5" fill="#0a1f0a"/>
  <circle cx="36" cy="52" r="1.5" fill="#0a1f0a"/>
</svg>