<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7fffab"/>
      <stop offset="100%" stop-color="#39ff85"/>
    </linearGradient>
  </defs>
  <!-- Persistent blob storage cells -->
  <rect x="12" y="14" width="18" height="14" rx="3" fill="url(#memGrad)" opacity="0.7" filter="url(#glow)"/>
  <rect x="34" y="14" width="18" height="14" rx="3" fill="url(#memGrad)" opacity="0.7" filter="url(#glow)"/>
  <rect x="12" y="36" width="18" height="14" rx="3" fill="url(#memGrad)" opacity="0.7" filter="url(#glow)"/>
  <rect x="34" y="36" width="18" height="14" rx="3" fill="url(#memGrad)" opacity="0.7" filter="url(#glow)"/>
  <!-- Slime connections -->
  <path d="M30 21h4" stroke="#39ff85" stroke-width="2" stroke-linecap="round"/>
  <path d="M30 43h4" stroke="#39ff85" stroke-width="2" stroke-linecap="round"/>
  <path d="M21 28v8" stroke="#39ff85" stroke-width="2" stroke-linecap="round"/>
  <path d="M43 28v8" stroke="#39ff85" stroke-width="2" stroke-linecap="round"/>
  <!-- Persistence indicators (infinite loop) -->
  <path d="M18 21c-3 0-5 2-5 5s2 5 5 5" stroke="#0a1f0a" stroke-width="1.5" fill="none"/>
  <path d="M46 21c3 0 5 2 5 5s-2 5-5 5" stroke="#0a1f0a" stroke-width="1.5" fill="none"/>
  <path d="M18 43c-3 0-5 2-5 5s2 5 5 5" stroke="#0a1f0a" stroke-width="1.5" fill="none"/>
  <path d="M46 43c3 0 5 2 5 5s-2 5-5 5" stroke="#0a1f0a" stroke-width="1.5" fill="none"/>
  <!-- Active data nodes -->
  <circle cx="21" cy="21" r="2" fill="#bfffdb" filter="url(#glow)"/>
  <circle cx="43" cy="21" r="2" fill="#bfffdb" filter="url(#glow)"/>
  <circle cx="21" cy="43" r="2" fill="#bfffdb" filter="url(#glow)"/>
  <circle cx="43" cy="43" r="2" fill="#bfffdb" filter="url(#glow)"/>
</svg>