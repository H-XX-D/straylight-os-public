  <path d="M14 42c-4 0-8-2-10-6" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M50 22c4 0 8 2 10 6" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M50 42c4 0 8-2 10-6" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- VRAM slime trails -->
  <path d="M8 28c-2 2-4 4-4 8" stroke="#7fffab" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M56 28c2 2 4 4 4 8" stroke="#7fffab" stroke-width="1.5" fill="none" opacity="0.6"/>
</svg>