<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="dmaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39ff85"/>
      <stop offset="100%" stop-color="#7fffab"/>
    </linearGradient>
  </defs>
  <!-- Direct memory channels -->
  <path d="M10 20h20" stroke="url(#dmaGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M10 32h20" stroke="url(#dmaGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M10 44h20" stroke="url(#dmaGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Direct bypass arrow -->
  <path d="M34 20h16" stroke="#7fffab" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M46 16l8 4-8 4z" fill="#7fffab" filter="url(#glow)"/>
  <path d="M34 32h16" stroke="#7fffab" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M46 28l8 4-8 4z" fill="#7fffab" filter="url(#glow)"/>
  <path d="M34 44h16" stroke="#7fffab" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M46 40l8 4-8 4z" fill="#7fffab" filter="url(#glow)"/>
  <!-- Memory blobs -->
  <circle cx="20" cy="20" r="4" fill="#39ff85" filter="url(#glow)"/>
  <circle cx="20" cy="32" r="4" fill="#39ff85" filter="url(#glow)"/>
  <circle cx="20" cy="44" r="4" fill="#39ff85" filter="url(#glow)"/>
  <!-- Target blob -->
  <ellipse cx="56" cy="32" rx="6" ry="14" fill="#39ff85" opacity="0.5" filter="url(#glow)"/>
  <!-- Bypass slime trail -->
  <path d="M32 24c2 2 2 6 0 8" stroke="#39ff85" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M32 36c2 2 2 6 0 8" stroke="#39ff85" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>