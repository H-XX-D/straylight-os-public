<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="regGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7fffab"/>
      <stop offset="100%" stop-color="#39ff85"/>
    </linearGradient>
  </defs>
  <!-- Stacked slime disks -->
  <ellipse cx="32" cy="16" rx="18" ry="6" fill="url(#regGrad)" filter="url(#glow)"/>
  <path d="M14 16v12c0 3 8 6 18 6s18-3 18-6v-12" fill="#39ff85" opacity="0.6" filter="url(#glow)"/>
  <ellipse cx="32" cy="28" rx="18" ry="6" fill="none" stroke="#39ff85" stroke-width="2" filter="url(#glow)"/>

  <ellipse cx="32" cy="30" rx="18" ry="6" fill="url(#regGrad)" filter="url(#glow)"/>
  <path d="M14 30v12c0 3 8 6 18 6s18-3 18-6v-12" fill="#39ff85" opacity="0.6" filter="url(#glow)"/>
  <ellipse cx="32" cy="42" rx="18" ry="6" fill="none" stroke="#39ff85" stroke-width="2" filter="url(#glow)"/>

  <!-- Registry tendrils -->
  <path d="M14 22c-4 2-6 6-6 10" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M50 22c4 2 6 6 6 10" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M14 36c-4 2-6 6-6 10" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M50 36c4 2 6 6 6 10" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Index nodes -->
  <circle cx="20" cy="18" r="2" fill="#0a1f0a"/>
  <circle cx="44" cy="32" r="2" fill="#0a1f0a"/>
  <circle cx="28" cy="46" r="2" fill="#0a1f0a"/>
</svg>