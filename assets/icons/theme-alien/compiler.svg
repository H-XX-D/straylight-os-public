<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bfffdb"/>
      <stop offset="50%" stop-color="#39ff85"/>
      <stop offset="100%" stop-color="#1a8f4a"/>
    </radialGradient>
  </defs>
  <!-- Organic core blob -->
  <ellipse cx="32" cy="32" rx="14" ry="16" fill="url(#coreGrad)" filter="url(#glow)"/>
  <!-- Rotating tentacle code streams -->
  <path d="M18 20c-6-2-10 0-12 4" stroke="#39ff85" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M46 20c6-2 10 0 12 4" stroke="#39ff85" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M18 44c-6 2-10 0-12-4" stroke="#39ff85" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M46 44c6 2 10 0 12-4" stroke="#39ff85" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Code symbols inside -->
  <text x="32" y="28" text-anchor="middle" fill="#0a1f0a" font-family="monospace" font-size="10" font-weight="bold">&lt;/&gt;</text>
  <!-- Binary ooze drops -->
  <circle cx="26" cy="36" r="2" fill="#0a1f0a"/>
  <circle cx="32" cy="38" r="2" fill="#0a1f0a"/>
  <circle cx="38" cy="36" r="2" fill="#0a1f0a"/>
  <!-- Outer transformation ring -->
  <path d="M32 8c-4 0-8 2-10 6" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M32 56c4 0 8-2 10-6" stroke="#39ff85" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>