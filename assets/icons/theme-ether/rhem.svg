<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rhemBolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="rhemCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Ethereal energy container -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#c0c0c0" stroke-width="0.5" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="10s" repeatCount="indefinite"/>
  </circle>
  <!-- Divine lightning bolt -->
  <path d="M34 12 L26 28 L32 28 L30 44 L42 26 L34 26 Z" fill="url(#rhemBolt)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="0.5s" repeatCount="indefinite"/>
  </path>
  <!-- Energy core -->
  <circle cx="32" cy="32" r="6" fill="url(#rhemCore)" opacity="0.8">
    <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Power waves -->
  <path d="M8 20 Q16 16 24 20" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6">
    <animate attributeName="d" values="M8 20 Q16 16 24 20;M8 20 Q16 24 24 20;M8 20 Q16 16 24 20" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M40 20 Q48 16 56 20" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6">
    <animate attributeName="d" values="M40 20 Q48 16 56 20;M40 20 Q48 24 56 20;M40 20 Q48 16 56 20" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M8 44 Q16 40 24 44" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5">
    <animate attributeName="d" values="M8 44 Q16 40 24 44;M8 44 Q16 48 24 44;M8 44 Q16 40 24 44" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M40 44 Q48 40 56 44" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5">
    <animate attributeName="d" values="M40 44 Q48 40 56 44;M40 44 Q48 48 56 44;M40 44 Q48 40 56 44" dur="0.9s" repeatCount="indefinite"/>
  </path>
  <!-- Spiritual sparks -->
  <circle cx="16" cy="32" r="1.5" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="32" r="1.5" fill="#d4af37" opacity="0.8">
    <animate attributeName="opacity" values="0;1;0" dur="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="8" r="1" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0;1;0" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="56" r="1" fill="#d4af37" opacity="0.7">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </circle>
  <!-- Sacred power indicators -->
  <text x="28" y="58" fill="#d4af37" font-family="serif" font-size="5" opacity="0.6">⚡</text>
</svg>