<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="entCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Ethereal chaos spirals -->
  <g opacity="0.7">
    <path d="M32 32 Q40 24 48 32 Q40 40 32 32" fill="none" stroke="#ffffff" stroke-width="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M32 32 Q24 40 16 32 Q24 24 32 32" fill="none" stroke="#d4af37" stroke-width="0.8">
      <animateTransform attributeName="transform" type="rotate" from="360 32 32" to="0 32 32" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M32 32 Q42 28 46 38 Q36 42 32 32" fill="none" stroke="#c0c0c0" stroke-width="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="-360 32 32" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M32 32 Q22 36 18 26 Q28 22 32 32" fill="none" stroke="#c0c0c0" stroke-width="0.8">
      <animateTransform attributeName="transform" type="rotate" from="-360 32 32" to="0 32 32" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Divine core pulse -->
  <circle cx="32" cy="32" r="6" fill="url(#entCenter)" opacity="0.9">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Randomness particles -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="20" cy="16" r="1.5">
      <animate attributeName="opacity" values="0;1;0" dur="1.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="18" r="1.5">
      <animate attributeName="opacity" values="0;1;0" dur="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="16" cy="48" r="1.5">
      <animate attributeName="opacity" values="0;1;0" dur="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="46" r="1.5">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="8" r="1">
      <animate attributeName="opacity" values="0;1;0" dur="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="56" r="1">
      <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="32" r="1">
      <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="56" cy="32" r="1">
      <animate attributeName="opacity" values="0;1;0" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Golden sparkles -->
  <g fill="#d4af37" opacity="0.7">
    <text x="24" y="20" font-size="6" font-family="serif">✦</text>
    <text x="44" y="24" font-size="5" font-family="serif">✦</text>
    <text x="18" y="44" font-size="5" font-family="serif">✦</text>
    <text x="46" y="48" font-size="6" font-family="serif">✦</text>
  </g>
  <!-- Mystical ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.3" stroke-dasharray="4,4">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="30s" repeatCount="indefinite"/>
  </circle>
</svg>