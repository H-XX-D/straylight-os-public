<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon frame -->
  <path d="M32 4 L56 16 L56 44 L32 56 L8 44 L8 16 Z" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>

  <!-- Persistent memory module -->
  <rect x="16" y="18" width="32" height="28" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>

  <!-- Memory chips - hexagonal pattern -->
  <path d="M22 22 L26 24 L26 28 L22 30 L18 28 L18 24 Z" fill="currentColor" opacity="0.6"/>
  <path d="M34 22 L38 24 L38 28 L34 30 L30 28 L30 24 Z" fill="currentColor" opacity="0.6"/>
  <path d="M22 34 L26 36 L26 40 L22 42 L18 40 L18 36 Z" fill="currentColor" opacity="0.6"/>
  <path d="M34 34 L38 36 L38 40 L34 42 L30 40 L30 36 Z" fill="currentColor" opacity="0.6"/>

  <!-- Battery/backup indicator -->
  <rect x="44" y="20" width="4" height="8" rx="1" fill="currentColor" opacity="0.8"/>
  <rect x="45" y="18" width="2" height="2" fill="currentColor" opacity="0.6"/>

  <!-- Persistence symbol (infinity-like) -->
  <path d="M44 36 C44 34 46 34 48 36 C50 38 50 40 48 42 C46 44 44 44 44 42" fill="none" stroke="currentColor" stroke-width="1.5"/>

  <!-- Connection pins -->
  <line x1="20" y1="46" x2="20" y2="50" stroke="currentColor" stroke-width="1.5"/>
  <line x1="28" y1="46" x2="28" y2="50" stroke="currentColor" stroke-width="1.5"/>
  <line x1="36" y1="46" x2="36" y2="50" stroke="currentColor" stroke-width="1.5"/>
  <line x1="44" y1="46" x2="44" y2="50" stroke="currentColor" stroke-width="1.5"/>
</svg>