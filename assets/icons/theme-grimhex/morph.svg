<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon frame -->
  <path d="M32 4 L56 16 L56 44 L32 56 L8 44 L8 16 Z" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>

  <!-- Morphing hexagon - transform indicator -->
  <g opacity="0.3">
    <path d="M32 8 L48 16 L48 32 L32 40 L16 32 L16 16 Z" fill="none" stroke="currentColor" stroke-width="0.8"/>
  </g>

  <!-- Active morphing shape -->
  <path d="M32 14 L46 21 L46 35 L32 42 L18 35 L18 21 Z" fill="currentColor" opacity="0.15"/>
  <path d="M32 14 L46 21 L46 35 L32 42 L18 35 L18 21 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>

  <!-- Arrows indicating transformation -->
  <path d="M10 20 L14 20 L12 17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M54 28 L50 28 L52 31" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M10 36 L14 36 L12 39" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dynamic nodes -->
  <circle cx="32" cy="28" r="3" fill="currentColor"/>
  <circle cx="24" cy="24" r="2" fill="currentColor" opacity="0.6"/>
  <circle cx="40" cy="24" r="2" fill="currentColor" opacity="0.6"/>
  <circle cx="24" cy="32" r="2" fill="currentColor" opacity="0.6"/>
  <circle cx="40" cy="32" r="2" fill="currentColor" opacity="0.6"/>

  <!-- Morph connections -->
  <line x1="26" y1="24" x2="30" y2="26.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="38" y1="24" x2="34" y2="26.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="26" y1="32" x2="30" y2="29.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="38" y1="32" x2="34" y2="29.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
</svg>