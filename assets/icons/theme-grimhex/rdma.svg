<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon frame -->
  <path d="M32 4 L56 16 L56 44 L32 56 L8 44 L8 16 Z" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>

  <!-- Two memory nodes -->
  <rect x="10" y="20" width="16" height="20" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <rect x="38" y="20" width="16" height="20" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>

  <!-- Memory chips inside -->
  <line x1="14" y1="24" x2="22" y2="24" stroke="currentColor" stroke-width="2" opacity="0.6"/>
  <line x1="14" y1="28" x2="22" y2="28" stroke="currentColor" stroke-width="2" opacity="0.6"/>
  <line x1="14" y1="32" x2="22" y2="32" stroke="currentColor" stroke-width="2" opacity="0.6"/>
  <line x1="14" y1="36" x2="22" y2="36" stroke="currentColor" stroke-width="2" opacity="0.6"/>

  <line x1="42" y1="24" x2="50" y2="24" stroke="currentColor" stroke-width="2" opacity="0.6"/>
  <line x1="42" y1="28" x2="50" y2="28" stroke="currentColor" stroke-width="2" opacity="0.6"/>
  <line x1="42" y1="32" x2="50" y2="32" stroke="currentColor" stroke-width="2" opacity="0.6"/>
  <line x1="42" y1="36" x2="50" y2="36" stroke="currentColor" stroke-width="2" opacity="0.6"/>

  <!-- Direct memory access arrow (bypassing CPU) -->
  <path d="M26 30 L38 30" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="4 2"/>
  <polygon points="38,30 34,27 34,33" fill="currentColor"/>

  <!-- Bypass arc over -->
  <path d="M26 26 Q32 18 38 26" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>

  <!-- Data packet hexagon -->
  <path d="M30 28 L32 29 L32 31 L30 32 L28 31 L28 29 Z" fill="currentColor"/>
</svg>