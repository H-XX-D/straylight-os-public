<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Quantum orbital shells -->
  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="url(#purpleGrad)" stroke-width="0.5" opacity="0.5" transform="rotate(0 32 32)"/>
  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="url(#cyanGrad)" stroke-width="0.5" opacity="0.5" transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="url(#silverGrad)" stroke-width="0.5" opacity="0.4" transform="rotate(120 32 32)"/>
  <!-- Nucleus -->
  <circle cx="32" cy="32" r="6" fill="url(#purpleGrad)"/>
  <!-- Electrons/qubits -->
  <circle cx="32" cy="8" r="2.5" fill="url(#cyanGrad)"/>
  <circle cx="54" cy="24" r="2.5" fill="url(#cyanGrad)"/>
  <circle cx="46" cy="52" r="2.5" fill="url(#cyanGrad)"/>
  <circle cx="10" cy="40" r="2.5" fill="url(#cyanGrad)"/>
  <circle cx="18" cy="14" r="2.5" fill="url(#silverGrad)"/>
  <circle cx="56" cy="40" r="2.5" fill="url(#silverGrad)"/>
  <!-- Quantum state waves -->
  <path d="M28 32 Q30 28 32 32 Q34 36 36 32" fill="none" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.7"/>
  <!-- Stars -->
  <circle cx="6" cy="10" r="0.6" fill="#e2e8f0" opacity="0.8"/>
  <circle cx="60" cy="8" r="0.5" fill="#5eead4" opacity="0.7"/>
  <circle cx="58" cy="58" r="0.7" fill="#a78bfa" opacity="0.6"/>
  <circle cx="8" cy="56" r="0.5" fill="#e2e8f0" opacity="0.5"/>
</svg>