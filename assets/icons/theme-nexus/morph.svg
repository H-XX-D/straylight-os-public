<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Morphing orbital paths -->
  <ellipse cx="32" cy="32" rx="26" ry="12" fill="none" stroke="url(#purpleGrad)" stroke-width="0.5" opacity="0.5" transform="rotate(-20 32 32)"/>
  <ellipse cx="32" cy="32" rx="26" ry="12" fill="none" stroke="url(#cyanGrad)" stroke-width="0.5" opacity="0.5" transform="rotate(20 32 32)"/>
  <!-- Morphing shape (transforming hexagon to circle) -->
  <path d="M32 12 L44 18 L48 32 L44 46 L32 52 L20 46 L16 32 L20 18 Z" fill="none" stroke="url(#silverGrad)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="url(#purpleGrad)" stroke-width="1.5"/>
  <!-- Inner morphing elements -->
  <path d="M32 20 Q40 24 40 32 Q40 40 32 44 Q24 40 24 32 Q24 24 32 20" fill="url(#cyanGrad)" opacity="0.3"/>
  <path d="M32 20 Q40 24 40 32 Q40 40 32 44 Q24 40 24 32 Q24 24 32 20" fill="none" stroke="url(#cyanGrad)" stroke-width="1"/>
  <!-- Transform arrows -->
  <path d="M48 16 L52 12 L56 16" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M52 20 L52 12" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16 48 L12 52 L8 48" fill="none" stroke="url(#purpleGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M12 44 L12 52" fill="none" stroke="url(#purpleGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stars -->
  <circle cx="6" cy="10" r="0.6" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="58" cy="12" r="0.5" fill="#5eead4" opacity="0.6"/>
  <circle cx="56" cy="54" r="0.7" fill="#a78bfa" opacity="0.5"/>
</svg>