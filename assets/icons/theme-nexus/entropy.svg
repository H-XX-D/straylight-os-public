<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Chaotic orbital rings -->
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="url(#purpleGrad)" stroke-width="0.5" opacity="0.4" transform="rotate(-30 32 32)"/>
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="url(#cyanGrad)" stroke-width="0.5" opacity="0.4" transform="rotate(30 32 32)"/>
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="url(#silverGrad)" stroke-width="0.5" opacity="0.3" transform="rotate(90 32 32)"/>
  <!-- Random particles representing entropy -->
  <circle cx="20" cy="18" r="2" fill="url(#purpleGrad)"/>
  <circle cx="44" cy="16" r="1.5" fill="url(#cyanGrad)"/>
  <circle cx="48" cy="36" r="2.5" fill="url(#silverGrad)"/>
  <circle cx="18" cy="38" r="1.8" fill="url(#purpleGrad)"/>
  <circle cx="32" cy="12" r="1.2" fill="url(#cyanGrad)"/>
  <circle cx="52" cy="28" r="1.5" fill="url(#purpleGrad)"/>
  <circle cx="12" cy="28" r="1.3" fill="url(#silverGrad)"/>
  <circle cx="32" cy="52" r="2" fill="url(#cyanGrad)"/>
  <circle cx="24" cy="46" r="1.2" fill="url(#purpleGrad)"/>
  <circle cx="42" cy="48" r="1.5" fill="url(#silverGrad)"/>
  <!-- Core dice/random symbol -->
  <rect x="26" y="26" width="12" height="12" rx="2" fill="none" stroke="url(#silverGrad)" stroke-width="1.5" transform="rotate(15 32 32)"/>
  <circle cx="29" cy="30" r="1" fill="url(#purpleGrad)"/>
  <circle cx="35" cy="30" r="1" fill="url(#purpleGrad)"/>
  <circle cx="32" cy="34" r="1" fill="url(#cyanGrad)"/>
  <circle cx="29" cy="38" r="1" fill="url(#cyanGrad)"/>
  <circle cx="35" cy="38" r="1" fill="url(#cyanGrad)"/>
  <!-- Stars -->
  <circle cx="6" cy="10" r="0.5" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="58" cy="12" r="0.6" fill="#5eead4" opacity="0.5"/>
  <circle cx="60" cy="54" r="0.5" fill="#a78bfa" opacity="0.6"/>
</svg>