<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Neural orbit -->
  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="url(#purpleGrad)" stroke-width="0.5" opacity="0.4" transform="rotate(-20 32 32)"/>
  <!-- Neuron layers -->
  <!-- Input layer -->
  <circle cx="14" cy="20" r="3" fill="url(#cyanGrad)"/>
  <circle cx="14" cy="32" r="3" fill="url(#cyanGrad)"/>
  <circle cx="14" cy="44" r="3" fill="url(#cyanGrad)"/>
  <!-- Hidden layer -->
  <circle cx="32" cy="16" r="3" fill="url(#purpleGrad)"/>
  <circle cx="32" cy="28" r="3" fill="url(#purpleGrad)"/>
  <circle cx="32" cy="40" r="3" fill="url(#purpleGrad)"/>
  <circle cx="32" cy="52" r="3" fill="url(#purpleGrad)"/>
  <!-- Output layer -->
  <circle cx="50" cy="24" r="3" fill="url(#silverGrad)"/>
  <circle cx="50" cy="40" r="3" fill="url(#silverGrad)"/>
  <!-- Connections -->
  <line x1="17" y1="20" x2="29" y2="16" stroke="url(#cyanGrad)" stroke-width="0.8" opacity="0.6"/>
  <line x1="17" y1="20" x2="29" y2="28" stroke="url(#cyanGrad)" stroke-width="0.8" opacity="0.6"/>
  <line x1="17" y1="32" x2="29" y2="28" stroke="url(#cyanGrad)" stroke-width="0.8" opacity="0.6"/>
  <line x1="17" y1="32" x2="29" y2="40" stroke="url(#cyanGrad)" stroke-width="0.8" opacity="0.6"/>
  <line x1="17" y1="44" x2="29" y2="40" stroke="url(#cyanGrad)" stroke-width="0.8" opacity="0.6"/>
  <line x1="17" y1="44" x2="29" y2="52" stroke="url(#cyanGrad)" stroke-width="0.8" opacity="0.6"/>
  <line x1="35" y1="16" x2="47" y2="24" stroke="url(#purpleGrad)" stroke-width="0.8" opacity="0.6"/>
  <line x1="35" y1="28" x2="47" y2="24" stroke="url(#purpleGrad)" stroke-width="0.8" opacity="0.6"/>
  <line x1="35" y1="28" x2="47" y2="40" stroke="url(#purpleGrad)" stroke-width="0.8" opacity="0.6"/>
  <line x1="35" y1="40" x2="47" y2="40" stroke="url(#purpleGrad)" stroke-width="0.8" opacity="0.6"/>
  <line x1="35" y1="52" x2="47" y2="40" stroke="url(#purpleGrad)" stroke-width="0.8" opacity="0.6"/>
  <!-- Stars -->
  <circle cx="8" cy="10" r="0.6" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="56" cy="12" r="0.5" fill="#5eead4" opacity="0.6"/>
  <circle cx="58" cy="54" r="0.7" fill="#a78bfa" opacity="0.5"/>
</svg>