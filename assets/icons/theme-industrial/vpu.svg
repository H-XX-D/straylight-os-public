<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- GPU/Video card body -->
  <rect x="8" y="12" width="48" height="40" rx="3" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Heat sink fins -->
  <g stroke="url(#brass)" stroke-width="2">
    <line x1="16" y1="16" x2="16" y2="48"/>
    <line x1="24" y1="16" x2="24" y2="48"/>
    <line x1="32" y1="16" x2="32" y2="48"/>
    <line x1="40" y1="16" x2="40" y2="48"/>
    <line x1="48" y1="16" x2="48" y2="48"/>
  </g>

  <!-- PCI connector -->
  <rect x="8" y="50" width="48" height="6" rx="1" fill="url(#brass)"/>
  <g fill="url(#steel)">
    <rect x="12" y="52" width="2" height="4"/>
    <rect x="18" y="52" width="2" height="4"/>
    <rect x="24" y="52" width="2" height="4"/>
    <rect x="30" y="52" width="2" height="4"/>
    <rect x="36" y="52" width="2" height="4"/>
    <rect x="42" y="52" width="2" height="4"/>
    <rect x="48" y="52" width="2" height="4"/>
  </g>

  <!-- Display connector ports -->
  <rect x="10" y="8" width="8" height="6" rx="1" fill="url(#rust)"/>
  <rect x="22" y="8" width="8" height="6" rx="1" fill="url(#rust)"/>
  <rect x="34" y="8" width="8" height="6" rx="1" fill="url(#rust)"/>

  <!-- Fan hub in center -->
  <circle cx="32" cy="32" r="8" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <circle cx="32" cy="32" r="3" fill="url(#rust)"/>

  <!-- Fan blades -->
  <g stroke="url(#steel)" stroke-width="1.5">
    <line x1="32" y1="24" x2="32" y2="18"/>
    <line x1="40" y1="32" x2="46" y2="32"/>
    <line x1="32" y1="40" x2="32" y2="46"/>
    <line x1="24" y1="32" x2="18" y2="32"/>
    <line x1="37.7" y1="26.3" x2="42" y2="22"/>
    <line x1="37.7" y1="37.7" x2="42" y2="42"/>
    <line x1="26.3" y1="37.7" x2="22" y2="42"/>
    <line x1="26.3" y1="26.3" x2="22" y2="22"/>
  </g>

  <!-- Corner rivets -->
  <circle cx="12" cy="16" r="1.5" fill="url(#brass)"/>
  <circle cx="52" cy="16" r="1.5" fill="url(#brass)"/>
  <circle cx="12" cy="44" r="1.5" fill="url(#brass)"/>
  <circle cx="52" cy="44" r="1.5" fill="url(#brass)"/>
</svg>