<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- Power plant/energy core outline -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Central energy core -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="url(#brass)" stroke-width="3"/>
  <circle cx="32" cy="32" r="6" fill="url(#rust)"/>

  <!-- Radiating energy lines -->
  <g stroke="url(#brass)" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="8" x2="32" y2="16"/>
    <line x1="32" y1="48" x2="32" y2="56"/>
    <line x1="8" y1="32" x2="16" y2="32"/>
    <line x1="48" y1="32" x2="56" y2="32"/>
    <line x1="15" y1="15" x2="21" y2="21"/>
    <line x1="43" y1="43" x2="49" y2="49"/>
    <line x1="49" y1="15" x2="43" y2="21"/>
    <line x1="21" y1="43" x2="15" y2="49"/>
  </g>

  <!-- Power meter gauge -->
  <path d="M24 24 Q32 14 40 24" fill="none" stroke="url(#steel)" stroke-width="2"/>
  <line x1="32" y1="18" x2="32" y2="24" stroke="url(#rust)" stroke-width="2" stroke-linecap="round"/>

  <!-- Cooling fins -->
  <g stroke="url(#steel)" stroke-width="1.5">
    <line x1="20" y1="10" x2="22" y2="14"/>
    <line x1="44" y1="10" x2="42" y2="14"/>
    <line x1="20" y1="54" x2="22" y2="50"/>
    <line x1="44" y1="54" x2="42" y2="50"/>
  </g>

  <!-- Warning indicators -->
  <circle cx="32" cy="6" r="2" fill="url(#rust)"/>
  <circle cx="32" cy="58" r="2" fill="url(#rust)"/>
  <circle cx="6" cy="32" r="2" fill="url(#rust)"/>
  <circle cx="58" cy="32" r="2" fill="url(#rust)"/>
</svg>