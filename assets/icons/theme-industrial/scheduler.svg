<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- Clock gear mechanism -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Gear teeth around clock -->
  <g stroke="url(#steel)" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="2" x2="32" y2="6"/>
    <line x1="32" y1="58" x2="32" y2="62"/>
    <line x1="2" y1="32" x2="6" y2="32"/>
    <line x1="58" y1="32" x2="62" y2="32"/>
    <line x1="11" y1="11" x2="14" y2="14"/>
    <line x1="50" y1="50" x2="53" y2="53"/>
    <line x1="53" y1="11" x2="50" y2="14"/>
    <line x1="14" y1="50" x2="11" y2="53"/>
  </g>

  <!-- Clock face -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="url(#brass)" stroke-width="2"/>

  <!-- Hour markers -->
  <g fill="url(#rust)">
    <circle cx="32" cy="16" r="2"/>
    <circle cx="32" cy="48" r="2"/>
    <circle cx="16" cy="32" r="2"/>
    <circle cx="48" cy="32" r="2"/>
  </g>

  <!-- Clock hands -->
  <line x1="32" y1="32" x2="32" y2="20" stroke="url(#steel)" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="42" y2="38" stroke="url(#brass)" stroke-width="2" stroke-linecap="round"/>

  <!-- Center pivot -->
  <circle cx="32" cy="32" r="4" fill="url(#rust)"/>
  <circle cx="32" cy="32" r="2" fill="url(#brass)"/>

  <!-- Thread indicators -->
  <g stroke="url(#brass)" stroke-width="1.5">
    <line x1="24" y1="24" x2="20" y2="20"/>
    <line x1="40" y1="40" x2="44" y2="44"/>
    <line x1="40" y1="24" x2="44" y2="20"/>
    <line x1="24" y1="40" x2="20" y2="44"/>
  </g>
</svg>