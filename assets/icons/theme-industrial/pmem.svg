<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- Battery-like persistent storage -->
  <rect x="18" y="8" width="28" height="48" rx="3" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Positive terminal -->
  <rect x="26" y="4" width="12" height="6" rx="1" fill="url(#brass)"/>

  <!-- Charge level indicators -->
  <rect x="22" y="14" width="20" height="8" rx="1" fill="url(#rust)"/>
  <rect x="22" y="26" width="20" height="8" rx="1" fill="url(#brass)"/>
  <rect x="22" y="38" width="20" height="8" rx="1" fill="url(#brass)"/>

  <!-- Persistent indicator (infinity/loop) -->
  <path d="M26 50 Q32 44 38 50 Q32 56 26 50" fill="none" stroke="url(#rust)" stroke-width="2"/>

  <!-- Side contacts -->
  <rect x="14" y="20" width="4" height="8" rx="1" fill="url(#brass)"/>
  <rect x="14" y="36" width="4" height="8" rx="1" fill="url(#brass)"/>
  <rect x="46" y="20" width="4" height="8" rx="1" fill="url(#brass)"/>
  <rect x="46" y="36" width="4" height="8" rx="1" fill="url(#brass)"/>

  <!-- Capacitor plates inside -->
  <line x1="24" y1="18" x2="24" y2="46" stroke="url(#steel)" stroke-width="1"/>
  <line x1="40" y1="18" x2="40" y2="46" stroke="url(#steel)" stroke-width="1"/>

  <!-- Rivets on corners -->
  <circle cx="21" cy="11" r="1.5" fill="url(#brass)"/>
  <circle cx="43" cy="11" r="1.5" fill="url(#brass)"/>
  <circle cx="21" cy="53" r="1.5" fill="url(#brass)"/>
  <circle cx="43" cy="53" r="1.5" fill="url(#brass)"/>
</svg>