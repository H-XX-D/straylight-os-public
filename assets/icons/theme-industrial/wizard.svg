<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- Control panel frame -->
  <rect x="8" y="6" width="48" height="52" rx="3" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Gauge/instrument -->
  <circle cx="24" cy="22" r="10" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <path d="M18 22 Q24 14 30 22" fill="none" stroke="url(#rust)" stroke-width="1.5"/>
  <line x1="24" y1="22" x2="28" y2="18" stroke="url(#steel)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="22" r="2" fill="url(#brass)"/>

  <!-- Lever/switch -->
  <rect x="38" y="16" width="12" height="6" rx="1" fill="url(#brass)"/>
  <rect x="40" y="12" width="3" height="8" rx="0.5" fill="url(#rust)"/>
  <circle cx="41.5" cy="14" r="2" fill="url(#steel)"/>

  <!-- Progress indicators -->
  <g fill="none" stroke="url(#brass)" stroke-width="2">
    <rect x="14" y="38" width="10" height="4" rx="1"/>
    <rect x="14" y="46" width="10" height="4" rx="1"/>
  </g>
  <g fill="url(#rust)">
    <rect x="16" y="39" width="6" height="2" rx="0.5"/>
    <rect x="16" y="47" width="4" height="2" rx="0.5"/>
  </g>

  <!-- Big red button -->
  <circle cx="44" cy="44" r="8" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <circle cx="44" cy="44" r="5" fill="url(#rust)"/>
  <circle cx="44" cy="44" r="2" fill="#8b4513"/>

  <!-- Status lights -->
  <circle cx="12" cy="10" r="2" fill="url(#brass)"/>
  <circle cx="52" cy="10" r="2" fill="url(#rust)"/>

  <!-- Panel screws -->
  <circle cx="10" cy="54" r="1.5" fill="url(#brass)"/>
  <circle cx="54" cy="54" r="1.5" fill="url(#brass)"/>
</svg>