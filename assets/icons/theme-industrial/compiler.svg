<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="50%" style="stop-color:#8a8a8a"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#b87333"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f"/>
      <stop offset="50%" style="stop-color:#a0522d"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>

  <!-- Piston housing -->
  <rect x="12" y="8" width="40" height="48" rx="4" fill="none" stroke="url(#steel)" stroke-width="3"/>

  <!-- Cylinder lines -->
  <line x1="20" y1="8" x2="20" y2="56" stroke="url(#steel)" stroke-width="1.5"/>
  <line x1="44" y1="8" x2="44" y2="56" stroke="url(#steel)" stroke-width="1.5"/>

  <!-- Piston head -->
  <rect x="16" y="20" width="32" height="12" rx="2" fill="url(#brass)"/>

  <!-- Piston rod -->
  <rect x="30" y="8" width="4" height="20" fill="url(#rust)"/>

  <!-- Connecting arm -->
  <path d="M18 26 L10 32 L10 48 L18 42" fill="none" stroke="url(#brass)" stroke-width="3" stroke-linejoin="round"/>
  <path d="M46 26 L54 32 L54 48 L46 42" fill="none" stroke="url(#brass)" stroke-width="3" stroke-linejoin="round"/>

  <!-- Crank gear -->
  <circle cx="32" cy="46" r="8" fill="none" stroke="url(#steel)" stroke-width="2"/>
  <circle cx="32" cy="46" r="4" fill="url(#rust)"/>

  <!-- Gear teeth on crank -->
  <g stroke="url(#steel)" stroke-width="2">
    <line x1="32" y1="36" x2="32" y2="38"/>
    <line x1="32" y1="54" x2="32" y2="56"/>
    <line x1="22" y1="46" x2="24" y2="46"/>
    <line x1="40" y1="46" x2="42" y2="46"/>
  </g>

  <!-- Rivets -->
  <circle cx="16" cy="12" r="1.5" fill="url(#brass)"/>
  <circle cx="48" cy="12" r="1.5" fill="url(#brass)"/>
  <circle cx="16" cy="52" r="1.5" fill="url(#brass)"/>
  <circle cx="48" cy="52" r="1.5" fill="url(#brass)"/>
</svg>