<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Magma gradient - flowing lava -->
    <linearGradient id="magmaGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Intense fire gradient -->
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Ember glow -->
    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb700;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:0" />
    </radialGradient>

    <!-- Heat haze -->
    <filter id="heatGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Intense fire blur -->
    <filter id="fireBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background - volcanic rock -->
  <circle cx="32" cy="32" r="30" fill="#1a0a05" stroke="#ff4500" stroke-width="2"/>


  <!-- Hardware Entropy - Chaos flames -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="url(#magmaGrad)" stroke-width="2" filter="url(#heatGlow)"/>
  <!-- Random flame spikes -->
  <path d="M32 14 Q28 22 32 28 Q36 22 32 14" fill="#ffb700" filter="url(#fireBlur)"/>
  <path d="M32 50 Q28 42 32 36 Q36 42 32 50" fill="#ff4500" filter="url(#fireBlur)"/>
  <path d="M14 32 Q22 28 28 32 Q22 36 14 32" fill="#ff6600" filter="url(#fireBlur)"/>
  <path d="M50 32 Q42 28 36 32 Q42 36 50 32" fill="#ff6600" filter="url(#fireBlur)"/>
  <!-- Chaos particles -->
  <circle cx="24" cy="24" r="2" fill="#ffb700"/>
  <circle cx="40" cy="24" r="1.5" fill="#ff6600"/>
  <circle cx="24" cy="40" r="1.5" fill="#ff6600"/>
  <circle cx="40" cy="40" r="2" fill="#ffb700"/>
  <circle cx="32" cy="20" r="1" fill="#ffb700"/>

</svg>