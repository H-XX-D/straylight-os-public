<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Magma gradient - flowing lava -->
    <linearGradient id="magmaGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Intense fire gradient -->
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Ember glow -->
    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb700;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:0" />
    </radialGradient>

    <!-- Heat haze -->
    <filter id="heatGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Intense fire blur -->
    <filter id="fireBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background - volcanic rock -->
  <circle cx="32" cy="32" r="30" fill="#1a0a05" stroke="#ff4500" stroke-width="2"/>


  <!-- Dynamic Morphing - Shifting lava forms -->
  <path d="M32 10 Q45 15 48 32 Q45 49 32 54 Q19 49 16 32 Q19 15 32 10"
        fill="none" stroke="url(#magmaGrad)" stroke-width="2.5" filter="url(#heatGlow)"/>
  <!-- Morphing blob -->
  <path d="M32 20 Q38 24 38 32 Q38 40 32 44 Q26 40 26 32 Q26 24 32 20"
        fill="url(#fireGrad)" filter="url(#fireBlur)"/>
  <!-- Transition arrows -->
  <path d="M48 16 L52 12 M48 16 L44 12" stroke="#ffb700" stroke-width="2" stroke-linecap="round"/>
  <path d="M16 48 L12 52 M16 48 L20 52" stroke="#ffb700" stroke-width="2" stroke-linecap="round"/>
  <circle cx="48" cy="16" r="2" fill="#ffb700"/>
  <circle cx="16" cy="48" r="2" fill="#ffb700"/>

</svg>