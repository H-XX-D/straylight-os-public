<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Magma gradient - flowing lava -->
    <linearGradient id="magmaGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Intense fire gradient -->
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Ember glow -->
    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb700;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:0" />
    </radialGradient>

    <!-- Heat haze -->
    <filter id="heatGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Intense fire blur -->
    <filter id="fireBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background - volcanic rock -->
  <circle cx="32" cy="32" r="30" fill="#1a0a05" stroke="#ff4500" stroke-width="2"/>


  <!-- Neural Network - Fire neurons -->
  <!-- Neurons as flame nodes -->
  <circle cx="20" cy="20" r="4" fill="#ffb700" filter="url(#fireBlur)"/>
  <circle cx="44" cy="20" r="4" fill="#ffb700" filter="url(#fireBlur)"/>
  <circle cx="32" cy="32" r="5" fill="#ff6600" filter="url(#fireBlur)"/>
  <circle cx="20" cy="44" r="4" fill="#ffb700" filter="url(#fireBlur)"/>
  <circle cx="44" cy="44" r="4" fill="#ffb700" filter="url(#fireBlur)"/>
  <!-- Synapses as lava streams -->
  <path d="M24 20 L28 28" stroke="#ff4500" stroke-width="2" stroke-linecap="round"/>
  <path d="M40 20 L36 28" stroke="#ff4500" stroke-width="2" stroke-linecap="round"/>
  <path d="M24 44 L28 36" stroke="#ff4500" stroke-width="2" stroke-linecap="round"/>
  <path d="M40 44 L36 36" stroke="#ff4500" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 37 L32 27" stroke="#ffb700" stroke-width="2" stroke-linecap="round"/>

</svg>