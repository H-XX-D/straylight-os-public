<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a7a7a"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#7a7a7a"/>
    </linearGradient>
  </defs>
  <!-- Kernel boundary line -->
  <line x1="4" y1="40" x2="60" y2="40" stroke="#5a5a5a" stroke-width="2"/>
  <text x="32" y="48" text-anchor="middle" font-size="5" fill="#7a7a7a">KERNEL</text>
  <!-- Fast path arrow (XDP) -->
  <path d="M8 20 L48 20 L48 14 L60 24 L48 34 L48 28 L8 28 Z" fill="url(#silver)"/>
  <!-- X program hexagon -->
  <path d="M28 4 L36 8 L36 16 L28 20 L20 16 L20 8 Z" fill="#c0c0c0"/>
  <text x="28" y="15" text-anchor="middle" font-size="6" fill="#5a5a5a" font-weight="bold">X</text>
  <!-- Packet drop/redirect indicators -->
  <path d="M52 4 L58 7 L58 13 L52 16 L46 13 L46 7 Z" fill="#a0a0a0"/>
  <path d="M56 8 L54 12 L52 10" fill="none" stroke="#7a7a7a" stroke-width="1.5"/>
  <!-- Slow path (normal kernel) -->
  <path d="M12 52 L18 55 L18 61 L12 64 L6 61 L6 55 Z" fill="#7a7a7a" opacity="0.5"/>
  <path d="M28 52 L34 55 L34 61 L28 64 L22 61 L22 55 Z" fill="#7a7a7a" opacity="0.5"/>
  <path d="M44 52 L50 55 L50 61 L44 64 L38 61 L38 55 Z" fill="#7a7a7a" opacity="0.5"/>
  <!-- Bypass indicator -->
  <line x1="20" y1="28" x2="16" y2="38" stroke="#7a7a7a" stroke-width="0.5" stroke-dasharray="2,1"/>
  <line x1="36" y1="28" x2="32" y2="38" stroke="#7a7a7a" stroke-width="0.5" stroke-dasharray="2,1"/>
  <line x1="48" y1="28" x2="48" y2="38" stroke="#7a7a7a" stroke-width="0.5" stroke-dasharray="2,1"/>
  <!-- Nano packet structures -->
  <circle cx="14" cy="24" r="2" fill="#a0a0a0"/>
  <circle cx="28" cy="24" r="2" fill="#a0a0a0"/>
  <circle cx="42" cy="24" r="2" fill="#a0a0a0"/>
</svg>