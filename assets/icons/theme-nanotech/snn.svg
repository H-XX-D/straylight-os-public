  <line x1="14" y1="34" x2="20" y2="30" stroke="#7a7a7a" stroke-width="0.8"/>
  <line x1="14" y1="34" x2="20" y2="46" stroke="#7a7a7a" stroke-width="0.8"/>
  <line x1="14" y1="50" x2="20" y2="38" stroke="#7a7a7a" stroke-width="0.8"/>
  <line x1="14" y1="50" x2="20" y2="46" stroke="#7a7a7a" stroke-width="0.8"/>
  <!-- Hidden to output connections -->
  <line x1="32" y1="30" x2="38" y2="22" stroke="#7a7a7a" stroke-width="0.8"/>
  <line x1="32" y1="30" x2="38" y2="38" stroke="#7a7a7a" stroke-width="0.8"/>
