<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Coral structure as persistent memory -->
  <path d="M32 52 L32 40" stroke="#00ccff" stroke-width="3" stroke-linecap="round"/>
  <!-- Memory branches -->
  <path d="M32 44 Q24 38 20 42 Q16 36 22 32" fill="none" stroke="#39ff85" stroke-width="2"/>
  <path d="M32 48 Q40 42 44 46 Q48 40 42 36" fill="none" stroke="#39ff85" stroke-width="2"/>
  <path d="M32 40 Q26 32 24 28 Q20 24 26 22" fill="none" stroke="#00ccff" stroke-width="2"/>
  <path d="M32 36 Q38 30 40 26 Q44 22 38 20" fill="none" stroke="#00ccff" stroke-width="2"/>
  <!-- Memory nodes as coral polyps -->
  <circle cx="20" cy="42" r="3" fill="#39ff85" opacity="0.8"/>
  <circle cx="22" cy="32" r="2.5" fill="#00ccff" opacity="0.8"/>
  <circle cx="26" cy="22" r="2" fill="#39ff85" opacity="0.8"/>
  <circle cx="44" cy="46" r="3" fill="#00ccff" opacity="0.8"/>
  <circle cx="42" cy="36" r="2.5" fill="#39ff85" opacity="0.8"/>
  <circle cx="38" cy="20" r="2" fill="#00ccff" opacity="0.8"/>
  <!-- Central persistence core -->
  <circle cx="32" cy="52" r="4" fill="#001a2e" stroke="#39ff85" stroke-width="2"/>
  <circle cx="32" cy="52" r="2" fill="#39ff85"/>
  <!-- Data retention glow -->
  <circle cx="32" cy="40" r="3" fill="#00ccff" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Bubbles -->
  <circle cx="14" cy="48" r="2" fill="#00ccff" opacity="0.4"/>
  <circle cx="50" cy="16" r="1.5" fill="#39ff85" opacity="0.5"/>
  <circle cx="54" cy="28" r="2" fill="#00ccff" opacity="0.3"/>
</svg>