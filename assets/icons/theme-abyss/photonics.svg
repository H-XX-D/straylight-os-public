<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lightbeam" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#39ff85" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Bioluminescent fish as photonic transmitter -->
  <ellipse cx="24" cy="32" rx="12" ry="6" fill="#001a2e" stroke="#00ccff" stroke-width="1.5"/>
  <path d="M36 32 L44 24 L42 32 L44 40 Z" fill="#00ccff" opacity="0.7"/>
  <!-- Light emission/optical fiber -->
  <path d="M44 32 L58 20" stroke="url(#lightbeam)" stroke-width="3" stroke-linecap="round"/>
  <path d="M44 32 L58 32" stroke="url(#lightbeam)" stroke-width="3" stroke-linecap="round"/>
  <path d="M44 32 L58 44" stroke="url(#lightbeam)" stroke-width="3" stroke-linecap="round"/>
  <!-- Photons as glowing particles -->
  <circle cx="50" cy="26" r="1.5" fill="#39ff85">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="54" cy="32" r="1.5" fill="#00ccff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="0.4s" begin="0.13s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="38" r="1.5" fill="#39ff85">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="0.4s" begin="0.26s" repeatCount="indefinite"/>
  </circle>
  <!-- Eye -->
  <circle cx="20" cy="32" r="2" fill="#39ff85"/>
  <!-- Photoreceptor spots -->
  <circle cx="28" cy="28" r="1" fill="#00ccff" opacity="0.6"/>
  <circle cx="30" cy="34" r="1" fill="#00ccff" opacity="0.6"/>
  <!-- Bubbles -->
  <circle cx="10" cy="20" r="2" fill="#39ff85" opacity="0.5"/>
  <circle cx="56" cy="52" r="2" fill="#00ccff" opacity="0.4"/>
</svg>