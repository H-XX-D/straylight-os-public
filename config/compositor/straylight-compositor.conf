{
    "compositor": {
        "layout": "tiling",
        "master_ratio": 0.55,
        "gap_px": 4,
        "cursor_theme": "default",
        "cursor_size": 24,
        "ipc": {
            "core_socket": "/run/straylight/core.sock"
        },
        "keybinds": {
            "close_window":    "Super+Q",
            "quit_compositor": "Super+Shift+Q",
            "focus_next":      "Super+Tab",
            "focus_prev":      "Super+Shift+Tab",
            "toggle_layout":   "Super+T"
        }
    }
}
