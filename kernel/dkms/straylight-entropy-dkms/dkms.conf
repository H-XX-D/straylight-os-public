# SPDX-License-Identifier: GPL-2.0
# StrayLight OS — Hardware Entropy Source DKMS Configuration
#
# Kernel module: straylight-entropy.ko
# Sources:       kernel/entropy/
# Object composition (from Kbuild):
#   straylight-entropy.ko ← entropy_main.o + entropy_jitter.o +
#                           entropy_rdrand.o + entropy_health.o
#
# The module registers a hw_random device that feeds entropy from three
# sources: CPU RDRAND/RDSEED instructions, a jitter-based entropy
# accumulator, and a health test oracle.  It supplements the kernel's
# /dev/random pool and exports a sysfs interface at
# /sys/devices/virtual/misc/straylight-entropy/.
#
# Install location: /lib/modules/<kernelver>/extra/straylight/entropy/
#
# Upgrading: because this module interacts with the in-kernel random
# subsystem (drivers/char/random.c), AUTOINSTALL is enabled so DKMS
# rebuilds and re-inserts it automatically on every kernel upgrade.

PACKAGE_NAME="straylight-entropy"
PACKAGE_VERSION="1.0.0"

# Module output name (must match obj-m in Kbuild)
BUILT_MODULE_NAME[0]="straylight-entropy"

# Source subdirectory relative to the DKMS source tree
BUILT_MODULE_LOCATION[0]="kernel/entropy"

# Destination inside /lib/modules/<kernelver>/
DEST_MODULE_LOCATION[0]="/extra/straylight/entropy"

# Build: invoke the kernel build system from the entropy source directory.
# ${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build is the DKMS work tree.
MAKE[0]="make -C /lib/modules/${kernelver}/build \
              M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/entropy \
              modules"

# Clean: remove all generated objects and the .ko
CLEAN="make -C /lib/modules/${kernelver}/build \
            M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/entropy \
            clean"

# Rebuild and install automatically when a new kernel is booted
AUTOINSTALL="yes"
