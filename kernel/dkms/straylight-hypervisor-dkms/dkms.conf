# StrayLight OS — KVM Extensions / Hypervisor DKMS Configuration
#
# Kernel module: straylight-hypervisor.ko
# Sources:       kernel/hypervisor/
# Object composition (from Kbuild):
#   straylight-hv.ko ← hv_main.o + hv_vmcs.o + hv_memory.o +
#                      hv_intercept.o + hv_profiler.o
#
# Note: the Kbuild obj-m target is "straylight-hv" (not "straylight-hypervisor").
# BUILT_MODULE_NAME[0] must match the actual .ko filename produced by Kbuild.
#
# This module extends KVM with:
#   - VMCS shadow fields optimised for StrayLight guest workloads
#   - Fine-grained VM-exit intercept routing (hv_intercept)
#   - EPT/NPT memory management helpers (hv_memory)
#   - Per-vCPU performance counter passthrough (hv_profiler)
#
# The module loads alongside kvm.ko and kvm-intel.ko / kvm-amd.ko; it does
# NOT replace them.  Both KVM and the architecture-specific KVM module must
# already be loaded before straylight-hv.ko is inserted.
#
# Install location: /lib/modules/<kernelver>/extra/straylight/hypervisor/
#
# Prerequisites: CONFIG_KVM=m and CONFIG_KVM_INTEL=m or CONFIG_KVM_AMD=m.
#
# AUTOINSTALL is enabled; VMCS field offsets are tied to kernel version.

PACKAGE_NAME="straylight-hypervisor"
PACKAGE_VERSION="1.0.0"

# Actual .ko name produced by Kbuild (obj-m := straylight-hv.o)
BUILT_MODULE_NAME[0]="straylight-hv"

# Source subdirectory relative to the DKMS source tree
BUILT_MODULE_LOCATION[0]="kernel/hypervisor"

# Destination inside /lib/modules/<kernelver>/
DEST_MODULE_LOCATION[0]="/extra/straylight/hypervisor"

# Build: out-of-tree kernel module build
MAKE[0]="make -C /lib/modules/${kernelver}/build \
              M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/hypervisor \
              modules"

# Clean
CLEAN="make -C /lib/modules/${kernelver}/build \
            M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/hypervisor \
            clean"

# Rebuild on kernel upgrade — critical: VMCS layouts change between versions
AUTOINSTALL="yes"
