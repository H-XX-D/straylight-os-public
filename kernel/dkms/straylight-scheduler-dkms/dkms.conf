# StrayLight OS — ML-Aware Scheduler DKMS Configuration
#
# Kernel module: straylight-scheduler.ko
# Sources:       kernel/scheduler/
# Object composition (from Kbuild):
#   straylight-sched.ko ← sched_main.o + sched_ml.o + sched_topology.o
#
# Note: the Kbuild obj-m target is "straylight-sched" (not
# "straylight-scheduler").  BUILT_MODULE_NAME[0] matches the actual .ko.
#
# This module hooks into the Linux scheduler (sched_ext or CFS notifiers,
# kernel-version dependent) to apply ML-derived task placement hints:
#   sched_main     — module entry, notifier chain registration
#   sched_ml       — inference engine: reads /sys/kernel/straylight/sched/
#                    model coefficients and computes per-task affinity scores
#   sched_topology — NUMA and cache-topology helpers used by sched_ml to
#                    translate affinity scores into CPU masks
#
# Sysfs interface: /sys/kernel/straylight/sched/
#   model_path  (rw) — path to the ML model parameter file
#   enabled     (rw) — 0/1 toggle for ML-guided placement
#   stats       (ro) — placement decisions per CPU per second
#
# Install location: /lib/modules/<kernelver>/extra/straylight/scheduler/
#
# AUTOINSTALL is enabled; the sched_ext ABI and CFS notifier signatures
# change with kernel versions, requiring a rebuild per upgrade.

PACKAGE_NAME="straylight-scheduler"
PACKAGE_VERSION="1.0.0"

# Actual .ko name produced by Kbuild (obj-m := straylight-sched.o)
BUILT_MODULE_NAME[0]="straylight-sched"

# Source subdirectory relative to the DKMS source tree
BUILT_MODULE_LOCATION[0]="kernel/scheduler"

# Destination inside /lib/modules/<kernelver>/
DEST_MODULE_LOCATION[0]="/extra/straylight/scheduler"

# Build: out-of-tree kernel module build
MAKE[0]="make -C /lib/modules/${kernelver}/build \
              M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/scheduler \
              modules"

# Clean
CLEAN="make -C /lib/modules/${kernelver}/build \
            M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/scheduler \
            clean"

# Rebuild on kernel upgrade — scheduler hooks are not stable across versions
AUTOINSTALL="yes"
