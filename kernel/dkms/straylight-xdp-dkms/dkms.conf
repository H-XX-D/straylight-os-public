# StrayLight OS XDP eBPF Programs DKMS Configuration
#
# XDP programs are eBPF objects compiled with clang -target bpf, not
# kernel modules. DKMS is used here as a build-validation hook for systems
# with the matching kernel headers installed. The runtime .bpf.o files used
# by straylight-xdp are packaged by straylight-network under:
#   /usr/lib/straylight/bpf/

PACKAGE_NAME="straylight-xdp"
PACKAGE_VERSION="1.0.0"

# Build: invoke the BPF Makefile directly. There are intentionally no
# BUILT_MODULE_NAME or DEST_MODULE_LOCATION entries because no .ko is produced.
MAKE[0]="make -C ${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/xdp all"
CLEAN="make -C ${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/xdp clean"

AUTOINSTALL="no"
