# StrayLight OS — SGX Enclave Management Module DKMS Configuration
#
# Kernel module: straylight-enclave.ko
# Sources:       kernel/enclave/
# Object composition (from Kbuild):
#   straylight-enclave.ko ← enclave_main.o + enclave_epc.o +
#                           enclave_sealed.o + enclave_attestation.o
#
# This module manages Intel SGX Enclave Page Cache (EPC) allocation,
# sealed storage, and DCAP/EPID remote attestation handshakes on behalf
# of user-space trusted applications.  It exposes /dev/straylight-enclave
# and interfaces with the kernel's native SGX driver via
# arch/x86/kernel/cpu/sgx/.
#
# Install location: /lib/modules/<kernelver>/extra/straylight/enclave/
#
# Prerequisites: CONFIG_X86_SGX=y or CONFIG_X86_SGX=m in the running kernel.
#
# AUTOINSTALL is enabled; the EPC layout may change between micro-code
# updates and the module must be rebuilt against the current kernel headers.

PACKAGE_NAME="straylight-enclave"
PACKAGE_VERSION="1.0.0"

# Module output name (must match obj-m in Kbuild)
BUILT_MODULE_NAME[0]="straylight-enclave"

# Source subdirectory relative to the DKMS source tree
BUILT_MODULE_LOCATION[0]="kernel/enclave"

# Destination inside /lib/modules/<kernelver>/
DEST_MODULE_LOCATION[0]="/extra/straylight/enclave"

# Build: standard out-of-tree kernel module build against the running kernel
MAKE[0]="make -C /lib/modules/${kernelver}/build \
              M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/enclave \
              modules"

# Clean: remove generated objects and the .ko
CLEAN="make -C /lib/modules/${kernelver}/build \
            M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/enclave \
            clean"

# Rebuild on kernel upgrade
AUTOINSTALL="yes"
