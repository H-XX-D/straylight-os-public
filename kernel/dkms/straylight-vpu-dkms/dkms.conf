# StrayLight OS — VPU GPU Memory Slab Allocator DKMS Configuration
#
# Kernel module: straylight-vpu.ko
# Sources:       kernel/vpu/
# Object composition (from Kbuild):
#   straylight-vpu.ko ← vpu_main.o + vpu_slab.o + vpu_ioctl.o +
#                       vpu_dma.o + vpu_sysfs.o
#
# This module implements a slab allocator for VPU (Video Processing Unit)
# device memory, a DMA mapping layer for zero-copy buffer sharing between
# CPU and VPU, an ioctl interface (/dev/straylight-vpu) for user-space
# allocation requests, and a sysfs node at
# /sys/devices/straylight/vpu/ exposing allocator statistics.
#
# Install location: /lib/modules/<kernelver>/extra/straylight/vpu/
#
# The module uses DMA-BUF for cross-subsystem buffer sharing (e.g. with
# the GPU via Mesa) and requires DMA_BUF=y in the running kernel.
#
# AUTOINSTALL is enabled; slab internals are ABI-sensitive to kernel version.

PACKAGE_NAME="straylight-vpu"
PACKAGE_VERSION="1.0.0"

# Module output name (must match obj-m in Kbuild)
BUILT_MODULE_NAME[0]="straylight-vpu"

# Source subdirectory relative to the DKMS source tree
BUILT_MODULE_LOCATION[0]="kernel/vpu"

# Destination inside /lib/modules/<kernelver>/
DEST_MODULE_LOCATION[0]="/extra/straylight/vpu"

# Build: out-of-tree kernel module build
MAKE[0]="make -C /lib/modules/${kernelver}/build \
              M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/vpu \
              modules"

# Clean
CLEAN="make -C /lib/modules/${kernelver}/build \
            M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/vpu \
            clean"

# Rebuild on kernel upgrade
AUTOINSTALL="yes"
